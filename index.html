function speak(txt){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(txt);
  u.lang="nl-NL";u.rate=1.0;u.pitch=1.0;
  // probeer Nederlandse stem
  const voices=window.speechSynthesis.getVoices();
  const nl=voices.find(v=>v.lang.startsWith("nl"))||voices[0];
  if(nl)u.voice=nl;
  window.speechSynthesis.speak(u);
}

function startListening(onResult,onEnd){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return null;
  const r=new SR();
  r.lang="nl-NL";r.continuous=false;r.interimResults=false;
  r.onresult=e=>{const t=e.results[0][0].transcript.toLowerCase().trim();onResult(t);};
  r.onend=()=>{if(onEnd)onEnd();};
  r.onerror=()=>{if(onEnd)onEnd();};
  r.start();
  return r;
}

// ── DOEL-GEBASEERDE WORKOUT AANPASSING ────────────────────────
// goal: afvallen → meer reps, lager gewicht, cardio finish
// goal: spiermassa → minder reps, zwaarder, progressieve overload
// goal: fitter → functioneel, circuit-stijl
// goal: gezonder → matig gewicht, mobility focus
function adjustForGoal(exercises, goal, sportType){
  if(!goal||sportType==="hiit"||sportType==="cardio")return exercises;
  return exercises.map(ex=>{
    const e={...ex};
    if(goal==="afvallen"){
      // Meer reps, iets lager gewicht, kortere rust
      e.reps=typeof e.reps==="string"&&e.reps.includes("-")?
        e.reps.split("-").map((n,i)=>i===0?parseInt(n)+2:parseInt(n)+4).join("-"):
        e.reps;
      e.weights=e.weights.map(w=>w>0?Math.max(0,Math.round(w*0.8)):0);
      e.restSecs=Math.min(45,e.restSecs||60);
    } else if(goal==="spiermassa"){
      // Minder reps, meer gewicht focus
      e.reps=typeof e.reps==="string"&&e.reps.includes("-")?
        e.reps.split("-").map(n=>Math.max(4,parseInt(n)-2)).join("-"):
        e.reps;
      e.weights=e.weights.map(w=>w>0?Math.round(w*1.05):0);
      e.restSecs=Math.min(90,Math.max(60,e.restSecs||60));
    } else if(goal==="fitter"){
      // Circuit stijl, kortere rust
      e.restSecs=Math.min(45,e.restSecs||60);
    }
    return e;
  });
}

const EX_DB={
  "Squat":{muscle:"benen",unit:"kg",rest:90,info:"Voeten schouderbreedte uit elkaar, tenen licht naar buiten. Zak gecontroleerd neer tot heupen onder kniehoogte. Knieën volgen de richting van je tenen. Rug recht houden, borst omhoog. Duw vanuit de hielen omhoog.",yt:"squat+techniek"},
  "Leg Press":{muscle:"benen",unit:"kg",rest:90,info:"Voeten schouderbreedte op het platform. Duw volledig uit zonder knieën te vergrendelen. Buig terug tot 90 graden of dieper. Lage rug altijd tegen de rugleuning houden.",yt:"leg+press"},
  "Romanian Deadlift":{muscle:"benen",unit:"kg",rest:75,info:"Sta rechtop met stang voor je. Schuif de stang langs je benen omlaag door je heupen naar achteren te duwen. Houd je rug recht en voel de rek in je hamstrings. Stop als je de rek voelt, niet op basis van diepte.",yt:"romanian+deadlift"},
  "Leg Extension":{muscle:"benen",unit:"kg",rest:60,info:"Zit rechtop in de machine. Strek de benen volledig uit en houd 1 seconde vast bovenaan. Laat langzaam zakken — de negatieve fase is net zo belangrijk als omhoog.",yt:"leg+extension"},
  "Leg Curl":{muscle:"benen",unit:"kg",rest:60,info:"Lig plat op de machine. Trek je hielen naar je billen in een vloeiende beweging. Knijp bovenaan even samen. Laat langzaam zakken voor maximale spieractivatie.",yt:"leg+curl"},
  "Calf Raises":{muscle:"benen",unit:"kg",rest:45,info:"Sta op de bal van je voet op een verhoging. Zak volledig naar beneden voor een goede rek. Duw explosief omhoog en houd 1 seconde vast bovenaan. Doe langzaam voor beste effect.",yt:"calf+raises"},
  "Bulgarian Split Squat":{muscle:"benen",unit:"kg",rest:90,info:"Achterste voet op bank of verhoging. Zak recht omlaag — het gaat om verticale beweging, niet voorwaarts. Voorste knie niet over je teen laten komen. Moeilijke maar zeer effectieve oefening.",yt:"bulgarian+split+squat"},
  "Bench Press":{muscle:"borst",unit:"kg",rest:120,info:"Lig op de bank met voeten plat op de grond. Grip iets breder dan schouderbreedte. Laat de stang zakken naar je borst met ellebogen op 45-75 graden — niet volledig naar buiten. Duw explosief omhoog.",yt:"bench+press+techniek"},
  "Incline Dumbbell Press":{muscle:"borst",unit:"kg",rest:90,info:"Bank op 30-45 graden. Dumbells ter hoogte van je borst. Druk schuin omhoog en breng ze licht naar elkaar toe bovenaan. Focus op het samentrekken van de bovenste borst.",yt:"incline+dumbbell+press"},
  "Cable Fly":{muscle:"borst",unit:"kg",rest:60,info:"Armen licht gebogen houden gedurende de hele beweging. Breng de handgrepen samen voor je borst in een omhelzingsbeweging. Voel de rek in de borst onderaan. Langzaam laten zakken.",yt:"cable+fly"},
  "Push-up":{muscle:"borst",unit:"reps",rest:45,info:"Handen iets breder dan schouderbreedte. Lichaam als een rechte plank van hoofd tot hiel. Zak totdat je borst bijna de grond raakt. Ellebogen 45 graden van je lichaam, niet volledig uit.",yt:"push+up"},
  "Dips":{muscle:"triceps",unit:"reps",rest:60,info:"Houd je lichaam recht of leun licht voorover voor meer borst-activatie. Zak tot je ellebogen 90 graden zijn. Duw volledig uit bovenaan. Voeg gewicht toe als het te makkelijk wordt.",yt:"dips"},
  "Shoulder Press":{muscle:"schouders",unit:"kg",rest:90,info:"Zit of sta rechtop. Dumbells op ooghoogte, ellebogen 90 graden. Duw recht omhoog boven je hoofd zonder door te vergrendelen. Gecontroleerd terug naar beginpositie.",yt:"shoulder+press"},
  "Lateral Raises":{muscle:"schouders",unit:"kg",rest:45,info:"Sta met lichte dumbbells naast je. Hef je armen zijwaarts tot schouderhoogte met licht gebogen ellebogen. Duimen licht omlaag voor betere deltoid-activatie. Laat langzaam zakken.",yt:"lateral+raises"},
  "Deadlift":{muscle:"rug",unit:"kg",rest:120,info:"Voeten heupbreedte. Stang boven het midden van je voet. Pak de stang vast, adem in, span je core aan. Duw de grond weg met je benen terwijl je de stang langs je lichaam trekt. Heupen en schouders omhoog tegelijk.",yt:"deadlift"},
  "Bent-over Row":{muscle:"rug",unit:"kg",rest:90,info:"Romp 45 graden voorovergebogen, knieën licht gebogen. Trek de stang naar je navel — niet naar je borst. Knijp je schouderbladen samen bovenaan. Core gespannen houden voor lage rugbescherming.",yt:"bent+over+row"},
  "Lat Pulldown":{muscle:"rug",unit:"kg",rest:75,info:"Greep iets breder dan schouderbreedte. Leun licht achterover. Trek de stang naar je bovenborst terwijl je je ellebogen naar beneden en achteren trekt. Voel je lats samentrekken.",yt:"lat+pulldown"},
  "Pull-ups":{muscle:"rug",unit:"reps",rest:90,info:"Overhandse greep, iets breder dan schouders. Hang volledig uit onderaan. Trek jezelf omhoog tot je kin over de stang komt. Gecontroleerd terug laten zakken voor volledige bewegingsuitslag.",yt:"pull+ups"},
  "Seated Cable Row":{muscle:"rug",unit:"kg",rest:75,info:"Zit recht met lichte knie-buiging. Trek de kabel naar je navel. Houd je romp stabiel — geen schommelende beweging. Knijp schouderbladen samen en laat langzaam terug.",yt:"seated+cable+row"},
  "Barbell Curl":{muscle:"biceps",unit:"kg",rest:60,info:"Sta recht, ellebogen vast langs je lichaam. Curl de stang omhoog naar je schouders in een vloeiende boog. Knijp de biceps bovenaan samen. Laat gecontroleerd zakken — de negatieve fase traint ook!",yt:"barbell+curl"},
  "Hammer Curl":{muscle:"biceps",unit:"kg",rest:60,info:"Neutrale grip met duimen omhoog. Curl de dumbbells omhoog terwijl je de polsen recht houdt. Werkt zowel biceps als brachialis voor dikkere armen. Afwisselend of tegelijk.",yt:"hammer+curl"},
  "Triceps Pushdown":{muscle:"triceps",unit:"kg",rest:60,info:"Ellebogen vast langs je ribben. Duw de stang volledig uit naar beneden. Knijp de triceps samen onderaan. Laat langzaam terug omhoog — niet laten schieten.",yt:"triceps+pushdown"},
  "Skull Crushers":{muscle:"triceps",unit:"kg",rest:60,info:"Lig op de bank. Houd ellebogen op schouderbreedte. Laat de stang zakken naar je voorhoofd of net eronder. Strek explosief uit. Ellebogen mogen licht naar voren bewegen onderaan.",yt:"skull+crushers"},
  "Incline Dumbbell Curl":{muscle:"biceps",unit:"kg",rest:60,info:"Bank schuin achterover op 45-60 graden. Laat armen volledig hangen. Door de schuine hoek krijg je een grotere bewegingsuitslag en meer rek op de biceps. Langzaam omhoog en omlaag.",yt:"incline+dumbbell+curl"},
  "Concentration Curl":{muscle:"biceps",unit:"kg",rest:45,info:"Zit, elleboog steunend op binnenkant van je knie. Curl de dumbbell omhoog. Isolatie-oefening voor maximale bicep-piek. Draai je pols aan het einde voor extra activatie.",yt:"concentration+curl"},
  "Hip Thrust":{muscle:"billen",unit:"kg",rest:75,info:"Bovenrug op een bank, stang over je heupen (gebruik een pad). Voeten plat, knieën 90 graden. Duw heupen explosief omhoog en knijp je billen zo hard mogelijk samen bovenaan. Even vasthouden.",yt:"hip+thrust"},
  "Glute Bridge":{muscle:"billen",unit:"reps",rest:45,info:"Lig op je rug met knieën gebogen, voeten plat. Duw je heupen omhoog tot je lichaam een rechte lijn vormt. Knijp billen samen bovenaan. Makkelijker variant van de hip thrust.",yt:"glute+bridge"},
  "Plank":{muscle:"buik",unit:"sec",rest:30,info:"Steun op onderarmen en tenen. Lichaam als een rechte plank — geen hangende heupen, geen omhoog gestoken billen. Span je core, billen en benen aan. Adem rustig door. Kijk naar de grond.",yt:"plank"},
  "Crunches":{muscle:"buik",unit:"reps",rest:30,info:"Lig op je rug, knieën gebogen. Kroel je bovenlichaam omhoog door je core samen te trekken — niet door je nek te trekken. Stop halverwege, je lage rug blijft op de grond. Langzaam terug.",yt:"crunches"},
  "Leg Raises":{muscle:"buik",unit:"reps",rest:30,info:"Lig plat. Benen gestrekt omhoog heffen tot 90 graden. Laat langzaam zakken tot net boven de grond — raak niet helemaal neer. Houd je lage rug op de grond voor maximale core-activatie.",yt:"leg+raises"},
  "Mountain Climber":{muscle:"buik",unit:"sec",rest:20,info:"Plank positie op gestrekte armen. Breng beurtelings je knie explosief naar je borst alsof je heuvel oprent. Heupen laag houden. Hoe sneller, hoe hoger de hartslag. Core altijd gespannen.",yt:"mountain+climbers"},
  "Arnold Press":{muscle:"schouders",unit:"kg",rest:75,info:"Begin met palmen naar jou gericht op ooghoogte. Terwijl je omhoog drukt roteer je je handen naar buiten. Bovenaan wijzen je palmen naar voren. Omgekeerd terug. Werkt alle drie de deltoid-koppen.",yt:"arnold+press"},
  "Face Pulls":{muscle:"schouders",unit:"kg",rest:45,info:"Kabel op ooghoogte of iets erboven. Trek naar je gezicht met ellebogen omhoog. Externe rotatie aan het einde — duimen naar achteren. Essentieel voor gezonde schouders en houding.",yt:"face+pulls"},
  "Burpee":{muscle:"full body",unit:"reps",rest:30,info:"Vanuit staande positie: squat neer, handen op grond, spring naar plank, doe een push-up (optioneel), spring terug naar squat, spring omhoog met armen overhead. Intense totaallichaams-oefening.",yt:"burpee"},
  "Jump Squat":{muscle:"benen",unit:"reps",rest:30,info:"Doe een normale squat. Vanuit de onderste positie spring je explosief omhoog. Armen gebruiken voor vaart. Land zacht met gebogen knieën om de schok op te vangen. Direct door naar de volgende rep.",yt:"jump+squat"},
  "High Knees":{muscle:"full body",unit:"sec",rest:20,info:"Sta recht en ren op de plaats met knieën zo hoog mogelijk — idealiter tot heuphoogte. Armen meebewegen alsof je echt rent. Hoge intensiteit, verhoogt hartslag snel. Heel de grond niet raken.",yt:"high+knees"},
  "Box Jump":{muscle:"benen",unit:"reps",rest:45,info:"Sta voor de box. Buig licht door je knieën. Spring explosief omhoog met je armen als hulp. Land met beide voeten tegelijk op de box, zacht met gebogen knieën. Stap voorzichtig naar beneden.",yt:"box+jump"},
  "Jumping Jacks":{muscle:"full body",unit:"reps",rest:15,info:"Sta rechtop. Spring je benen uit elkaar terwijl je armen boven je hoofd brengt. Spring terug naar de startpositie. Goede warming-up of actieve rust-oefening tussen zwaardere sets.",yt:"jumping+jacks"},
  "Kettlebell Swing":{muscle:"full body",unit:"reps",rest:30,info:"Voeten schouderbreedte. Kettlebell tussen je benen. Heupen explosief naar voren duwen — de swing komt van je heupen, niet van je armen! Rug recht, core strak. Laat de kettlebell terug zwaaien tot tussen de knieën.",yt:"kettlebell+swing"},
  "Battle Ropes":{muscle:"schouders",unit:"sec",rest:30,info:"Houd beide touwen vast, licht door de knieën. Maak alternerend golfbewegingen. Hoe groter de golven, hoe zwaarder. Varieer met beide tegelijk, circels of zij-aan-zij bewegen.",yt:"battle+ropes"},
  "Skipping":{muscle:"full body",unit:"sec",rest:30,info:"Houd de handgrepen op heuphoogte. Draai met je polsen — niet je armen. Spring op de bal van je voet. Begin rustig met beide voeten tegelijk en bouw op naar single-leg of dubbel-slagen.",yt:"skipping+rope"},
  "Hardlopen":{muscle:"full body",unit:"sec",rest:60,info:"Goede loopschoenen zijn essentieel. Begin rustig, bouw je tempo op. Adem in door de neus, uit door de mond. Armen meebewegen voor efficiëntie. Landingspatroon: middenvoet, niet op je hiel.",yt:"running+technique+beginners"},
  "Roeien (machine)":{muscle:"rug",unit:"sec",rest:60,info:"Trek in volgorde: benen — romp achterover — armen. Duw terug in omgekeerde volgorde: armen — romp voorover — benen buigen. Volle bewegingsuitslag voor maximale efficiency. Weerstand aanpassen.",yt:"rowing+machine+technique"},
  "Stationary Bike":{muscle:"benen",unit:"sec",rest:30,info:"Zadel op heuphoogte zodat je been bijna gestrekt is onderaan. Trap in cirkels, niet op en neer. Wissel tussen hoge cadans (makkelijk) en lage cadans (zwaar) voor intervallen.",yt:"stationary+bike+workout"},
  "Spinning":{muscle:"benen",unit:"sec",rest:30,info:"Zit rechtop of leun iets voorover. Weerstand opbouwen voor klimmen. Sta op de pedalen voor sprints. Wissel tussen zitten en staan. Cadans controleren met je ademhaling.",yt:"spinning+workout+beginners"},
  "Stair Climber":{muscle:"benen",unit:"sec",rest:45,info:"Sta rechtop, minimaal leunen op de handgrepen — dat vermindert de intensiteit. Volle stap nemen voor maximale billen- en beenactivatie. Tempo aanpassen voor cardio of kracht.",yt:"stair+climber+workout"},
  "Treadmill Walk":{muscle:"full body",unit:"sec",rest:30,info:"Loop op een helling van 5-10% voor maximale calorieverbranding zonder rennen. Handen niet vasthouden aan de leuning. Opgerichte houding. Combineer met intervallen voor extra resultaat.",yt:"treadmill+incline+walking"},
  "Elliptical":{muscle:"full body",unit:"sec",rest:30,info:"Laag impact — goed voor gewrichten. Gebruik de armen actief mee voor een totaallichaams-workout. Wissel van richting (achteruit trappen) voor andere spieren. Helling aanpassen voor meer weerstand.",yt:"elliptical+machine+workout"},
  "Lopen op helling":{muscle:"benen",unit:"sec",rest:30,info:"Loop buiten of op de loopband op 8-15% helling. Lager tempo dan normaal hardlopen maar veel hogere calorieverbranding. Goede knievervanging voor mensen die niet goed kunnen rennen.",yt:"incline+walking+workout"},
  "Touwtjespringen":{muscle:"full body",unit:"sec",rest:30,info:"Begin met beide voeten tegelijk. Polsen draaien, niet de armen. Spring op de bal van je voet voor zachte landingen. 10 minuten touwtjespringen = ±130 calorieën. Goede HIIT optie.",yt:"jump+rope+workout"},
  "Bear Crawl":{muscle:"full body",unit:"sec",rest:30,info:"Handen en knieën, knieën net boven de grond. Beweeg diagonaal: rechterhand met linkervoet tegelijk. Heupen laag houden. Uitstekende core- en schouderstabiliteit oefening.",yt:"bear+crawl+exercise"},
  "Tuck Jump":{muscle:"benen",unit:"reps",rest:30,info:"Spring omhoog en trek je knieën naar je borst op het hoogste punt. Land zacht met gebogen knieën. Explosieve oefening die quad, billen en core activeert. Intensief — bouw langzaam op.",yt:"tuck+jump"},
  "Lateral Shuffle":{muscle:"benen",unit:"sec",rest:20,info:"Ga licht door je knieën in atletische positie. Schuif zijwaarts — voeten niet kruisen. Raak de grond aan bij elke richting wissel. Werkt de buitenkant van je benen en billen.",yt:"lateral+shuffle+exercise"},
  "Inchworm":{muscle:"full body",unit:"reps",rest:20,info:"Sta recht. Loop met je handen naar voren tot plank-positie. Doe een push-up (optioneel). Loop handen terug naar je voeten. Oprekken en warming-up beweging maar ook een goede full-body oefening.",yt:"inchworm+exercise"},
  "Ski Jumps":{muscle:"benen",unit:"reps",rest:30,info:"Spring zijwaarts van been naar been alsof je ski slalom rijdt. Land op één been en buig door je knie voor een zachte landing. Ploeg kracht en coördinatie. Doe 10 per kant.",yt:"skater+jumps+exercise"},
  "Sprint op de plaats":{muscle:"full body",unit:"sec",rest:20,info:"Ren zo snel mogelijk op de plaats. Knieën omhoog, armen hard meebewegen. Volle inspanning. Ideaal als afsluiter van een interval of als opwarmer.",yt:"running+in+place+fast"},
  "Power Jack":{muscle:"full body",unit:"reps",rest:20,info:"Jumping jack maar dan met een squat onderaan. Sla benen uit, zak in squat, duw omhoog en breng benen samen. Combineert plyometrie met kracht.",yt:"power+jack+exercise"},
  "Plank Jack":{muscle:"buik",unit:"reps",rest:20,info:"Begin in plankpositie op gestrekte armen. Spring benen uit elkaar en terug samen — zoals een jumping jack maar horizontaal. Core strak, heupen laag.",yt:"plank+jack+exercise"},
  "Sumo Squat Jump":{muscle:"benen",unit:"reps",rest:30,info:"Brede squat met tenen naar buiten. Zak diep, spring explosief omhoog. Land zacht terug in brede stand. Werkt binnenste dijen en billen extra.",yt:"sumo+squat+jump"},
  "Speed Rope":{muscle:"full body",unit:"sec",rest:20,info:"Springtouw op maximale snelheid. Probeer zo weinig mogelijk tijd op de grond te zijn. Polsen klein houden. Na 30 seconden maximale hartslag.",yt:"speed+rope+workout"},
  "Plyo Push-up":{muscle:"borst",unit:"reps",rest:30,info:"Normale push-up maar explosief omhoog zodat handen van de grond komen. Land zacht en direct in volgende. Geavanceerd — bouw langzaam op.",yt:"plyometric+push+up"},
  "Broad Jump":{muscle:"benen",unit:"reps",rest:30,info:"Sta met voeten schouderbreedte. Buig door knieën, zwaai armen terug en spring zo ver mogelijk vooruit. Land zacht met gebogen knieën. Meet je afstand.",yt:"broad+jump+exercise"},
  "Donkey Kick":{muscle:"billen",unit:"reps",rest:15,info:"Begin op handen en knieën. Schop één been omhoog naar het plafond terwijl je knie gebogen blijft. Knijp bil samen bovenaan. Afwisselend per been.",yt:"donkey+kick+exercise"},
  "Frog Jump":{muscle:"benen",unit:"reps",rest:30,info:"Diepe squat met handen op de grond tussen je voeten. Spring explosief omhoog en laat armen meebewegen. Land terug in diepe squat. Kikker-achtig.",yt:"frog+jump+exercise"},
  "Interval Hardlopen":{muscle:"full body",unit:"sec",rest:60,info:"Wissel 30 seconden sprinten af met 30 seconden rustig joggen. Verhoogt conditie sneller dan steady-state cardio. Bouw intervallen op per week.",yt:"interval+running+workout"},
  "Zwemmen":{muscle:"full body",unit:"banen",rest:30,info:"Laag impact, hoge calorieverbranding. Wissel slagen af voor verschillende spiergroepen. Crawl voor snelheid, schoolslag voor duur. Goed voor herstel.",yt:"swimming+workout+beginners"},
  "Roeien buiten":{muscle:"rug",unit:"sec",rest:60,info:"Buiten roeien geeft extra weerstand door wind en stroom. Trek met heupen en rug, niet alleen armen. Goede houding voorkomt rugklachten.",yt:"rowing+outdoor+technique"},
  "Crosstrainer":{muscle:"full body",unit:"sec",rest:30,info:"Elliptical met armbeweging. Laag impact, hoge calorieverbranding. Stel weerstand in op een niveau dat je nog net kunt praten maar niet zingen.",yt:"cross+trainer+workout"},
  "Wandelen":{muscle:"benen",unit:"sec",rest:0,info:"Onderschat wandelen niet — 30 minuten op tempo verbrandt net zoveel vet als joggen. Houd een flink tempo aan. Goed voor herstel en vetverbranding.",yt:"power+walking+workout"},
  "Treadmill Sprint":{muscle:"full body",unit:"sec",rest:60,info:"Zet de band op maximale snelheid voor korte sprints van 15-30 seconden. Houd je vast bij opstap en neerstap. Niet langer dan 30 seconden per sprint.",yt:"treadmill+sprint+interval"},
  // ── BENEN EXTRA ─────────────────────────────────────────────
  "Front Squat":{muscle:"benen",unit:"kg",rest:90,info:"Stang voor op schouders, ellebogen omhoog. Rug opgericht, meer quadriceps-activatie dan bij back squat. Vraagt goede mobiliteit in enkels en heupen.",yt:"front+squat+technique"},
  "Goblet Squat":{muscle:"benen",unit:"kg",rest:60,info:"Houd een dumbbell of kettlebell voor je borst. Voeten iets wijder dan schouderbreedte. Zak diep terwijl je de gewicht dicht bij je lichaam houdt. Goed voor beginners.",yt:"goblet+squat"},
  "Hack Squat":{muscle:"benen",unit:"kg",rest:90,info:"Machine of barbell achter je lichaam. Duw vanuit je hielen omhoog. Minder rugbelasting dan back squat. Goede isolatie voor quads.",yt:"hack+squat"},
  "Walking Lunges":{muscle:"benen",unit:"kg",rest:60,info:"Stap naar voren in lunge, breng achterste been naar voren voor volgende stap. Romp opgericht houden. Elke stap is een herhaling. Uitstekend voor eenzijdige kracht.",yt:"walking+lunges"},
  "Reverse Lunge":{muscle:"benen",unit:"kg",rest:60,info:"Stap naar achteren in een lunge in plaats van vooruit. Minder kniedruk dan forward lunge. Beter voor mensen met knieproblemen.",yt:"reverse+lunge"},
  "Step-up":{muscle:"benen",unit:"kg",rest:45,info:"Stap op een bank of box. Duw jezelf omhoog via het been dat op de box staat. Niet schieten met het andere been. Werkt bil en quad effectief.",yt:"step+up+exercise"},
  "Sumo Deadlift":{muscle:"benen",unit:"kg",rest:120,info:"Brede stand met tenen ver naar buiten. Stang grijpen met handen ertussen. Meer billen en binnenste dijbeenactivatie dan conventioneel. Goede variant voor bredere heupen.",yt:"sumo+deadlift"},
  "Nordic Curl":{muscle:"benen",unit:"reps",rest:90,info:"Kniel op de grond, hielen vastgehouden. Laat je bovenlichaam gecontroleerd zakken met je hamstrings. Heel moeilijk — begin met kleine bewegingsuitslag. Beste hamstring-oefening.",yt:"nordic+curl"},
  "Sissy Squat":{muscle:"benen",unit:"reps",rest:60,info:"Sta op je tenen, leun achterover terwijl je knieën naar voren gaan. Houd lichaam recht. Extreme quadriceps-isolatie. Geavanceerd — pas uitvoeren als knieën gezond zijn.",yt:"sissy+squat"},
  "Leg Press Single Leg":{muscle:"benen",unit:"kg",rest:75,info:"Zet één voet in het midden van het platform. Gebruik de helft van het gewicht van je normale leg press. Corriceert krachtsverschillen tussen benen.",yt:"single+leg+press"},
  // ── BORST EXTRA ─────────────────────────────────────────────
  "Decline Bench Press":{muscle:"borst",unit:"kg",rest:90,info:"Bank op -15 tot -30 graden. Treft de onderste borst. Voeten vastgemaakt. Ellebogen iets meer naar buiten dan bij flat bench. Let op bloeddruk bij decline.",yt:"decline+bench+press"},
  "Close Grip Bench Press":{muscle:"triceps",unit:"kg",rest:90,info:"Grip schouderbreedte of smaller. Ellebogen langs je lichaam houden. Primair triceps, secundair borst. Goede compound oefening voor arm-dikte.",yt:"close+grip+bench+press"},
  "Dumbbell Fly":{muscle:"borst",unit:"kg",rest:60,info:"Lig op bank. Armen gestrekt met lichte buiging in ellebogen. Laat dumbbells zakken tot je borst strekt. Breng samen boven je borst. Voel de borst samentrekken.",yt:"dumbbell+fly"},
  "Pec Deck":{muscle:"borst",unit:"kg",rest:60,info:"Zit rechtop in de machine. Breng de armen samen voor je borst in een knijpende beweging. Houd even vast bovenaan. Goede isolatie zonder stabilisatiewerk.",yt:"pec+deck+machine"},
  "Cable Crossover":{muscle:"borst",unit:"kg",rest:60,info:"Kabels hoog instellen. Trek naar beneden en laat de handen kruisen onderaan. Voel de onderste borst samentrekken. Houd even vast voor maximum activatie.",yt:"cable+crossover"},
  "Smith Machine Press":{muscle:"borst",unit:"kg",rest:90,info:"Veilige optie als je alleen traint. Stang beweegt in vaste baan. Minder stabilisatiewerk dan vrije gewichten. Goed voor techniek leren of als je moe bent.",yt:"smith+machine+bench+press"},
  "Svend Press":{muscle:"borst",unit:"kg",rest:45,info:"Houd twee kleine gewichten samen voor je borst. Duw ze recht naar voren terwijl je ze samenknijpt. Trek terug. Excellent voor borst-isolatie en scheiding.",yt:"svend+press"},

  "T-Bar Row":{muscle:"rug",unit:"kg",rest:90,info:"Stang in hoek, V-greep eronder. Trek naar je borst met ellebogen naar achteren. Dikt je rug op. Houd je rug plat en core strak gedurende de hele beweging.",yt:"t+bar+row"},
  "Single Arm Dumbbell Row":{muscle:"rug",unit:"kg",rest:60,info:"Één hand en één knie op bank voor steun. Trek dumbbell naar je heup — niet naar je schouder. Draai je romp licht mee. Volledig uitstrekken onderaan.",yt:"single+arm+dumbbell+row"},
  "Chest Supported Row":{muscle:"rug",unit:"kg",rest:75,info:"Borst op schuine bank, geen rugcompensatie mogelijk. Puurste rug-isolatie. Trek ellebogen naar achteren en knijp schouderbladen samen bovenaan.",yt:"chest+supported+row"},
  "Straight Arm Pulldown":{muscle:"rug",unit:"kg",rest:45,info:"Sta voor kabel, armen gestrekt. Duw de stang naar beneden met gestrekte armen. Voelt de lats isoleren zonder biceps. Goed als finisher na lat pulldowns.",yt:"straight+arm+pulldown"},
  "Hyperextension":{muscle:"rug",unit:"reps",rest:45,info:"Lig op hyperextensiebank. Houd je rug recht. Buig naar beneden en kom omhoog tot je lichaam recht is — niet verder dan dat. Versterkt lage rug en billen.",yt:"hyperextension+exercise"},
  "Good Morning":{muscle:"rug",unit:"kg",rest:75,info:"Stang op schouders zoals back squat. Buig voorover met gestrekte rug tot bijna horizontaal. Heupen naar achteren duwen. Treft hamstrings en lage rug intensief.",yt:"good+morning+exercise"},
  "Cable Pullover":{muscle:"rug",unit:"kg",rest:45,info:"Sta voor kabel hoog. Trek met gestrekte armen naar beneden en langs je lichaam. Voelt de lats werken door de hele bewegingsuitslag. Goed voor lat-diepte.",yt:"cable+pullover"},
  "Reverse Fly":{muscle:"rug",unit:"kg",rest:45,info:"Voorovergebogen of op schuine bank. Hef dumbbells zijwaarts omhoog. Treft de achterkant van schouders en midden van rug. Essentieel voor houding.",yt:"reverse+fly+exercise"},
  "Barbell Shrug":{muscle:"rug",unit:"kg",rest:60,info:"Houd stang voor je, armen gestrekt. Trek schouders omhoog naar je oren. Houd even vast. Laat zakken. Bouwt trapezius op voor voller uiterlijk bovenrug.",yt:"barbell+shrug"},
  // ── SCHOUDERS EXTRA ─────────────────────────────────────────
  "Upright Row":{muscle:"schouders",unit:"kg",rest:60,info:"Stang of dumbbells voor je lichaam. Trek omhoog langs je borst met ellebogen hoger dan je handen. Stopt bij kinlijn. Let op: kan schouderimpingement veroorzaken bij hoge gewichten.",yt:"upright+row"},
  "Front Raise":{muscle:"schouders",unit:"kg",rest:45,info:"Hef dumbbells recht naar voren tot schouderhoogte. Laat gecontroleerd zakken. Isoleert de voorste deltoid. Niet te zwaar — meer isolatie dan kracht.",yt:"dumbbell+front+raise"},
  "Rear Delt Fly":{muscle:"schouders",unit:"kg",rest:45,info:"Voorovergebogen, ellebogen licht gebogen. Hef dumbbells zijwaarts omhoog. Achterkant van schouders. Onderschat door veel mensen maar cruciaal voor balans.",yt:"rear+delt+fly"},
  "Cable Lateral Raise":{muscle:"schouders",unit:"kg",rest:45,info:"Kabel laag instellen. Hef het handvat zijwaarts omhoog met constante spanning. Beter dan dumbbells omdat de spanning onderaan ook aanwezig is.",yt:"cable+lateral+raise"},
  "Landmine Press":{muscle:"schouders",unit:"kg",rest:75,info:"Stang in hoek of landmine attachment. Druk schuin omhoog en voor je. Natuurlijkere beweging voor schouders die schouderproblemen hebben. Unilateraal mogelijk.",yt:"landmine+press"},
  "Machine Shoulder Press":{muscle:"schouders",unit:"kg",rest:75,info:"Zit rechtop in de machine. Duw recht omhoog. Stabiel en veilig — ideaal als je alleen traint of voor hoge volume sets zonder stabilisatie-vermoeidheid.",yt:"machine+shoulder+press"},
  // ── ARMEN EXTRA ─────────────────────────────────────────────
  "Cable Curl":{muscle:"biceps",unit:"kg",rest:45,info:"Kabel laag instellen. Curl omhoog met constante spanning door de hele beweging — anders dan dumbbells die bovenaan licht worden. Goede finisher voor biceps.",yt:"cable+curl"},
  "EZ Bar Curl":{muscle:"biceps",unit:"kg",rest:60,info:"EZ-stang met gebogen greep. Minder polsbelasting dan rechte stang. Werkt zowel de lange als korte kop van de biceps. Populair alternatief voor barbell curl.",yt:"ez+bar+curl"},
  "Preacher Curl":{muscle:"biceps",unit:"kg",rest:60,info:"Ellebogen op preacher bank. Ellebogen kunnen niet bewegen, dus puur bicep. Beste oefening voor de bicep-piek. Laat volledig uitstrekken onderaan.",yt:"preacher+curl"},
  "Reverse Curl":{muscle:"biceps",unit:"kg",rest:45,info:"Overhandse greep bij curlen. Werkt de brachialis en onderarm. Minder gewicht dan normale curl. Geeft vollere armen en sterkere polsen.",yt:"reverse+curl"},
  "Overhead Tricep Extension":{muscle:"triceps",unit:"kg",rest:60,info:"Houd één dumbbell met beide handen boven je hoofd. Laat zakken achter je hoofd. Strek uit. Werkt de lange kop van de triceps optimaal door het uitrekken.",yt:"overhead+tricep+extension"},
  "Tricep Kickback":{muscle:"triceps",unit:"kg",rest:45,info:"Voorovergebogen, elleboog langs je lichaam. Strek de onderarm naar achteren. Houd even vast. Pure tricep-isolatie. Licht gewicht, goed voor definitie.",yt:"tricep+kickback"},
  "Close Grip Push-up":{muscle:"triceps",unit:"reps",rest:30,info:"Handen dichter bij elkaar dan schouderbreedte, vingers soms naar binnen wijzend. Meer triceps, minder borst dan normale push-up. Voet voor voetgang voor gevorderden.",yt:"close+grip+pushup"},
  "Diamond Push-up":{muscle:"triceps",unit:"reps",rest:30,info:"Handen vormen een diamant-vorm onder je borst. Maximale tricep-activatie. Geavanceerde variant — werk naar toe vanuit normale close-grip push-up.",yt:"diamond+push+up"},
  "Wrist Curl":{muscle:"biceps",unit:"kg",rest:30,info:"Zit, onderarmen op je knieën of bank. Curl je polsen omhoog met dumbbells of stang. Bouwt onderarmkracht op. Nodig voor betere grip bij alle oefeningen.",yt:"wrist+curl+exercise"},
  // ── BILLEN EXTRA ────────────────────────────────────────────
  "Cable Kickback":{muscle:"billen",unit:"kg",rest:30,info:"Kabel laag met enkelbandage. Schop been naar achteren terwijl je iets vooroverleunt. Knijp bil samen bovenaan. Goed isolatieapparaat voor billen.",yt:"cable+glute+kickback"},
  "Sumo Squat":{muscle:"billen",unit:"kg",rest:60,info:"Brede stand, tenen ver naar buiten. Houd één zware dumbbell voor je vast. Zak diep. Treft billen en binnenste dijen meer dan normale squat.",yt:"sumo+squat+dumbbell"},
  "Clamshell":{muscle:"billen",unit:"reps",rest:20,info:"Lig op je zij, knieën gebogen op 45 graden. Open je knieën als een schelp. Met of zonder weerstandsband. Isoleert gluteus medius — de zijkant van je bil.",yt:"clamshell+exercise"},
  "Fire Hydrant":{muscle:"billen",unit:"reps",rest:20,info:"Op handen en knieën. Hef een knie zijwaarts omhoog, als een hond bij een brandkraan. Houd heupen stabiel. Werkt gluteus medius en minimus effectief.",yt:"fire+hydrant+exercise"},
  "Single Leg Deadlift":{muscle:"billen",unit:"kg",rest:60,info:"Sta op één been. Kantel voorover terwijl je het vrije been naar achteren strekt. Dumbbell in één hand. Uitstekende evenwicht- en biltraining. Start licht.",yt:"single+leg+deadlift"},
  "Frog Pump":{muscle:"billen",unit:"reps",rest:20,info:"Lig op rug, voetzolen tegen elkaar, knieën wijd. Duw heupen omhoog. Unieke hoek die de billen anders activeert dan normale glute bridge. Beter met weerstandsband.",yt:"frog+pump+glutes"},

  "Ab Wheel Rollout":{muscle:"buik",unit:"reps",rest:30,info:"Begin op knieën met ab wheel. Rol naar voren zo ver als je kunt terwijl je core strak houdt. Rol terug. Een van de moeilijkste core-oefeningen. Bouw langzaam op.",yt:"ab+wheel+rollout"},
  "Bicycle Crunch":{muscle:"buik",unit:"reps",rest:20,info:"Lig op rug. Breng elleboog naar tegenovergestelde knie terwijl je wisselt. Rotatie activeert obliques. Niet te snel gaan — kwaliteit boven kwantiteit.",yt:"bicycle+crunch"},
  "Russian Twist":{muscle:"buik",unit:"reps",rest:20,info:"Zit met voeten omhoog, rug licht achterover. Roteer van links naar rechts met gewicht of zonder. Werkt de obliques. Houd core constant gespannen.",yt:"russian+twist"},
  "Dead Bug":{muscle:"buik",unit:"reps",rest:20,info:"Lig op rug, armen omhoog, knieën 90 graden. Laat tegenovergestelde arm en been zakken zonder je rug te laten weggaan van de grond. Briljante core-stabiliteit oefening.",yt:"dead+bug+exercise"},
  "Dragon Flag":{muscle:"buik",unit:"reps",rest:45,info:"Lig op bank, houd de bank achter je hoofd. Houd je lichaam recht en laat het gecontroleerd zakken en omhoog komen. Bruce Lee's favoriete oefening. Extreem moeilijk.",yt:"dragon+flag"},
  "V-Up":{muscle:"buik",unit:"reps",rest:20,info:"Lig plat. Kom tegelijkertijd omhoog met armen en benen tot je een V-vorm maakt. Raak je voeten of enkels. Laat gecontroleerd zakken. Werkt upper en lower abs tegelijk.",yt:"v+up+exercise"},

  "Pallof Press":{muscle:"buik",unit:"reps",rest:30,info:"Kabel op borsthoogte. Staan naast de kabel. Druk het handvat recht voor je uit en trek terug. Anti-rotatie core-oefening. Traint core-stabiliteit, niet beweging.",yt:"pallof+press"},

function getSetValueOptions(unit){
  if(unit==="sec")return SEC_OPT;
  if(unit==="reps")return REPS_OPT;
  if(unit==="banen")return BANEN_OPT;
  return KG_OPT;
}
function fmtVal(v,unit){
  if(!v&&v!==0)return"–";if(!v)return"–";
  if(unit==="sec"){if(v>=3600)return`${Math.floor(v/3600)}u${Math.floor((v%3600)/60)?Math.floor((v%3600)/60)+'m':''}`;if(v>=60)return`${Math.floor(v/60)}m${v%60?v%60+'s':''}`;return`${v}s`;}
  if(unit==="reps")return`${v}x`;
  if(unit==="banen")return`${v} banen`;
  return`${v>0?v+"kg":"–"}`;
}

// Slimme labels per unit en oefening
function unitLabel(unit,exName){
  if(unit==="sec"){
    const n=(exName||"").toLowerCase();
    if(n.includes("hardlop")||n.includes("sprint")||n.includes("wandel")||n.includes("interval"))return"Duur";
    return"Tijd";
  }
  if(unit==="banen")return"Banen";
  if(unit==="reps")return"Herhalingen";
  return"Gewicht";
}
function setLabel(unit,idx){
  if(unit==="sec")return`Ronde ${idx+1}`;
  if(unit==="banen")return`Ronde ${idx+1}`;
  return`Set ${idx+1}`;
}

function AuthScreen({onAuth}){
  const [mode,setMode]=useState("login"); // login | register
  const [email,setEmail]=useState("");
  const [pw,setPw]=useState("");
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");
  const [ok,setOk]=useState("");

  async function handle(){
    setErr("");setOk("");
    if(!email||!pw){setErr("Vul email en wachtwoord in.");return;}
    setLoading(true);
    if(mode==="register"){
      const {data,error}=await sb.auth.signUp({email,password:pw});
      if(error){setErr(error.message);setLoading(false);return;}
      // Track registratie statistiek
      await sbInsert("stats",{event:"register",created_at:new Date().toISOString()});
      setOk("Account aangemaakt! Check je email voor bevestiging.");
      setLoading(false);
    } else {
      const {data,error}=await sb.auth.signInWithPassword({email,password:pw});
      if(error){setErr("Email of wachtwoord klopt niet.");setLoading(false);return;}
      await sbInsert("stats",{event:"login",user_id:data.user.id,created_at:new Date().toISOString()});
      onAuth(data.user);
    }
  }

  async function handleForgot(){
    if(!email){setErr("Vul eerst je email in.");return;}
    await sb.auth.resetPasswordForEmail(email);
    setOk("Reset link verstuurd naar "+email);
  }

  return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",justifyContent:"flex-end",padding:"0 24px 52px",background:"#0D0D0D"}}>
      <div style={{marginBottom:40}}>
        <div style={{fontSize:11,letterSpacing:3,color:"#444",fontWeight:700,textTransform:"uppercase",marginBottom:8}}>FitCoach Pro</div>
        <div style={{fontSize:40,fontWeight:900,letterSpacing:-2,lineHeight:1,marginBottom:8}}>
          {mode==="login"?"Welkom terug.":"Account aanmaken."}
        </div>
        <div style={{fontSize:14,color:"#555"}}>
          {mode==="login"?"Log in om verder te gaan":"Gratis beginnen met Finn"}
        </div>
      </div>

      <div style={{marginBottom:16}}>
        <input
          value={email} onChange={e=>setEmail(e.target.value)}
          placeholder="Email" type="email"
          style={{width:"100%",padding:"16px",borderRadius:14,border:"1px solid #222",background:"#141414",color:"#fff",fontSize:15,outline:"none",marginBottom:10,boxSizing:"border-box"}}
        />
        <input
          value={pw} onChange={e=>setPw(e.target.value)}
          placeholder="Wachtwoord" type="password"
          onKeyDown={e=>e.key==="Enter"&&handle()}
          style={{width:"100%",padding:"16px",borderRadius:14,border:"1px solid #222",background:"#141414",color:"#fff",fontSize:15,outline:"none",marginBottom:10,boxSizing:"border-box"}}
        />
        {err&&<div style={{fontSize:12,color:"#ef4444",marginBottom:8}}>{err}</div>}
        {ok&&<div style={{fontSize:12,color:LIME,marginBottom:8}}>{ok}</div>}
      </div>

      <button onClick={handle} disabled={loading} style={{width:"100%",padding:"17px",borderRadius:16,border:"none",cursor:"pointer",background:loading?"#1a1a1a":LIME,color:loading?"#555":"#000",fontSize:16,fontWeight:900,marginBottom:12}}>
        {loading?"Bezig...":(mode==="login"?"Inloggen":"Account aanmaken")}
      </button>

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <button onClick={()=>{setMode(m=>m==="login"?"register":"login");setErr("");setOk("");}} style={{background:"none",border:"none",color:"#555",fontSize:13,cursor:"pointer"}}>
          {mode==="login"?"Nog geen account? Registreer":"Al een account? Log in"}
        </button>
        {mode==="login"&&<button onClick={handleForgot} style={{background:"none",border:"none",color:"#333",fontSize:12,cursor:"pointer"}}>Wachtwoord vergeten</button>}
      </div>
    </div>
  );
}

function RestTimer({seconds,onDone}){
  const [left,setLeft]=useState(seconds);
  const ref=useRef(null);
  useEffect(()=>{
    if(left>0){ref.current=setTimeout(()=>setLeft(l=>l-1),1000);}
    else{if(onDone)onDone();}
    return()=>clearTimeout(ref.current);
  },[left]);
  const pct=(left/seconds)*100;
  const w=pct/100*240;
  return(
    <div style={{background:"#0D0D0D",border:"1px solid #1C1C1C",borderRadius:14,padding:"14px 16px",marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div>
          <div style={{fontSize:10,letterSpacing:3,color:"#444",fontWeight:700,textTransform:"uppercase",marginBottom:2}}>Rust</div>
          <div style={{fontSize:28,fontWeight:900,letterSpacing:-1,color:LIME,lineHeight:1}}>{left}<span style={{fontSize:13,color:"#444",fontWeight:400,marginLeft:2}}>sec</span></div>
        </div>
        <button onClick={()=>{clearTimeout(ref.current);if(onDone)onDone();}} style={{padding:"8px 16px",borderRadius:8,border:"1px solid #222",background:"none",color:"#555",fontSize:12,fontWeight:700,cursor:"pointer",letterSpacing:1}}>SKIP</button>
      </div>
      <div style={{background:"#1A1A1A",borderRadius:2,height:2,overflow:"hidden"}}>
        <div style={{width:`${pct}%`,height:2,background:LIME,transition:"width .9s linear"}}/>
      </div>
    </div>
  );
}

// ── HIIT WORKOUT — modern, raw, geen emoji ────────────────────
function HiitWorkout({exercises,onDone,voiceOn}){
  const WORK_OPTS=[20,30,40,45];
  const REST_HIIT_OPTS=[10,15,20,30];
  const DUR_OPTS=[10,15,20,30,45];
  const EX_COUNT_OPTS=[4,5,6,7,8];
  const ROUNDS_OPTS=[2,3,4,5];

  const [configured,setConfigured]=useState(false);
  const [workSec,setWorkSec]=useState(40);
  const [restSec,setRestSec]=useState(20);
  const [durMin,setDurMin]=useState(20);
  const [exCount,setExCount]=useState(6);
  const [rounds,setRounds]=useState(3);
  const [useWeights,setUseWeights]=useState(false);
  const [phase,setPhase]=useState("work");
  const [left,setLeft]=useState(workSec);
  const [exIdx,setExIdx]=useState(0);
  const [roundIdx,setRoundIdx]=useState(1);
  const [totalLeft,setTotalLeft]=useState(durMin*60);
  const [running,setRunning]=useState(false);
  const ref=useRef(null);
  const totalRef=useRef(null);

  // Filter op gewichten voorkeur
  const ALL_HIIT_EX=Object.entries(EX_DB).filter(([n,db])=>
    ["full body","benen","buik","borst","armen"].includes(db.muscle)&&
    (useWeights||(db.unit==="reps"||db.unit==="sec"))
  ).map(([n])=>n);

  // Kies oefeningen uit de meegeleverde exercises + aanvullen uit DB
  const poolBase=exercises.map(e=>e.name);
  const poolExtra=ALL_HIIT_EX.filter(n=>!poolBase.includes(n));
  const pool=[...poolBase,...poolExtra];
  const circuitEx=pool.slice(0,exCount);

  function say(txt){if(voiceOn)speak(txt);}

  // Bereken totale rondes op basis van duur
  const totalSets=circuitEx.length*rounds;
  const totalSecCalc=(workSec+restSec)*totalSets;
  const estMin=Math.round(totalSecCalc/60);

  useEffect(()=>{
    if(!configured||!running)return;
    if(left>0){
      ref.current=setTimeout(()=>{
        const nl=left-1;setLeft(nl);
        if(nl===3&&phase==="work")say("Drie. Twee. Één.");
        if(nl===3&&phase==="rest")say("Drie. Twee. Één. Go!");
      },1000);
    } else {
      if(phase==="work"){
        say("Rust.");
        setPhase("rest");setLeft(restSec);
      } else {
        const ni=exIdx+1;
        if(ni>=circuitEx.length){
          // Ronde klaar
          const nr=roundIdx+1;
          if(nr>rounds){say("Training voltooid.");setRunning(false);setPhase("done");}
          else{say(`Ronde ${nr} van ${rounds}. ${circuitEx[0]}.`);setRoundIdx(nr);setExIdx(0);setPhase("work");setLeft(workSec);}
        } else {
          say(`${circuitEx[ni]}.`);setExIdx(ni);setPhase("work");setLeft(workSec);
        }
      }
    }
    return()=>clearTimeout(ref.current);
  },[configured,running,left,phase]);

  useEffect(()=>{
    if(!configured||!running)return;
    totalRef.current=setTimeout(()=>{
      const nt=totalLeft-1;setTotalLeft(nt);
      if(nt<=0){say("Tijd om.");setRunning(false);setPhase("done");}
    },1000);
    return()=>clearTimeout(totalRef.current);
  },[configured,running,totalLeft]);

  // Config scherm
  if(!configured) return(
    <div>
      <div style={{fontSize:11,letterSpacing:3,color:"#444",fontWeight:700,textTransform:"uppercase",marginBottom:20}}>Stel jouw circuit in</div>

      <div style={{marginBottom:18}}>
        <div style={{fontSize:13,color:"#888",marginBottom:10,fontWeight:600}}>Aantal oefeningen per ronde</div>
        <div style={{display:"flex",gap:8}}>
          {EX_COUNT_OPTS.map(n=>(
            <button key={n} onClick={()=>setExCount(n)} style={{flex:1,padding:"13px 4px",borderRadius:12,border:`1px solid ${exCount===n?ORANGE:"#1C1C1C"}`,background:exCount===n?"rgba(255,107,43,0.1)":"#111",color:exCount===n?ORANGE:"#444",fontWeight:900,fontSize:16,cursor:"pointer"}}>{n}</button>
          ))}
        </div>
      </div>

      <div style={{marginBottom:18}}>
        <div style={{fontSize:13,color:"#888",marginBottom:10,fontWeight:600}}>Rondes</div>
        <div style={{display:"flex",gap:8}}>
          {ROUNDS_OPTS.map(n=>(
            <button key={n} onClick={()=>setRounds(n)} style={{flex:1,padding:"13px 4px",borderRadius:12,border:`1px solid ${rounds===n?"#fff":"#1C1C1C"}`,background:rounds===n?"rgba(255,255,255,0.06)":"#111",color:rounds===n?"#fff":"#444",fontWeight:900,fontSize:16,cursor:"pointer"}}>{n}x</button>
          ))}
        </div>
      </div>

      <div style={{marginBottom:18}}>
        <div style={{fontSize:13,color:"#888",marginBottom:10,fontWeight:600}}>Work tijd per oefening</div>
        <div style={{display:"flex",gap:8}}>
          {WORK_OPTS.map(s=>(
            <button key={s} onClick={()=>setWorkSec(s)} style={{flex:1,padding:"13px 4px",borderRadius:12,border:`1px solid ${workSec===s?ORANGE:"#1C1C1C"}`,background:workSec===s?"rgba(255,107,43,0.1)":"#111",color:workSec===s?ORANGE:"#444",fontWeight:900,fontSize:15,cursor:"pointer"}}>
              {s}<span style={{fontSize:9,marginLeft:1}}>s</span>
            </button>
          ))}
        </div>
      </div>

      <div style={{marginBottom:18}}>
        <div style={{fontSize:13,color:"#888",marginBottom:10,fontWeight:600}}>Rust tussen oefeningen</div>
        <div style={{display:"flex",gap:8}}>
          {REST_HIIT_OPTS.map(s=>(
            <button key={s} onClick={()=>setRestSec(s)} style={{flex:1,padding:"13px 4px",borderRadius:12,border:`1px solid ${restSec===s?LIME:"#1C1C1C"}`,background:restSec===s?"rgba(200,241,56,0.08)":"#111",color:restSec===s?LIME:"#444",fontWeight:900,fontSize:15,cursor:"pointer"}}>
              {s}<span style={{fontSize:9,marginLeft:1}}>s</span>
            </button>
          ))}
        </div>
      </div>

      <div style={{marginBottom:20}}>
        <button onClick={()=>setUseWeights(v=>!v)} style={{width:"100%",padding:"12px 16px",borderRadius:12,border:`1px solid ${useWeights?LIME:"#1C1C1C"}`,background:useWeights?"rgba(200,241,56,0.06)":"#111",color:useWeights?LIME:"#555",fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span>Oefeningen met gewichten</span>
          <span style={{fontSize:11,color:useWeights?LIME:"#333"}}>{useWeights?"Aan":"Uit"}</span>
        </button>
      </div>

      {/* Geschatte duur */}
      <div style={{background:"#0D0D0D",borderRadius:12,padding:"10px 14px",marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{fontSize:12,color:"#555"}}>Geschatte duur</div>
        <div style={{fontSize:14,fontWeight:900,color:estMin>45?"#ef4444":LIME}}>{estMin} min {estMin>45&&<span style={{fontSize:11,color:"#ef4444"}}>· te lang!</span>}</div>
      </div>

      {/* Circuit preview */}
      <div style={{background:"#0D0D0D",borderRadius:14,padding:14,marginBottom:20}}>
        <div style={{fontSize:10,letterSpacing:3,color:"#333",fontWeight:700,textTransform:"uppercase",marginBottom:10}}>Circuit ({circuitEx.length} oefeningen · {rounds} rondes)</div>
        {circuitEx.map((name,i)=>(
          <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingBottom:8,marginBottom:8,borderBottom:i<circuitEx.length-1?"1px solid #111":"none"}}>
            <div style={{fontSize:13,color:"#ccc",fontWeight:600}}>{name}</div>
            <div style={{fontSize:10,color:"#333"}}>{workSec}s · {restSec}s rust</div>
          </div>
        ))}
      </div>

      <button onClick={()=>{
        setConfigured(true);setLeft(workSec);setTotalLeft(durMin*60);
        say(`${rounds} rondes. ${circuitEx.length} oefeningen. Ronde 1. ${circuitEx[0]}. Start.`);
        setRunning(true);
      }} disabled={estMin>45} style={{width:"100%",padding:18,borderRadius:14,border:"none",cursor:estMin>45?"default":"pointer",background:estMin>45?"#1C1C1C":ORANGE,color:estMin>45?"#444":"#fff",fontSize:16,fontWeight:900,letterSpacing:-0.5}}>
        {estMin>45?"Verklein circuit (max 45 min)":"Start circuit"}
      </button>
    </div>
  );

  if(phase==="done") return(
    <div style={{padding:"60px 0",textAlign:"center"}}>
      <div style={{fontSize:11,letterSpacing:4,color:"#444",fontWeight:700,textTransform:"uppercase",marginBottom:16}}>Voltooid</div>
      <div style={{fontSize:52,fontWeight:900,letterSpacing:-2,color:LIME,marginBottom:4,lineHeight:1}}>{rounds} rondes</div>
      <div style={{fontSize:14,color:"#555",marginBottom:8}}>{circuitEx.length} oefeningen · HIIT circuit</div>
      <button onClick={onDone} style={{padding:"16px 40px",borderRadius:14,border:"none",cursor:"pointer",background:LIME,color:"#000",fontSize:15,fontWeight:900}}>Opslaan</button>
    </div>
  );

  const isWork=phase==="work";
  const curEx=circuitEx[exIdx%circuitEx.length];
  const nextExName=isWork?circuitEx[(exIdx+1)%circuitEx.length]:(exIdx+1>=circuitEx.length?circuitEx[0]:circuitEx[(exIdx+1)%circuitEx.length]);
  const curSec=isWork?workSec:restSec;
  const pct=(left/curSec)*100;
  const totalPct=((rounds*circuitEx.length-(roundIdx-1)*circuitEx.length-exIdx)/(rounds*circuitEx.length))*100;
  const isAlert=left<=3&&running;

  return(
    <div>
      <div style={{marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:10,letterSpacing:2,color:"#333",fontWeight:700,textTransform:"uppercase",marginBottom:6}}>
          <span>Ronde {roundIdx} / {rounds}</span>
          <span>{Math.floor(totalLeft/60)}:{String(totalLeft%60).padStart(2,'0')}</span>
        </div>
        <div style={{background:"#111",borderRadius:2,height:2}}><div style={{width:`${Math.min(100,100-totalPct)}%`,height:2,background:"#333",transition:"width 1s linear"}}/></div>
      </div>

      <div style={{background:"#0D0D0D",borderRadius:20,padding:"32px 24px",marginBottom:12,textAlign:"center",border:`1px solid ${isWork?"#1C1C1C":"rgba(200,241,56,0.1)"}`}}>
        <div style={{fontSize:10,letterSpacing:4,fontWeight:700,textTransform:"uppercase",color:isWork?ORANGE:LIME,marginBottom:16}}>{isWork?"Work":"Rust"}</div>
        {isWork&&<div style={{fontSize:28,fontWeight:900,letterSpacing:-1,marginBottom:4}}>{curEx}</div>}
        {!isWork&&<div style={{marginBottom:16}}><div style={{fontSize:12,color:"#444",marginBottom:4}}>Volgende</div><div style={{fontSize:22,fontWeight:900,color:"#888"}}>{nextExName}</div></div>}
        <div style={{fontSize:isAlert?90:76,fontWeight:900,letterSpacing:-4,lineHeight:1,color:isAlert?"#ef4444":isWork?ORANGE:LIME,transition:"color .3s",marginBottom:6}}>{left}</div>
        <div style={{fontSize:10,letterSpacing:3,color:"#333",textTransform:"uppercase"}}>seconden</div>
        <div style={{background:"#111",borderRadius:2,height:2,marginTop:20,overflow:"hidden"}}><div style={{width:`${pct}%`,height:2,background:isWork?ORANGE:LIME,transition:"width .9s linear"}}/></div>
      </div>

      {isWork&&<div style={{background:"#0D0D0D",border:"1px solid #111",borderRadius:12,padding:"10px 16px",marginBottom:12,display:"flex",justifyContent:"space-between"}}>
        <div style={{fontSize:10,letterSpacing:2,color:"#333",fontWeight:700,textTransform:"uppercase"}}>Daarna</div>
        <div style={{fontSize:13,color:"#555",fontWeight:600}}>{circuitEx[(exIdx+1)%circuitEx.length]}</div>
      </div>}

      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>setRunning(r=>!r)} style={{flex:1,padding:"16px",borderRadius:14,border:"none",cursor:"pointer",background:running?"#1C1C1C":ORANGE,color:running?"#555":"#fff",fontSize:13,fontWeight:900,letterSpacing:1,textTransform:"uppercase"}}>{running?"Pauze":"Hervat"}</button>
        <button onClick={()=>setLeft(0)} style={{padding:"16px 20px",borderRadius:14,border:"1px solid #1C1C1C",background:"none",color:"#444",fontSize:11,fontWeight:700,cursor:"pointer",letterSpacing:1,textTransform:"uppercase"}}>Skip</button>
      </div>
    </div>
  );
}

// ── GPS RUN TRACKER — volledig herbouwd ──────────────────────
function haversine(a,b){
  const R=6371000,dLat=(b.lat-a.lat)*Math.PI/180,dLon=(b.lon-a.lon)*Math.PI/180;
  const x=Math.sin(dLat/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(x));
}

function RunTracker({voiceOn,onDone,prevRun}){
  const GOALS={free:{label:"Vrij lopen",target:0},k5:{label:"5 km",target:5000},k10:{label:"10 km",target:10000},half:{label:"Halve marathon",target:21097},marathon:{label:"Marathon",target:42195}};
  const [phase,setPhase]=useState("setup");
  const [runType,setRunType]=useState("steady");
  const [selectedGoal,setSelectedGoal]=useState("free");
  const [sprintSec,setSprintSec]=useState(30);
  const [restSec,setRestSec]=useState(90);
  const [voiceKm,setVoiceKm]=useState(true);
  const [voiceInterval,setVoiceInterval]=useState(true);

  // Live run state
  const [dist,setDist]=useState(0);
  const [elapsed,setElapsed]=useState(0);
  const [isRunning,setIsRunning]=useState(false);
  const [kmSplits,setKmSplits]=useState([]); // [{km, time}]
  const [intervalPhase,setIntervalPhase]=useState("sprint");
  const [intervalLeft,setIntervalLeft]=useState(sprintSec);
  const [intervalCount,setIntervalCount]=useState(0);
  const [gpsError,setGpsError]=useState("");

  const watchRef=useRef(null);
  const timerRef=useRef(null);
  const intRef=useRef(null);
  const lastPosRef=useRef(null);
  const distRef=useRef(0);
  const elapsedRef=useRef(0);
  const kmAlertsRef=useRef([]);

  function say(txt){if(voiceOn)speak(txt);}
  function fmtTime(s){const m=Math.floor(s/60),sec=s%60;return`${m}:${String(sec).padStart(2,'0')}`;}
  function calcPace(d,t){if(d<50)return"–";const mpm=(t/60)/(d/1000);return`${Math.floor(mpm)}:${String(Math.round((mpm%1)*60)).padStart(2,'0')}`;}
  function calcSpeed(d,t){if(d<50||t<1)return"0.0";return((d/1000)/(t/3600)).toFixed(1);}

  function startRun(){
    setPhase("running");setIsRunning(true);
    setDist(0);setElapsed(0);distRef.current=0;elapsedRef.current=0;
    kmAlertsRef.current=[];setKmSplits([]);

    say(prevRun
      ?`Vorige run: ${(prevRun.dist/1000).toFixed(1)} kilometer in ${fmtTime(prevRun.time)}. Succes!`
      :`${GOALS[selectedGoal].label}. Start!`
    );

    // GPS watchPosition
    if(navigator.geolocation){
      watchRef.current=navigator.geolocation.watchPosition(pos=>{
        const newP={lat:pos.coords.latitude,lon:pos.coords.longitude};
        if(lastPosRef.current){
          const d=haversine(lastPosRef.current,newP);
          if(d>1&&d<200){ // filter GPS sprongen
            distRef.current+=d;
            setDist(distRef.current);
          }
        }
        lastPosRef.current=newP;
      },{enableHighAccuracy:true,maximumAge:2000,timeout:10000},
      err=>{setGpsError("GPS niet beschikbaar. Controleer toestemming.");});
    } else setGpsError("GPS niet ondersteund op dit apparaat.");

    // Hoofdtimer — elke seconde
    timerRef.current=setInterval(()=>{
      elapsedRef.current+=1;
      setElapsed(elapsedRef.current);

      // Km-alert
      const km=Math.floor(distRef.current/1000);
      if(km>0&&!kmAlertsRef.current.includes(km)){
        kmAlertsRef.current=[...kmAlertsRef.current,km];
        setKmSplits(prev=>[...prev,{km,time:elapsedRef.current}]);
        if(voiceKm){
          const p=calcPace(distRef.current,elapsedRef.current);
          const sp=calcSpeed(distRef.current,elapsedRef.current);
          say(`${km} kilometer. Tempo ${p} per kilometer. Snelheid ${sp} kilometer per uur.`);
        }
        // Doel bereikt?
        const target=GOALS[selectedGoal].target;
        if(target>0&&distRef.current>=target){
          say(`Gefeliciteerd! ${GOALS[selectedGoal].label} voltooid in ${fmtTime(elapsedRef.current)}!`);
          stopRun(true);
        }
      }
    },1000);

    // Interval timer
    if(runType==="interval"){
      setIntervalLeft(sprintSec);setIntervalPhase("sprint");setIntervalCount(0);
      intRef.current=setInterval(()=>{
        setIntervalLeft(l=>{
          if(l<=1){
            setIntervalPhase(ip=>{
              if(ip==="sprint"){
                if(voiceInterval)say("Herstel. Rustig joggen.");
                setIntervalCount(c=>c+1);
                setIntervalLeft(restSec);
                return"recovery";
              } else {
                if(voiceInterval)say("Sprint! Alles geven!");
                setIntervalLeft(sprintSec);
                return"sprint";
              }
            });
            return 0;
          }
          if(l===4&&voiceInterval)setIntervalPhase(ip=>{
            say(ip==="sprint"?"Vier seconden, herstel komt!":"Vier seconden, sprint!");
            return ip;
          });
          return l-1;
        });
      },1000);
    }
  }

  function pauseRun(){
    setIsRunning(false);
    clearInterval(timerRef.current);
    clearInterval(intRef.current);
    if(watchRef.current)navigator.geolocation.clearWatch(watchRef.current);
  }

  function resumeRun(){
    setIsRunning(true);
    timerRef.current=setInterval(()=>{
      elapsedRef.current+=1;setElapsed(elapsedRef.current);
      const km=Math.floor(distRef.current/1000);
      if(km>0&&!kmAlertsRef.current.includes(km)){
        kmAlertsRef.current=[...kmAlertsRef.current,km];
        setKmSplits(prev=>[...prev,{km,time:elapsedRef.current}]);
        if(voiceKm)say(`${km} kilometer. Tempo ${calcPace(distRef.current,elapsedRef.current)} per kilometer.`);
      }
    },1000);
    if(navigator.geolocation){
      watchRef.current=navigator.geolocation.watchPosition(pos=>{
        const newP={lat:pos.coords.latitude,lon:pos.coords.longitude};
        if(lastPosRef.current){const d=haversine(lastPosRef.current,newP);if(d>1&&d<200){distRef.current+=d;setDist(distRef.current);}}
        lastPosRef.current=newP;
      },{enableHighAccuracy:true,maximumAge:2000});
    }
  }

  function stopRun(finished=false){
    clearInterval(timerRef.current);clearInterval(intRef.current);
    if(watchRef.current)navigator.geolocation.clearWatch(watchRef.current);
    setIsRunning(false);
    if(finished||distRef.current>100){
      say(`Run gestopt. ${(distRef.current/1000).toFixed(2)} kilometer in ${fmtTime(elapsedRef.current)}.`);
      setPhase("done");
    } else setPhase("setup");
  }

  useEffect(()=>()=>{clearInterval(timerRef.current);clearInterval(intRef.current);if(watchRef.current)navigator.geolocation.clearWatch(watchRef.current);},[]);

  // Setup scherm
  if(phase==="setup") return(
    <div>
      {prevRun&&<div style={{background:"#0D0D0D",border:"1px solid #1C1C1C",borderRadius:14,padding:14,marginBottom:16}}>
        <div style={{fontSize:10,letterSpacing:3,color:"#444",fontWeight:700,textTransform:"uppercase",marginBottom:8}}>Vorige run</div>
        <div style={{display:"flex",gap:20}}>
          <div><div style={{fontSize:22,fontWeight:900,color:LIME}}>{(prevRun.dist/1000).toFixed(2)}<span style={{fontSize:11,color:"#444",marginLeft:2}}>km</span></div><div style={{fontSize:10,color:"#555"}}>afstand</div></div>
          <div><div style={{fontSize:22,fontWeight:900}}>{fmtTime(prevRun.time)}</div><div style={{fontSize:10,color:"#555"}}>tijd</div></div>
          <div><div style={{fontSize:22,fontWeight:900}}>{prevRun.pace||"–"}</div><div style={{fontSize:10,color:"#555"}}>min/km</div></div>
        </div>
      </div>}

      <div style={{marginBottom:18}}>
        <div style={{fontSize:10,letterSpacing:3,color:"#444",fontWeight:700,textTransform:"uppercase",marginBottom:10}}>Doel</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {Object.entries(GOALS).map(([k,g])=>(
            <button key={k} onClick={()=>setSelectedGoal(k)} style={{padding:"12px",borderRadius:12,border:`1px solid ${selectedGoal===k?LIME:"#1C1C1C"}`,background:selectedGoal===k?"rgba(200,241,56,0.06)":"#111",color:selectedGoal===k?LIME:"#666",fontSize:13,fontWeight:700,cursor:"pointer",textAlign:"left"}}>
              <div style={{fontWeight:900}}>{g.label}</div>
              {g.target>0&&<div style={{fontSize:10,color:"#444",marginTop:2}}>{(g.target/1000).toFixed(1)} km</div>}
            </button>
          ))}
        </div>
      </div>

      <div style={{marginBottom:18}}>
        <div style={{fontSize:10,letterSpacing:3,color:"#444",fontWeight:700,textTransform:"uppercase",marginBottom:10}}>Type</div>
        <div style={{display:"flex",gap:8}}>
          {[{v:"steady",l:"Steady run",d:"Constant tempo"},{v:"interval",l:"Interval",d:"Sprint / herstel"}].map(t=>(
            <button key={t.v} onClick={()=>setRunType(t.v)} style={{flex:1,padding:"14px",borderRadius:12,border:`1px solid ${runType===t.v?ORANGE:"#1C1C1C"}`,background:runType===t.v?"rgba(255,107,43,0.08)":"#111",cursor:"pointer",textAlign:"left"}}>
              <div style={{fontSize:13,fontWeight:900,color:runType===t.v?ORANGE:"#fff"}}>{t.l}</div>

function buildSession(muscles,log,profile){
  const stype=profile?.sportType||"kracht";
  const epref=profile?.equipmentPref||"mixed";
  const level=profile?.level||"beginner";
  const goal=profile?.goal||"fitter";
  const age=parseInt(profile?.age)||30;
  const diffs=LS.get("fitcoach_difficulty")||{}; // zwaar | goed | makkelijk per spiergroep
  const machineEx=["Leg Press","Leg Extension","Leg Curl","Lat Pulldown","Seated Cable Row","Cable Fly","Triceps Pushdown","Face Pulls"];
  const dumbEx=["Incline Dumbbell Press","Lateral Raises","Hammer Curl","Incline Dumbbell Curl","Concentration Curl","Arnold Press"];
  // Oefeningen die te zwaar zijn voor senioren
  const seniorAvoid=["Deadlift","Squat","Skull Crushers","Nordic Curl","Dragon Flag","Clean and Press","Thruster"];
  const exercises=[];
  muscles.forEach(muscle=>{
    const variants=ALL_WV[muscle]||WV[muscle]||WV["full body"];
    if(!variants)return;
    const prevCount=log.filter(e=>(e.targetMuscles||[]).includes(muscle)).length;
    const variant=variants[prevCount%variants.length]||variants[0];
    const last=log.find(e=>(e.targetMuscles||[]).includes(muscle));
    const lastMap={};
    if(last)last.exercises.forEach(e=>{lastMap[e.name]=e;});
    let filtered=[...variant];
    if(stype==="kracht"||stype==="gemixed"){
      if(epref==="machines"){const m=variant.filter(ex=>machineEx.includes(ex.name));if(m.length>=2)filtered=m;}
      else if(epref==="dumbbells"){const d=variant.filter(ex=>dumbEx.includes(ex.name));if(d.length>=2)filtered=d;}
    }
    // Leeftijdsaanpassing: 60+ vermijdt zware compound lifts
    if(age>=60){filtered=filtered.filter(ex=>!seniorAvoid.includes(ex.name));}
    if(level==="beginner"||age>=65){
      // Beginners: 2 compounds + max 2 isolatie = 4 oefeningen
      const compounds=filtered.filter(e=>e.compound).slice(0,2);
      const isolatie=filtered.filter(e=>!e.compound).slice(0,2);
      filtered=[...compounds,...isolatie];
    } else if(level==="gemiddeld"){
      // Gemiddeld: 2 compounds + max 3 isolatie = 5 oefeningen
      const compounds=filtered.filter(e=>e.compound).slice(0,2);
      const isolatie=filtered.filter(e=>!e.compound).slice(0,3);
      filtered=[...compounds,...isolatie];
    } else {
      // Gevorderd: 2 compounds + max 4 isolatie = 6 oefeningen
      const compounds=filtered.filter(e=>e.compound).slice(0,2);
      const isolatie=filtered.filter(e=>!e.compound).slice(0,4);
      filtered=[...compounds,...isolatie];
    }
    filtered.forEach(ex=>{
      if(!exercises.find(e=>e.name===ex.name)){
        const db=EX_DB[ex.name]||{};
        const unit=db.unit||"kg";
        const prevEx=lastMap[ex.name];
        let weights=prevEx?[...prevEx.weights]:[...ex.weights];
        // Progressieve overload: als goal spiermassa en vorige data beschikbaar
        if(goal==="spiermassa"&&prevEx&&stype==="kracht"){
          const maxPrev=Math.max(0,...prevEx.weights.filter(w=>w>0));
          if(maxPrev>0){
            // Stel voor 2.5-5% meer gewicht
            const increment=maxPrev<20?1.25:maxPrev<50?2.5:5;
            weights=weights.map(w=>w>0?Math.round((w+increment)/2.5)*2.5:w);
          }
        }
        // Gewicht verlagen voor 60+
        if(age>=60){weights=weights.map(w=>w>0?Math.round(w*0.7/2.5)*2.5:w);}
        // Moeilijkheidsaanpassing op basis van vorige feedback
        const diff=diffs[muscle];
        if(diff==="makkelijk"){weights=weights.map(w=>w>0?Math.round((w*1.075)/2.5)*2.5:w);}
        if(diff==="zwaar"){weights=weights.map(w=>w>0?Math.round((w*0.9)/2.5)*2.5:w);}
        exercises.push({...ex,weights,note:"",saved:false,unit,info:db.info||"",yt:db.yt||"",prevWeights:prevEx?.weights||null,prevNote:prevEx?.note||""});
      }
    });
  });
  const adjusted=adjustForGoal(exercises,goal,stype);
  // Extra: meer rust voor senioren
  if(age>=60){adjusted.forEach(e=>{if(!e.restSecs)e.restSecs=90;});}
  if(goal==="afvallen"&&(stype==="kracht"||stype==="gemixed")){
    const cf=CARDIO_FINISH[Math.floor(Math.random()*CARDIO_FINISH.length)];
    const db=EX_DB[cf.name]||{};
    adjusted.push({...cf,note:"",saved:false,unit:cf.unit||"sec",info:db.info||"",yt:db.yt||"",prevWeights:null,prevNote:"",isCardioFinish:true});
  }
  return adjusted;
}

function Ring({pct,size=80,stroke=7,color=LIME,value,label}){
  const r=(size-stroke*2)/2,circ=2*Math.PI*r,offset=circ*(1-Math.min(1,(pct||0)/100));
  return(<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6}}><div style={{position:"relative",width:size,height:size}}><svg width={size} height={size} style={{transform:"rotate(-90deg)"}}><circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#1C1C1C" strokeWidth={stroke}/><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round" style={{transition:"stroke-dashoffset .8s ease"}}/></svg><div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{fontSize:size>70?15:12,fontWeight:800,color,lineHeight:1}}>{value}</div></div></div><div style={{fontSize:10,color:"#666",fontWeight:600,letterSpacing:0.5,textTransform:"uppercase",textAlign:"center"}}>{label}</div></div>);

function LineChart({data,height=120}){
  if(!data||data.length<2)return<div style={{height,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"#444"}}>Meer metingen nodig</div>;
  const vals=data.map(d=>d.w),mn=Math.min(...vals)-0.5,mx=Math.max(...vals)+0.5,rng=mx-mn,W=320,H=height-24;
  const pts=data.map((d,i)=>({x:20+(i/(data.length-1))*(W-40),y:H-((d.w-mn)/rng*H)+4,w:d.w,date:d.date}));
  const pd="M"+pts.map((p,i)=>{if(i===0)return`${p.x},${p.y}`;const pv=pts[i-1],cx=(pv.x+p.x)/2;return`C${cx},${pv.y} ${cx},${p.y} ${p.x},${p.y}`;}).join(" ");
  return(<svg viewBox={`0 0 ${W} ${height}`} style={{width:"100%",height}}><defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={LIME} stopOpacity="0.25"/><stop offset="100%" stopColor={LIME} stopOpacity="0"/></linearGradient></defs><path d={pd+` L${pts[pts.length-1].x},${H+4} L${pts[0].x},${H+4} Z`} fill="url(#lg)"/><path d={pd} fill="none" stroke={LIME} strokeWidth="2.5" strokeLinecap="round"/>{pts.map((p,i)=>(<g key={i}><circle cx={p.x} cy={p.y} r={i===pts.length-1?5:2.5} fill={i===pts.length-1?LIME:"#333"} stroke={i===pts.length-1?"#0D0D0D":"none"} strokeWidth={2}/>{(i===0||i===pts.length-1||data.length<=6)&&<text x={p.x} y={height-2} textAnchor="middle" fontSize="8" fill="#555">{p.date.slice(0,5)}</text>}{i===pts.length-1&&<text x={p.x} y={p.y-10} textAnchor="middle" fontSize="9" fill={LIME} fontWeight="700">{p.w}kg</text>}</g>))}</svg>);
}
function FinnPopup({onClose,pendingMsg,profile,log,food}){
  const [input,setInput]=useState("");
  const [msgs,setMsgs]=useState([{r:"a",t:`Hey! Finn hier. Ik coach ${profile?.name||"jou"} persoonlijk. Wat kan ik voor je doen?`}]);
  const [loading,setLoading]=useState(false);
  const endRef=useRef(null);
  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"});},[msgs,loading]);
  useEffect(()=>{if(pendingMsg)doSend(pendingMsg);},[]);
  function getCtx(){
    const lw=log.slice(0,5).map(e=>`${e.day}: ${e.workout}`).join(", ")||"Geen trainingen";
    const tf=food[TODAY_KEY]||{};
    const tk=MEALS.reduce((s,m)=>s+(tf[m]||[]).reduce((a,i)=>a+(i.kcal||0),0),0);
    return`Naam:${profile?.name} Doel:${profile?.goal} Fase:${profile?.fase||"onderhoud"} Sport:${profile?.sportType||"kracht"} Level:${profile?.level||"beginner"} Gewicht:${profile?.weight}kg→${profile?.goalWeight}kg Trainingen:${lw} Vandaag:${tk}kcal`;
  }
  async function doSend(txt){
    if(!txt?.trim()||loading)return;
    const nc=[...msgs,{r:"u",t:txt}];setMsgs(nc);setLoading(true);
    const reply=await ai(`Jij bent Finn, persoonlijke AI fitnesscoach. Gebruikersinfo: ${getCtx()}\nGeef motiverende, persoonlijke adviezen op maat. Max 3 zinnen. Nederlands.\nGebruiker: ${txt}\nFinn:`);
    setMsgs(p=>[...p,{r:"a",t:reply}]);setLoading(false);
  }
  function send(){if(!input.trim()||loading)return;const m=input.trim();setInput("");doSend(m);}
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:200,display:"flex",alignItems:"flex-end"}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#141414",borderRadius:"24px 24px 0 0",width:"100%",maxWidth:480,margin:"0 auto",padding:20,maxHeight:"70vh",display:"flex",flexDirection:"column",animation:"slideUp .4s cubic-bezier(.16,1,.3,1)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div style={{display:"flex",gap:12,alignItems:"center"}}><FinnImg size={50}/><div><div style={{fontSize:16,fontWeight:900}}>Finn</div><div style={{fontSize:11,color:"#555"}}>AI Coach · Kent jouw data</div></div></div>
          <button onClick={onClose} style={{background:"#1C1C1C",border:"none",color:"#666",width:32,height:32,borderRadius:"50%",cursor:"pointer",fontSize:16}}>×</button>
        </div>
        <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:10,paddingBottom:8}}>
          {msgs.map((m,i)=>m.r==="a"
            ?<div key={i} style={{display:"flex",gap:10,alignItems:"flex-end"}}><FinnImg size={32}/><div style={{background:"#1C1C1C",border:"1px solid rgba(255,107,43,0.2)",borderRadius:"4px 16px 16px 16px",padding:"10px 14px",maxWidth:"80%",fontSize:13,color:"rgba(255,255,255,0.85)",lineHeight:1.7}}>{m.t}</div></div>
            :<div key={i} style={{display:"flex",justifyContent:"flex-end"}}><div style={{background:ORANGE,borderRadius:"16px 16px 4px 16px",padding:"10px 14px",maxWidth:"75%",fontSize:13,color:"#fff"}}>{m.t}</div></div>
          )}
          {loading&&<div style={{display:"flex",gap:10,alignItems:"flex-end"}}><FinnImg size={32}/><div style={{background:"#1C1C1C",border:"1px solid rgba(255,107,43,0.2)",borderRadius:"4px 16px 16px 16px",padding:"12px 16px",display:"flex",gap:5}}>{[0,1,2].map(d=><div key={d} style={{width:6,height:6,borderRadius:"50%",background:ORANGE,animation:"pulse 1.2s infinite",animationDelay:`${d*.2}s`}}/>)}</div></div>}
          <div ref={endRef}/>
        </div>
        <div style={{display:"flex",gap:8,marginTop:12}}>
          <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder="Stel Finn een vraag..." style={{flex:1,padding:"12px 14px",borderRadius:14,border:"1px solid #222",background:"#1C1C1C",color:"#fff",fontSize:13,outline:"none"}}/>
          <button onClick={send} disabled={loading} style={{width:44,height:44,borderRadius:14,border:"none",cursor:"pointer",background:ORANGE,color:"#fff",fontSize:18,fontWeight:900,opacity:loading?0.5:1}}>→</button>
        </div>
      </div>
    </div>
  );
}

              {/* WARMING UP */}
              {!showWarmup?(
                <div style={{...S.card,padding:16,marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <div style={{fontSize:13,fontWeight:700,color:"#fff",marginBottom:2}}>Warming up</div>
                    <div style={{fontSize:11,color:"#444"}}>{getWarmup(targetMuscles).length} oefeningen · ~5 minuten</div>
                  </div>
                  <button onClick={()=>setShowWarmup(true)} style={{padding:"8px 16px",borderRadius:10,border:`1px solid ${LIME}`,background:"rgba(200,241,56,0.06)",color:LIME,fontSize:12,fontWeight:700,cursor:"pointer"}}>Toon</button>
                </div>
              ):(
                <div style={{...S.card,padding:16,marginBottom:12}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                    <div style={{fontSize:13,fontWeight:800}}>Warming up</div>
                    <button onClick={()=>setShowWarmup(false)} style={{background:"none",border:"none",color:"#444",fontSize:12,cursor:"pointer",fontWeight:700}}>Sluiten</button>
                  </div>
                  {getWarmup(targetMuscles).map((w,i)=>(
                    <div key={i} style={{display:"flex",gap:12,alignItems:"flex-start",paddingBottom:10,marginBottom:10,borderBottom:i<getWarmup(targetMuscles).length-1?"1px solid #111":"none"}}>
                      <div style={{width:20,height:20,borderRadius:"50%",background:"rgba(200,241,56,0.1)",border:"1px solid rgba(200,241,56,0.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:900,color:LIME,flexShrink:0,marginTop:2}}>{i+1}</div>
                      <div>
                        <div style={{fontSize:13,fontWeight:700,color:"#fff",marginBottom:2}}>{w.name}</div>
                        <div style={{fontSize:11,color:"#555"}}>{w.desc}</div>
                      </div>
                    </div>
                  ))}
                  <button onClick={()=>setShowWarmup(false)} style={{width:"100%",padding:"10px",borderRadius:10,border:"none",background:LIME,color:"#000",fontSize:12,fontWeight:800,cursor:"pointer",marginTop:4}}>Klaar met warming up</button>
                </div>
              )}

              {/* HIIT = circuit scherm */}
              {sportType==="hiit"?(
                <HiitWorkout exercises={session} voiceOn={voiceOn} onDone={saveWorkout}/>
              ):sportType==="cardio"&&targetMuscles.includes("cardio_full")?(
                /* GPS RUN TRACKER voor hardlopen */
                <RunTracker
                  goal="free"
                  voiceOn={voiceOn}
                  prevRun={(()=>{const r=log.find(e=>(e.targetMuscles||[]).includes("cardio_full"));return r?{dist:r.runDist||0,time:r.runTime||0,pace:r.runPace||"–"}:null;})()}
                  onDone={(data)=>{
                    const entry={date:trainDate,day:DAYS[parseDate(trainDate).getDay()],workout:"Hardlopen",exercises:[],targetMuscles,runDist:data.dist,runTime:data.time,runPace:data.pace,id:Date.now()};
                    const updated=[entry,...log].slice(0,100);
                    setLog(updated);LS.set("fitcoach_log",updated);
                    setSavedBanner(true);setTimeout(()=>setSavedBanner(false),3000);
                    setSelectingMuscles(true);setSession(null);setTargetMuscles([]);setTab("Home");
                  }}
                />
              ):(
                /* KRACHT / CARDIO = normale sets */
                <div>
                  {session.map((ex,ei)=>{
                    const unit=ex.unit||"kg";
                    const opts=getSetValueOptions(unit);
                    const maxNow=Math.max(0,...ex.weights.filter(w=>w>0));
                    const maxPrev=ex.prevWeights?Math.max(0,...ex.prevWeights.filter(w=>w>0)):0;
                    const isPR=maxNow>0&&maxPrev>0&&maxNow>maxPrev;
                    const photo=EX_PHOTOS[ex.name];
                    const exMuscle=EX_DB[ex.name]?.muscle||"";
                    const alts=Object.entries(EX_DB).filter(([n,db])=>db.muscle===exMuscle&&n!==ex.name).map(([n])=>n);
