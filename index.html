  }

  return(
    <div style={{background:BG,minHeight:"100vh",maxWidth:480,margin:"0 auto"}}>
      {/* Progress bar */}
      <div style={{padding:"20px 24px 0"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:24}}>
          <div style={{flex:1,background:isDark?"#1C1C1C":"#E8E8E0",borderRadius:99,height:4,overflow:"hidden"}}>
            <div style={{width:prog+"%",height:4,background:LIME,borderRadius:99,transition:"width .4s"}}/>
          </div>
          <div style={{fontSize:10,color:isDark?"#444":"#888",fontWeight:700,flexShrink:0}}>{Math.round(prog)}%</div>
        </div>
      </div>

      <div style={{padding:"0 24px 40px"}}>

        {/* ── STAP 1: Naam & basisinfo ── */}
        {step===1&&<>
          <StapHeader nr={1} titel="Hoe heet je?" sub="Roan spreekt je persoonlijk aan op basis van jouw naam en leeftijd."/>
          <input style={inp} placeholder="Voornaam" value={p.name} onChange={e=>u("name",e.target.value)} autoFocus/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
            <input style={{...inp,margin:0}} type="number" placeholder="Leeftijd" value={p.age} onChange={e=>u("age",e.target.value)}/>
            <input style={{...inp,margin:0}} type="number" placeholder="Lengte (cm)" value={p.height} onChange={e=>u("height",e.target.value)}/>
          </div>
          <div style={{fontSize:11,color:isDark?"#444":"#888",marginBottom:14,fontWeight:700,textTransform:"uppercase",letterSpacing:2}}>Geslacht</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
            {[{v:"man",l:"👨 Man"},{v:"vrouw",l:"👩 Vrouw"},{v:"ander",l:"🧑 Anders"}].map(g=>(
              <button key={g.v} onClick={()=>u("gender",g.v)} style={{padding:"12px 6px",borderRadius:12,border:"1.5px solid "+(p.gender===g.v?LIME:"#1C1C1C"),background:p.gender===g.v?"rgba(200,241,56,0.07)":"#141414",color:p.gender===g.v?LIME:isDark?"#666":"#666",fontSize:12,fontWeight:700,cursor:"pointer"}}>{g.l}</button>
            ))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:4}}>
            <input style={{...inp,margin:0}} type="number" placeholder="Gewicht (kg)" value={p.weight} onChange={e=>u("weight",e.target.value)}/>
            <input style={{...inp,margin:0}} type="number" placeholder="Doel gewicht (kg)" value={p.goalWeight} onChange={e=>u("goalWeight",e.target.value)}/>
          </div>
          {p.age&&parseInt(p.age)>=60&&<div style={{background:"rgba(200,241,56,0.06)",border:"1px solid rgba(200,241,56,0.15)",borderRadius:10,padding:"8px 12px",marginBottom:12,fontSize:11,color:isDark?"#aaa":"#555"}}>Roan houdt rekening met jouw leeftijd — veilige oefeningen en meer herstel.</div>}
          <label style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderRadius:12,border:"1px solid "+BORDER,background:CARD_BG,color:isDark?"#888":"#666",fontSize:12,cursor:"pointer",marginBottom:14}}>
            📷 Profielfoto (optioneel)<input type="file" accept="image/*" onChange={handlePhoto} style={{display:"none"}}/>{p.fotoUrl&&<span style={{color:LIME,fontSize:11}}>✓ Geladen</span>}
          </label>
          {Volgende(2,!p.name||!p.weight||!p.age)}
        </>}

        {/* ── STAP 2: Doel ── */}
        {step===2&&<>
          <StapHeader nr={2} titel="Wat is jouw doel?" sub="Roan stelt je trainingen, voeding en coaching hierop af."/>
          <RoanTip tekst="Kies je hoofddoel. Je kunt dit later altijd aanpassen in de instellingen."/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
            {[
              {v:"slanker",l:"Slanker worden",d:"Strakker en slanker",e:"✨"},
              {v:"afvallen",l:"Afvallen",d:"Vet verbranden",e:"🔥"},
              {v:"spiermassa",l:"Spiermassa",d:"Groter en sterker",e:"💪"},
              {v:"billen",l:"Billen & benen",d:"Rondere billen",e:"🍑"},
              {v:"fitter",l:"Fitter worden",d:"Meer energie",e:"⚡"},
              {v:"tonen",l:"Tonen",d:"Strakker zonder bulk",e:"🎯"},
              {v:"hardlopen",l:"Hardlopen",d:"Conditie en kms",e:"🏃"},
              {v:"gezonder",l:"Gezonder leven",d:"Algehele gezondheid",e:"🌱"},
            ].map(g=>(
              <button key={g.v} onClick={()=>u("goal",g.v)} style={{padding:"14px 12px",borderRadius:14,border:"1.5px solid "+(p.goal===g.v?LIME:"#1C1C1C"),background:p.goal===g.v?"rgba(200,241,56,0.07)":"#141414",color:TEXT,cursor:"pointer",textAlign:"left",position:"relative"}}>
                {p.goal===g.v&&<div style={{position:"absolute",top:8,right:8,width:18,height:18,borderRadius:"50%",background:LIME,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#000",fontWeight:900}}>✓</div>}
                <div style={{fontSize:20,marginBottom:4}}>{g.e}</div>
                <div style={{fontWeight:800,fontSize:13,color:p.goal===g.v?LIME:TEXT,marginBottom:2}}>{g.l}</div>
                <div style={{fontSize:10,color:isDark?"#555":"#888"}}>{g.d}</div>
              </button>
            ))}
          </div>
          {Volgende(3)}
        </>}

        {/* ── STAP 3: Lichaamstype ── */}
        {step===3&&<>
          <StapHeader nr={3} titel="Jouw lichaam" sub="Roan berekent hiermee je exacte caloriebehoefte en stelt je voeding beter in."/>
          <RoanTip tekst="Je lichaamsbouw bepaalt hoe snel je spieren opbouwt en vet verbrandt. Dit helpt me je schema nauwkeuriger te maken."/>
          <div style={{fontSize:11,color:isDark?"#444":"#888",fontWeight:700,textTransform:"uppercase",letterSpacing:2,marginBottom:10}}>Lichaamsbouw</div>
          <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
            {[
              {v:"slank",l:"Slank / Mager",d:"Moeite met aankomen, snel metabolisme",e:"🦴",sub:"Ectomorf"},
              {v:"normaal",l:"Gemiddeld",d:"Gemakkelijk spier én vet opbouwen",e:"⚖️",sub:"Mesomorf"},
              {v:"breed",l:"Breed / Stevig",d:"Robuust frame, makkelijk aankomen",e:"🏋️",sub:"Endomorf"},
              {v:"atletisch",l:"Atletisch / Gespierd",d:"Al getraind, weinig vet, veel spiermassa",e:"💪",sub:"Gespierd"},
            ].map(b=>(
              <button key={b.v} onClick={()=>u("bodyType",b.v)} style={{padding:"14px 16px",borderRadius:14,border:"1.5px solid "+(p.bodyType===b.v?LIME:"#1C1C1C"),background:p.bodyType===b.v?"rgba(200,241,56,0.07)":"#141414",color:TEXT,cursor:"pointer",display:"flex",alignItems:"center",gap:14,textAlign:"left"}}>
                <div style={{fontSize:28,flexShrink:0}}>{b.e}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:800,color:p.bodyType===b.v?LIME:TEXT}}>{b.l} <span style={{fontSize:10,color:isDark?"#444":"#888",fontWeight:400}}>({b.sub})</span></div>
                  <div style={{fontSize:11,color:isDark?"#555":"#888",marginTop:2}}>{b.d}</div>
                </div>
                {p.bodyType===b.v&&<div style={{color:LIME,fontSize:18,flexShrink:0}}>✓</div>}
              </button>
            ))}
          </div>
          <div style={{fontSize:11,color:isDark?"#444":"#888",fontWeight:700,textTransform:"uppercase",letterSpacing:2,marginBottom:10}}>Huidige conditie</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:4}}>
            {[{v:"veel_vet",l:"Meer vet",e:"🔴"},{v:"gemiddeld",l:"Gemiddeld",e:"🟡"},{v:"slank_fit",l:"Vrij slank",e:"🟢"}].map(f=>(
              <button key={f.v} onClick={()=>u("fatLevel",f.v)} style={{padding:"12px 6px",borderRadius:12,border:"1.5px solid "+(p.fatLevel===f.v?LIME:"#222"),background:p.fatLevel===f.v?"rgba(200,241,56,0.07)":"#111",color:p.fatLevel===f.v?LIME:isDark?"#666":"#666",fontSize:11,fontWeight:700,cursor:"pointer",textAlign:"center"}}>
                <div style={{fontSize:20,marginBottom:4}}>{f.e}</div>{f.l}
              </button>
            ))}
          </div>
          {Volgende(4,!p.bodyType)}
        </>}

        {/* ── STAP 4: Sport type ── */}
        {step===4&&<>
          <StapHeader nr={4} titel="Hoe sport jij?" sub="Kies je hoofdsport. Alle splits blijven altijd beschikbaar — dit bepaalt de volgorde."/>
          <RoanTip tekst="Je sporttype bepaalt welke trainingen Roan als eerste aanbeveelt. Je kunt altijd alle categorieën gebruiken."/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
            {[
              {v:"kracht",l:"Kracht",d:"Barbells, machines, dumbbells",e:"🏋️"},
              {v:"calisthenics",l:"Calisthenics",d:"Eigen lichaamsgewicht",e:"🤸"},
              {v:"hiit",l:"HIIT",d:"Intervaltraining, circuits",e:"⚡"},
              {v:"cardio",l:"Hardlopen",d:"Run, interval, wandelen",e:"🏃"},
              {v:"gemixed",l:"Gemixed",d:"Combinatie van alles",e:"🔀"},
            ].map(s=>(
              <button key={s.v} onClick={()=>u("sportType",s.v)} style={{padding:"14px 12px",borderRadius:14,border:"1.5px solid "+(p.sportType===s.v?LIME:"#1C1C1C"),background:p.sportType===s.v?"rgba(200,241,56,0.07)":"#141414",color:TEXT,cursor:"pointer",textAlign:"left",position:"relative"}}>
                {p.sportType===s.v&&<div style={{position:"absolute",top:8,right:8,width:18,height:18,borderRadius:"50%",background:LIME,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#000",fontWeight:900}}>✓</div>}
                <div style={{fontSize:22,marginBottom:6}}>{s.e}</div>
                <div style={{fontSize:13,fontWeight:900,color:p.sportType===s.v?LIME:TEXT,marginBottom:2}}>{s.l}</div>
                <div style={{fontSize:10,color:isDark?"#555":"#888"}}>{s.d}</div>
              </button>
            ))}
          </div>
          {/* Hardloop extra opties */}
          {p.sportType==="cardio"&&(
            <div style={{background:"rgba(200,241,56,0.06)",border:"1px solid rgba(200,241,56,0.15)",borderRadius:12,padding:14,marginBottom:12}}>
              <div style={{fontSize:12,fontWeight:700,color:LIME,marginBottom:10}}>🏃 Wat is je hardloopdoel?</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                {[{v:"k5",l:"5 km",d:"Beginners doel"},{v:"k10",l:"10 km",d:"Intermediate"},{v:"half",l:"Halve marathon",d:"21 km"},{v:"conditie",l:"Gewoon fitter",d:"Geen specifiek doel"}].map(d=>(
                  <button key={d.v} onClick={()=>u("loopDoel",d.v)} style={{padding:"10px 8px",borderRadius:10,border:"1px solid "+(p.loopDoel===d.v?LIME:"#222"),background:p.loopDoel===d.v?"rgba(200,241,56,0.08)":"#111",color:p.loopDoel===d.v?LIME:isDark?"#666":"#888",fontSize:11,fontWeight:700,cursor:"pointer",textAlign:"left"}}>
                    <div style={{fontWeight:800}}>{d.l}</div>
                    <div style={{fontSize:9,color:isDark?"#444":"#888",marginTop:2}}>{d.d}</div>
                  </button>
                ))}
              </div>
            </div>
          )}
          {Volgende(5)}
        </>}

        {/* ── STAP 5: Niveau & locatie ── */}
        {step===5&&<>
          <StapHeader nr={5} titel="Jouw niveau" sub="Roan past de oefeningen, gewichten en intensiteit hierop aan."/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:20}}>
            {[
              {v:"beginner",l:"Beginner",d:"< 6 maanden",e:"🌱"},
              {v:"gemiddeld",l:"Gemiddeld",d:"6m – 2 jaar",e:"📈"},
              {v:"gevorderd",l:"Gevorderd",d:"2+ jaar",e:"🔥"},
            ].map(l=>(
              <button key={l.v} onClick={()=>u("level",l.v)} style={{padding:"14px 8px",borderRadius:12,border:"1.5px solid "+(p.level===l.v?LIME:"#1C1C1C"),background:p.level===l.v?"rgba(200,241,56,0.07)":"#141414",color:p.level===l.v?LIME:isDark?"#666":"#666",fontSize:11,fontWeight:700,cursor:"pointer",textAlign:"center"}}>
                <div style={{fontSize:24,marginBottom:4}}>{l.e}</div>
                <div>{l.l}</div>
                <div style={{fontSize:9,color:isDark?"#444":"#888",marginTop:2}}>{l.d}</div>
              </button>
            ))}
          </div>
          {!p.sportType?.includes("cardio")&&<>
            <div style={{fontSize:11,color:isDark?"#444":"#888",fontWeight:700,textTransform:"uppercase",letterSpacing:2,marginBottom:10}}>Waar train je?</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:16}}>
              {[{v:"gym",l:"Gym",e:"🏋️"},{v:"thuis",l:"Thuis",e:"🏠"},{v:"buiten",l:"Buiten",e:"🌳"}].map(e=>(
                <button key={e.v} onClick={()=>u("trainingLoc",e.v)} style={{padding:"12px 8px",borderRadius:12,border:"1.5px solid "+(p.trainingLoc===e.v?LIME:"#1C1C1C"),background:p.trainingLoc===e.v?"rgba(200,241,56,0.07)":"#141414",color:p.trainingLoc===e.v?LIME:isDark?"#666":"#666",fontSize:11,fontWeight:700,cursor:"pointer",textAlign:"center"}}>
                  <div style={{fontSize:22,marginBottom:4}}>{e.e}</div>{e.l}
                </button>
              ))}
            </div>
            <div style={{fontSize:11,color:isDark?"#444":"#888",fontWeight:700,textTransform:"uppercase",letterSpacing:2,marginBottom:10}}>Voorkeur materiaal</div>
            <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:4}}>
              {[{v:"machines",l:"Machines",d:"Leg press, kabel, apparaten"},{v:"dumbbells",l:"Vrije gewichten",d:"Dumbbells, barbells, kettlebells"},{v:"mixed",l:"Gemixed",d:"Combinatie van alles"}].map(e=>(
                <button key={e.v} onClick={()=>u("equipmentPref",e.v)} style={{padding:"12px 16px",borderRadius:12,border:"1.5px solid "+(p.equipmentPref===e.v?LIME:"#1C1C1C"),background:p.equipmentPref===e.v?"rgba(200,241,56,0.07)":"#141414",textAlign:"left",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div><div style={{fontSize:13,fontWeight:700,color:p.equipmentPref===e.v?LIME:TEXT,marginBottom:2}}>{e.l}</div><div style={{fontSize:11,color:isDark?"#555":"#888"}}>{e.d}</div></div>
                  {p.equipmentPref===e.v&&<div style={{color:LIME,fontSize:18}}>✓</div>}
                </button>
              ))}
            </div>
          </>}
          {Volgende(6)}
        </>}

        {/* ── STAP 6: Trainingsdagen ── */}
        {step===6&&<>
          <StapHeader nr={6} titel="Wanneer train je?" sub="Roan plant je schema op je trainingsdagen en geeft rustdagtips op de rest."/>
          <RoanTip tekst="Op trainingsdagen zal ik je motiveren en een schema klaarzetten. Op rustdagen geef ik herstel- en voedingstips."/>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:6,marginBottom:12}}>
            {[{k:"ma",l:"Ma"},{k:"di",l:"Di"},{k:"wo",l:"Wo"},{k:"do",l:"Do"},{k:"vr",l:"Vr"},{k:"za",l:"Za"},{k:"zo",l:"Zo"}].map(d=>{
              const sel=(p.trainDayNames||[]).includes(d.k);
              return <button key={d.k} onClick={()=>{const cur=p.trainDayNames||[];u("trainDayNames",sel?cur.filter(x=>x!==d.k):[...cur,d.k]);}} style={{padding:"12px 4px",borderRadius:10,border:"1px solid "+(sel?LIME:"#1C1C1C"),background:sel?"rgba(200,241,56,0.1)":"#111",color:sel?LIME:isDark?"#444":"#666",fontSize:12,fontWeight:900,cursor:"pointer"}}>{d.l}</button>;
            })}
          </div>
          <div style={{fontSize:12,color:isDark?"#555":"#888",marginBottom:20,textAlign:"center"}}>
            {(p.trainDayNames||[]).length} dag{(p.trainDayNames||[]).length!==1?"en":""} geselecteerd
            {(p.trainDayNames||[]).length>=4&&<span style={{color:LIME,fontWeight:700}}> — serieuze sporter! 🔥</span>}
          </div>
          {/* Snelle suggesties */}
          <div style={{fontSize:11,color:isDark?"#444":"#888",marginBottom:8}}>Snel kiezen:</div>
          <div style={{display:"flex",gap:8,marginBottom:4}}>
            {[
              {l:"3x/week",d:["ma","wo","vr"]},
              {l:"4x/week",d:["ma","di","do","vr"]},
              {l:"5x/week",d:["ma","di","wo","do","vr"]},
            ].map(s=>(
              <button key={s.l} onClick={()=>u("trainDayNames",s.d)} style={{flex:1,padding:"8px 4px",borderRadius:10,border:"1px solid #222",background:"#111",color:isDark?"#555":"#888",fontSize:11,fontWeight:700,cursor:"pointer"}}>{s.l}</button>
            ))}
          </div>
          {Volgende(7,!(p.trainDayNames||[]).length)}
        </>}

        {/* ── STAP 7: Voeding ── */}
        {step===7&&<>
          <StapHeader nr={7} titel="Voeding & fase" sub="Roan genereert een weekmenu en geeft voedingsadvies op basis van jouw voorkeuren."/>
          <RoanTip tekst="Dit is optioneel maar maakt mijn voedingsadvies veel persoonlijker. Ik gebruik dit voor je weekmenu en dagelijkse tips."/>
          <div style={{fontSize:11,color:isDark?"#444":"#888",fontWeight:700,textTransform:"uppercase",letterSpacing:2,marginBottom:10}}>Calorietarget</div>
          <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
            {[
              {v:"licht cutten",l:"Afvallen",d:"~300 kcal tekort per dag",c:"#ef4444",e:"↘️"},
              {v:"onderhoud",l:"Onderhoud",d:"Gewicht vasthouden",c:LIME,e:"→"},
              {v:"licht bulken",l:"Lean bulk",d:"~300 kcal surplus",c:"#34d399",e:"↗️"},
              {v:"zwaar bulken",l:"Maximaal bulken",d:"~600 kcal surplus, max groei",c:"#f59e0b",e:"⬆️"},
            ].map(f=>(
              <button key={f.v} onClick={()=>u("fase",f.v)} style={{padding:"12px 14px",borderRadius:12,border:"1.5px solid "+(p.fase===f.v?f.c:"#1C1C1C"),background:p.fase===f.v?f.c+"18":"#141414",cursor:"pointer",textAlign:"left",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div><div style={{fontSize:13,fontWeight:700,color:p.fase===f.v?f.c:TEXT,marginBottom:2}}>{f.e} {f.l}</div><div style={{fontSize:11,color:isDark?"#555":"#888"}}>{f.d}</div></div>
                {p.fase===f.v&&<div style={{color:f.c,fontSize:18}}>✓</div>}
              </button>
            ))}
          </div>
          <div style={{fontSize:11,color:isDark?"#444":"#888",fontWeight:700,textTransform:"uppercase",letterSpacing:2,marginBottom:8}}>Voorkeuren (optioneel)</div>
          <input value={p.voedingLikes} onChange={e=>u("voedingLikes",e.target.value)} placeholder="Wat eet je graag? bijv. kip, pasta, Aziatisch..." style={{...inp,marginBottom:8}}/>
          <input value={p.voedingDislikes} onChange={e=>u("voedingDislikes",e.target.value)} placeholder="Wat eet je liever niet?" style={{...inp,marginBottom:12}}/>
          <div style={{fontSize:11,color:isDark?"#444":"#888",fontWeight:700,textTransform:"uppercase",letterSpacing:2,marginBottom:8}}>Dieet</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:4}}>
            {["Geen","Vegetarisch","Vegan","Lactosevrij","Glutenvrij","Halal"].map(d=>(
              <button key={d} onClick={()=>u("voedingDiet",d==="Geen"?"":d)} style={{padding:"6px 12px",borderRadius:20,border:"1px solid "+((p.voedingDiet===d||(d==="Geen"&&!p.voedingDiet))?"#fff":"#222"),background:(p.voedingDiet===d||(d==="Geen"&&!p.voedingDiet))?"rgba(255,255,255,0.06)":"#111",color:(p.voedingDiet===d||(d==="Geen"&&!p.voedingDiet))?TEXT:isDark?"#444":"#666",fontSize:11,fontWeight:700,cursor:"pointer"}}>{d}</button>
            ))}
          </div>
          {Volgende(8)}
        </>}

        {/* ── STAP 8: Coaching stijl ── */}
        {step===8&&<>
          <StapHeader nr={8} titel="Coaching stijl" sub="Hoe actief wil je dat Roan je begeleidt?"/>
          <RoanTip tekst="Ik pas mijn aanpak volledig aan op jouw voorkeur. Van een stille coach op de achtergrond tot dagelijkse check-ins."/>
          <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:20}}>
            {[
              {v:"weinig",l:"Zelfstandig",d:"Roan is op de achtergrond. Trainingsschemas zonder constante feedback.",icon:""},
              {v:"regelmatig",l:"Regelmatige check-in",d:"Tips na trainingen, wekelijkse feedback en voedingsadvies.",icon:"💬"},
              {v:"personal",l:"Personal trainer",d:"Roan coacht actief bij elke set, analyseert alles en geeft gerichte aanwijzingen.",icon:""},
            ].map(c=>(
              <button key={c.v} onClick={()=>u("coachLevel",c.v)} style={{padding:"16px 18px",borderRadius:14,border:"1.5px solid "+(p.coachLevel===c.v?ORANGE:"#1C1C1C"),background:p.coachLevel===c.v?"rgba(255,107,43,0.07)":"#141414",textAlign:"left",cursor:"pointer",display:"flex",gap:14,alignItems:"flex-start"}}>
                <div style={{fontSize:28,flexShrink:0}}>{c.icon}</div>
                <div>
                  <div style={{fontSize:14,fontWeight:700,color:p.coachLevel===c.v?ORANGE:TEXT,marginBottom:4}}>{c.l}</div>
                  <div style={{fontSize:11,color:isDark?"#555":"#888",lineHeight:1.5}}>{c.d}</div>
                </div>
                {p.coachLevel===c.v&&<div style={{marginLeft:"auto",color:ORANGE,fontSize:18,flexShrink:0}}>✓</div>}
              </button>
            ))}
          </div>
          {Volgende(9)}
        </>}

        {/* ── STAP 9: Bewaard & berekend ── */}
        {step===9&&<>
          <StapHeader nr={9} titel={T.roanBerekent} sub="Op basis van jouw gegevens stelt Roan alles in."/>
          {(()=>{
            const h=parseFloat(p.height)/100||1.75;
            const w=parseFloat(p.weight)||75;
            const age=parseInt(p.age)||25;
            const bmr=p.gender==="vrouw"?447.6+(9.25*w)+(3.1*(parseFloat(p.height)||165))-(4.33*age):88.36+(13.4*w)+(4.8*(parseFloat(p.height)||175))-(5.7*age);
            const tdee=Math.round(bmr*1.55);
            const bmiLow=p.gender==="man"?20:18.5;
            const bmiHigh=p.gender==="man"?27:24.9;
            const idealLow=Math.round(bmiLow*h*h);
            const idealHigh=Math.round(bmiHigh*h*h);
            const bmi=p.height&&p.weight?((w/h/h).toFixed(1)):"–";
            const eiwitDoel=Math.round(w*2);
            const faseObj=FASE_OPTIES.find(f=>f.v===p.fase)||FASE_OPTIES[2];
            const kcalDoel=Math.round(w*faseObj.mul);
            return(
              <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
                {[
                  {l:"BMR",v:Math.round(bmr)+" kcal",sub:"Calorieën in rust",c:TEXT},
                  {l:"TDEE",v:tdee+" kcal",sub:"Dagelijkse verbranding",c:TEXT},
                  {l:T.calorieDoel,v:kcalDoel+" kcal",sub:"Op basis van jouw fase",c:LIME},
                  {l:T.eiwitDoel,v:eiwitDoel+"g",sub:"Per dag voor spiergroei",c:"#60a5fa"},
                  {l:"BMI",v:bmi,sub:"Minder nauwkeurig voor sporters",c:TEXT},

                ].map(s=>(

                    <div><div style={{fontSize:13,fontWeight:700,color:TEXT}}>{s.l}</div><div style={{fontSize:10,color:isDark?"#444":"#888"}}>{s.sub}</div></div>
                    <div style={{fontSize:20,fontWeight:900,color:s.c}}>{s.v}</div>
                  </div>
                ))}
              </div>
            );
          })()}
          {Volgende(10)}
        </>}

        {/* ── STAP 10: Klaar ── */}
        {step===10&&<>
          <div style={{textAlign:"center",marginBottom:24}}>
            <FinnImg size={120} emotion="victory"/>
            <div style={{fontSize:28,fontWeight:900,color:TEXT,marginTop:8,marginBottom:6}}>Klaar om te starten!</div>
            <div style={{fontSize:14,color:isDark?"#555":"#888"}}>Roan heeft alles wat nodig is.</div>
          </div>
          <div style={{background:"rgba(255,107,43,0.08)",border:"1px solid rgba(255,107,43,0.2)",borderRadius:16,padding:16,marginBottom:16}}>
            <div style={{fontSize:13,color:"rgba(255,255,255,0.7)",lineHeight:1.7,fontStyle:"italic"}}>"Hey {p.name||"daar"}! Ik ben klaar als jouw coach. {p.sportType==="cardio"?"Laten we werken aan je "+{"k5":"5 km","k10":"10 km","half":"halve marathon","conditie":"conditie"}[p.loopDoel||"k5"]+" doel!":p.goal==="spiermassa"?"Tijd om serieus te groeien!":p.goal==="afvallen"?"We gaan die kilo's er samen af trainen!":"Tijd om de beste versie van jezelf te worden!"} Je traint {(p.trainDayNames||[]).length}x per week. Let's go! 💪"</div>
          </div>
          <div style={{background:isDark?"#111":"#F0F0E8",borderRadius:16,padding:14,marginBottom:20}}>
            <div style={{fontSize:11,color:isDark?"#444":"#888",fontWeight:700,textTransform:"uppercase",letterSpacing:2,marginBottom:10}}>Jouw profiel</div>
            {[
              {l:"Naam",v:p.name+(p.age?", "+p.age+" jaar":"")},
              {l:"Doel",v:p.goal+(p.sportType==="cardio"?" — "+{"k5":"5km","k10":"10km","half":"Halve marathon","conditie":"Conditie"}[p.loopDoel||"k5"]:"")},
              {l:"Sport",v:{kracht:"Kracht",calisthenics:"Calisthenics",hiit:"HIIT",cardio:"Hardlopen",gemixed:"Gemixed"}[p.sportType]||p.sportType},
              {l:"Niveau",v:{beginner:"Beginner",gemiddeld:"Gemiddeld",gevorderd:"Gevorderd"}[p.level]},
              {l:"Trainingsdagen",v:(p.trainDayNames||[]).join(", ")},
              {l:"Fase",v:p.fase||"Onderhoud"},
              {l:"Coaching",v:{weinig:"Zelfstandig",regelmatig:"Regelmatig",personal:"Personal trainer"}[p.coachLevel]},
            ].map(r=>(
              <div key={r.l} style={{display:"flex",justifyContent:"space-between",paddingBottom:8,marginBottom:8,borderBottom:"1px solid "+(isDark?"#1C1C1C":"#E0E0D8")}}>

                <div style={{fontSize:12,color:TEXT,fontWeight:600,textTransform:"capitalize",maxWidth:"60%",textAlign:"right"}}>{r.v}</div>
              </div>
            ))}
          </div>
          <button onClick={()=>onComplete({...p,foodPrefs:{likes:p.voedingLikes,dislikes:p.voedingDislikes,diet:p.voedingDiet}})} style={{width:"100%",padding:18,borderRadius:16,border:"none",background:LIME,color:"#000",fontSize:16,fontWeight:900,cursor:"pointer",marginBottom:8}}>Start met Roan 🚀</button>
          <button onClick={()=>setStep(9)} style={{width:"100%",padding:12,borderRadius:14,border:"1px solid "+BORDER,background:"none",color:isDark?"#555":"#888",fontSize:13,cursor:"pointer"}}>← Terug</button>
        </>}

      </div>
    </div>
  );
}

// ── STREAK HELPER ─────────────────────────────────────────────
function calcStreak(log){
  if(!log||!log.length)return 0;
  let streak=0,check=new Date(TODAY);
  const logDates=new Set(log.map(e=>e.date));
  for(let i=0;i<60;i++){
    const key=fmtDate(check);
    if(logDates.has(key)){streak++;}
    else if(i>0){break;}
    check=new Date(check.getTime()-86400000);
  }
  return streak;
}

// ── PR HELPER ─────────────────────────────────────────────────
function updatePRs(prData,exercises){
  const updated={...prData};
  exercises.forEach(ex=>{
    if(!ex.name||!ex.weights||!ex.unit)return;
    const maxW=Math.max(0,...ex.weights.filter(w=>w>0));
    if(maxW<=0)return;
    const key=ex.name;
    if(!updated[key]||maxW>updated[key].weight){
      updated[key]={weight:maxW,unit:ex.unit,date:TODAY_KEY};
    }
  });
  return updated;
}

  const [actief,setActief]=useState(()=>LS.get("fitcoach_challenge_actief")||null);
  const [voortgang,setVoortgang]=useState(()=>LS.get("fitcoach_challenge_voortgang")||{});
  const [toonKiezen,setToonKiezen]=useState(false);
  const [toonDetail,setToonDetail]=useState(false);

  const challenge=actief?CHALLENGES.find(c=>c.id===actief):null;
  const prog=voortgang[actief]||[];
  const vandaagDag=challenge?Math.min(challenge.dagen,prog.length+1):1;
  const vandaagSessie=challenge?.schema?.find(s=>s.dag===vandaagDag);
  const pct=challenge?Math.round((prog.length/challenge.dagen)*100):0;

  function startChallenge(id){
    setActief(id);LS.set("fitcoach_challenge_actief",id);
    setVoortgang(v=>({...v,[id]:[]}));LS.set("fitcoach_challenge_voortgang",{...voortgang,[id]:[]});
    setToonKiezen(false);
  }
  function dagAfvinken(){
    if(!actief)return;
    const nieuw=[...(voortgang[actief]||[]),{dag:vandaagDag,datum:TODAY_KEY}];
    const bijgewerkt={...voortgang,[actief]:nieuw};
    setVoortgang(bijgewerkt);LS.set("fitcoach_challenge_voortgang",bijgewerkt);
    if(vandaagSessie?.finale){
      setTimeout(()=>alert("🎉 Challenge voltooid! Gefeliciteerd "+profile?.name+"!"),300);

function App(){
  const [sbUser,setSbUser]=useState(null);
  const [authChecked,setAuthChecked]=useState(false);
  const [profile,setProfile]=useState(null); // Profiel alleen laden na login

  useEffect(()=>{
    // Timeout fallback: stel authChecked in na 4 seconden als Supabase niet reageert
    const fallback=setTimeout(()=>setAuthChecked(true),4000);
    sb.auth.getSession().then(({data:{session}})=>{
      clearTimeout(fallback);
      if(session?.user){setSbUser(session.user);loadFromSupabase(session.user.id);}
      setAuthChecked(true);
    }).catch(()=>{clearTimeout(fallback);setAuthChecked(true);});
    const {data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>{setSbUser(session?.user||null);});
    return()=>{subscription.unsubscribe();clearTimeout(fallback);};
  },[]);

  async function loadFromSupabase(userId){
    // Laad eerst uit localStorage als fallback
    const localProfile=LS.get("fitcoach_profile");
    const localLog=LS.get("fitcoach_log");
    const localFood=LS.get("fitcoach_food");
    if(localProfile)setProfile(localProfile);
    if(localLog)setLog(localLog);
    if(localFood)setFood(localFood);
    // Dan Supabase data (overschrijft localStorage als nieuwer)
    const data=await sbLoad("user_data",userId);
    if(data){
      if(data.profile){setProfile(data.profile);LS.set("fitcoach_profile",data.profile);}
      if(data.log){setLog(data.log);LS.set("fitcoach_log",data.log);}
      if(data.food){setFood(data.food);LS.set("fitcoach_food",data.food);}
    }
    await sbInsert("stats",{event:"app_open",user_id:userId,created_at:new Date().toISOString()});
  }
  async function syncToSupabase(np,nl,nf){
    if(!sbUser)return;
    await sbUpsert("user_data",{user_id:sbUser.id,email:sbUser.email,profile:np||profile,log:nl||log,food:nf||food,updated_at:new Date().toISOString()});
  }

                            <div style={{marginTop:12,background:isDark?"#1C1C1C":"#E8E8E0",borderRadius:14,padding:14}}>
                              <div style={{...S.lbl,marginBottom:10}}>Wissel of voeg toe</div>

                              {/* Zoek in alle oefeningen */}
                              <input 
                                placeholder={T.zoekOefening+" of typ zelf..."} 
                                onChange={e=>{
                                  const q=e.target.value.toLowerCase();
                                  if(q.length<2)return;
                                  // Show matching exercises from DB
                                  const matches=Object.keys(EX_DB).filter(n=>n.toLowerCase().includes(q)).slice(0,8);
                                  setWisselSearch({q:e.target.value,results:matches});
                                }}
                                style={{width:"100%",padding:"10px 12px",borderRadius:10,border:`1px solid ${isDark?"#333":"#D0D0C8"}`,background:isDark?"#111":CARD_BG,color:TEXT,fontSize:13,outline:"none",marginBottom:10,boxSizing:"border-box"}}

                                <input 
                                  id={`custom-ex-${ei}`}
                                  placeholder="Naam eigen oefening..." 
                                  style={{width:"100%",padding:"10px 12px",borderRadius:10,border:`1px solid ${isDark?"#333":"#D0D0C8"}`,background:isDark?"#111":CARD_BG,color:TEXT,fontSize:13,outline:"none",marginBottom:8,boxSizing:"border-box"}}
                                />
                                <button onClick={()=>{
                                  const naam=document.getElementById(`custom-ex-${ei}`)?.value?.trim();

                                  // Add to EX_DB
                                  EX_DB[naam]={muscle:EX_DB[ex.name]?.muscle||"full body",unit:EX_DB[ex.name]?.unit||"kg",rest:60,info:`Eigen oefening: ${naam}`,yt:naam.replace(/ /g,"+")};
                                  // Save to localStorage
                                  const custom=LS.get("fitcoach_custom_ex")||{};
                                  custom[naam]=EX_DB[naam];
                                  LS.set("fitcoach_custom_ex",custom);
                                  wisselOefening(ei,naam);
                                  setWisselSearch(null);
                                }} style={{width:"100%",padding:"9px",borderRadius:10,border:"none",background:LIME,color:"#000",fontSize:12,fontWeight:800,cursor:"pointer"}}>Toevoegen & wisselen</button>
                              </div>

                              {/* Suggesties op basis van spiergroep */}
                              {alts.length>0&&!wisselSearch?.results?.length&&<><div style={{fontSize:11,color:isDark?"#888":"#666",marginBottom:8}}>Suggesties ({EX_DB[ex.name]?.muscle}):</div>

                            </div>
                          )}
                        </div>
                      </div>
                    );
                  })}
                  {/* Oefening toevoegen */}
                  <div style={{marginBottom:12}}>
                    <div style={{...S.lbl,marginBottom:8}}>Oefening toevoegen</div>

                        id="add-ex-input"

                        style={{flex:1,padding:"11px 14px",borderRadius:12,border:`1px solid ${BORDER}`,background:isDark?"#111":CARD_BG,color:TEXT,fontSize:13,outline:"none"}}

                      <button onClick={()=>{

                        const naam=input?.value?.trim();

                        // Add to EX_DB if not exists

                    </div>
                  </div>
                  <button onClick={saveWorkout} style={{width:"100%",padding:18,borderRadius:16,border:"none",cursor:"pointer",background:LIME,color:"#000",fontSize:16,fontWeight:800}}>{T.trainingOpslaan}</button>

            </div>

      {/* VOORTGANG TAB */}

          <div style={{...S.lbl,color:LIME,marginBottom:4}}>{T.statistieken}</div>

            ))}
          </div>

          {measSubTab==="gewicht"&&<>
            <div style={{...S.card,padding:24,marginBottom:14}}>

                <div><div style={{...S.lbl,marginBottom:8}}>{T.huidigGewicht}</div><div style={{fontSize:52,fontWeight:900,letterSpacing:-2,color:LIME,lineHeight:1}}>{curW}</div><div style={{fontSize:14,color:"#555",marginTop:4}}>{T.kilogram}</div></div>
                <div style={{textAlign:"right"}}>{curW>goalW&&<div style={{fontSize:11,color:"#ef4444",fontWeight:700,marginBottom:4}}>Nog {(curW-goalW).toFixed(1)}kg</div>}<div style={{fontSize:24,fontWeight:900,marginTop:8}}>{pct}%</div><div style={{fontSize:10,color:isDark?"#444":"#666"}}>{T.behaald}</div></div>
              </div>
              <div style={{background:isDark?"#1C1C1C":"#E8E8E0",borderRadius:99,height:8,overflow:"hidden",marginBottom:6}}><div style={{width:`${pct}%`,height:8,background:`linear-gradient(90deg,${LIME},#A8D020)`,borderRadius:99,transition:"width .8s ease"}}/></div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:isDark?"#444":"#666"}}><span>Start: {startW}kg</span><span>Doel: {goalW}kg</span></div>
            </div>
            <div style={{...S.card,padding:20,marginBottom:14}}><div style={{...S.lbl,marginBottom:16}}>{T.gewichtsverloop}</div><LineChart data={wLog.slice(-14)} height={130}/></div>
            <div style={{...S.card,padding:16,marginBottom:14}}>
              <div style={{...S.lbl,marginBottom:12}}>{T.gewichtInvoeren}</div>

            </div>
            {wLog.length>0&&<><div style={{...S.lbl,marginBottom:10}}>Metingen</div>{wLog.slice().reverse().slice(0,10).map((e,i,arr)=>{const prev=arr[i+1];const diff=prev?(e.w-prev.w).toFixed(1):null;return(<div key={e.id||i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",...S.card,padding:"12px 16px",marginBottom:6}}><div style={{fontSize:13,color:isDark?"#666":"#666"}}>{e.date}</div><div style={{display:"flex",gap:12,alignItems:"center"}}>{diff!==null&&<div style={{fontSize:12,fontWeight:700,color:parseFloat(diff)<0?LIME:parseFloat(diff)>0?"#ef4444":"#555"}}>{parseFloat(diff)>0?`+${diff}`:diff}kg</div>}<div style={{fontWeight:800,fontSize:16,color:LIME}}>{e.w}kg</div><button onClick={()=>deleteWeight(e.id)} style={{background:"none",border:"none",color:isDark?"#444":"#666",fontSize:16,cursor:"pointer",padding:"0 4px"}}>×</button></div></div>);})}</>}
          </>}

          {measSubTab==="lichaam"&&<>
            {/* Lichaamsmetingen */}
            <div style={{...S.card,padding:16,marginBottom:14}}>
              <div style={{...S.lbl,marginBottom:12}}>{T.nieuweMeting}</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
                {[{k:"waist",l:"Taille (cm)"},{k:"chest",l:"Borst (cm)"},{k:"hips",l:"Heupen (cm)"}].map(f=>(
                  <div key={f.k}>
                    <div style={{fontSize:9,color:"#555",fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>{f.l}</div>

                  </div>
                ))}
              </div>
              <button onClick={saveMeas} style={{width:"100%",padding:"11px",borderRadius:12,border:"none",cursor:"pointer",background:LIME,color:"#000",fontSize:13,fontWeight:800}}>{T.metingOpslaan}</button>
            </div>
            {bodyMeas.length>0&&(
              <div style={{...S.card,padding:16,marginBottom:14}}>
                <div style={{...S.lbl,marginBottom:12}}>Laatste metingen</div>

                  <div key={m.id||i} style={{display:"flex",justifyContent:"space-between",paddingBottom:10,marginBottom:10,borderBottom:i<Math.min(5,bodyMeas.length-1)?"1px solid #111":"none"}}>

                    <div style={{display:"flex",gap:14}}>

                  </div>
                ))}
              </div>

            {log.length>0&&<><div style={{...S.lbl,marginBottom:12}}>Trainingslog</div>
              {log.slice(0,10).map((e,i)=><div key={e.id||i} style={{...S.card,padding:16,marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:10,alignItems:"flex-start"}}><div><div style={{fontSize:14,fontWeight:800}}>{e.workout}</div><div style={{fontSize:11,color:isDark?"#444":"#666",marginTop:2}}>{e.day} · {e.date}</div></div><button onClick={()=>deleteWorkout(e.id)} style={{background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:8,color:"#ef4444",fontSize:11,cursor:"pointer",padding:"4px 10px",fontWeight:600,flexShrink:0}}>Verwijder</button></div>
                {(e.exercises||[]).slice(0,4).map((ex,j)=><div key={j} style={{display:"flex",justifyContent:"space-between",paddingBottom:6,marginBottom:6,borderBottom:j<Math.min(3,(e.exercises||[]).length-1)?"1px solid #1C1C1C":"none"}}><div style={{fontSize:11,color:isDark?"#666":"#666"}}>{ex.name}</div><div style={{fontSize:11,fontWeight:700,color:LIME}}>{(ex.weights||[]).filter(w=>w>0).map(w=>fmtVal(w,ex.unit||"kg")).join("·")||"–"}</div></div>)}
              </div>)}</>}

              <div style={{...S.card,padding:24,textAlign:"center"}}><div style={{fontSize:12,color:isDark?"#444":"#666",marginBottom:4}}>Nog geen records</div><div style={{fontSize:11,color:isDark?"#333":"#666"}}>Sla een training op om je eerste PR te registreren</div></div>
            ):(
              <div style={{...S.card,padding:16}}>
                {Object.entries(prData).sort((a,b)=>b[1].date.localeCompare(a[1].date)).map(([name,pr],i,arr)=>(
                  <div key={name} style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingBottom:12,marginBottom:12,borderBottom:i<arr.length-1?"1px solid #111":"none"}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:700,color:isDark?"#ccc":"#333",marginBottom:2}}>{name}</div>
                      <div style={{fontSize:10,color:isDark?"#444":"#666"}}>{pr.date}</div>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <div style={{textAlign:"right"}}>
                        <div style={{fontSize:20,fontWeight:900,color:LIME,letterSpacing:-0.5}}>{pr.weight}</div>
                        <div style={{fontSize:10,color:"#555"}}>{pr.unit}</div>
                      </div>
                      <button onClick={()=>{
                        const nieuw=window.prompt(`Nieuw PR voor ${name} (${pr.unit}):`, pr.weight);
                        if(nieuw&&!isNaN(parseFloat(nieuw))){
                          const updated={...prData,[name]:{...pr,weight:parseFloat(nieuw)}};
                          setPrData(updated);
                          LS.set("fitcoach_prs",updated);
                        }
                      }} style={{background:isDark?"#1C1C1C":"#E8E8E0",border:`1px solid ${isDark?"#333":"#D0D0C8"}`,color:isDark?"#666":"#666",width:28,height:28,borderRadius:8,cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>✏️</button>

                          LS.set("fitcoach_prs",updated);
                        }
                      }} style={{background:isDark?"#1C1C1C":"#E8E8E0",border:`1px solid ${isDark?"#333":"#D0D0C8"}`,color:"#ef4444",width:28,height:28,borderRadius:8,cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
                    </div>
                  </div>
                ))}
              </div>
            )}
            {Object.keys(prData).length>0&&<button onClick={()=>{if(window.confirm("Alle PR records wissen?")){{setPrData({});LS.set("fitcoach_prs",{});}}}} style={{width:"100%",padding:"11px",borderRadius:12,border:`1px solid ${BORDER}`,background:"none",color:isDark?"#333":"#666",fontSize:11,cursor:"pointer",marginTop:12}}>{T.recordsWissen}</button>}
          </>}
        </div>
      )}

      {/* VOEDING TAB */}
      {tab===T.voeding&&(
        <div style={{padding:"16px 16px 0"}}>
          {/* Header stijl ontwerp 5 */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <div>
              <div style={{fontSize:11,color:LIME,fontWeight:700,letterSpacing:2,textTransform:"uppercase",marginBottom:2}}>Voeding</div>
              <div style={{fontSize:28,fontWeight:900,color:TEXT,letterSpacing:-1.5,lineHeight:1}}>{foodDate===TODAY_KEY?"Vandaag":DAYS[parseDate(foodDate).getDay()]}</div>

              <button onClick={()=>{if(foodDate!==TODAY_KEY)setFoodDate(d=>fmtDate(new Date(parseDate(d).getTime()+86400000)));}} disabled={foodDate===TODAY_KEY} style={{width:32,height:32,borderRadius:"50%",border:`1px solid ${BORDER}`,background:"none",color:foodDate===TODAY_KEY?isDark?"#333":"#aaa":"#555",fontSize:14,cursor:foodDate===TODAY_KEY?"default":"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>

              <button key={t.k} onClick={()=>setFoodSubTab(t.k)} style={{width:"calc(50% - 3px)",padding:"10px 8px",borderRadius:10,border:`1px solid ${foodSubTab===t.k?isDark?"#333":"#888":"#1C1C1C"}`,cursor:"pointer",background:foodSubTab===t.k?isDark?"#1C1C1C":"#E0E0D8":isDark?"#111":CARD_BG,color:foodSubTab===t.k?TEXT:TEXT2,fontSize:12,fontWeight:foodSubTab===t.k?700:400}}>{t.l}</button>
            ))}
          </div>

          {foodSubTab==="dagelijks"&&<>

                <div style={{...S.card,padding:24,textAlign:"center"}}>
                  <div style={{fontSize:13,color:isDark?"#444":"#666",marginBottom:6}}>Roan maakt een persoonlijk weekmenu</div>
                  <div style={{fontSize:11,color:isDark?"#333":"#666",marginBottom:16}}>Stel voorkeuren in of kies een stijl hierboven</div>
                  <button onClick={async()=>{setWeekMenuLoading(true);const prefs=foodPrefs.likes?`Lekker: ${foodPrefs.likes}.`:"";const avoid=foodPrefs.dislikes?`Niet lekker: ${foodPrefs.dislikes}.`:"";const diet=foodPrefs.diet?`Dieet: ${foodPrefs.diet}.`:"";const txt=await ai(`Weekmenu (ma t/m zo) voor ${profile.name}, ${profile.age||30} jaar, ${persons} ${persons===1?"persoon":"personen"}. Doel: ${profile.goal}. Fase: ${fase}. ${prefs} ${avoid} ${diet} Cheatdag op ${cheatDag}. Elke dag ander eiwit. Vis max 1x. RESPOND IN ${lang==="en"?"English":lang==="de"?"German":"Dutch"}. ONLY JSON: {"ma":{"ontbijt":"...","lunch":"...","diner":"..."},...}`);try{const m=JSON.parse(txt.replace(/```json|```/g,"").trim());setWeekMenu(m);LS.set("fitcoach_weekmenu",m);}catch(e){}setWeekMenuLoading(false);}} style={{padding:"12px 28px",borderRadius:12,border:"none",background:LIME,color:"#000",fontSize:13,fontWeight:800,cursor:"pointer"}}>{T.weekmenuGenereren}</button>
                </div>
              )}
            </div>
          )}

          {foodSubTab==="boodschappen"&&(
            <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                <div><div style={{fontSize:13,fontWeight:800}}>Boodschappenlijst</div><div style={{fontSize:11,color:isDark?"#444":"#666",marginTop:2}}>{shoppingList.filter(i=>!i.checked).length} items over</div></div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={async()=>{setGenShoppingLoading(true);const menu=weekMenu?JSON.stringify(weekMenu):`gezonde maaltijden voor ${profile.goal}`;const txt=await ai(`Boodschappenlijst voor ${persons} ${persons===1?"persoon":"personen"} voor dit weekmenu: ${menu}. Geef HOEVEELHEDEN erbij (bijv. "500g kipfilet"). Groepeer per categorie. ALLEEN JSON array: ["500g kipfilet",...]. Max 28 items.`);try{const raw=JSON.parse(txt.replace(/```json|```/g,"").trim());const items=(Array.isArray(raw)?raw:[]).map(l=>({name:typeof l==="string"?l:l.name||String(l),checked:false}));setShoppingList(items);LS.set("fitcoach_shopping",items);}catch(e){}setGenShoppingLoading(false);}} disabled={genShoppingLoading} style={{padding:"7px 12px",borderRadius:10,border:`1px solid ${LIME}`,background:"rgba(200,241,56,0.06)",color:genShoppingLoading?"#555":LIME,fontSize:11,fontWeight:700,cursor:"pointer"}}>{genShoppingLoading?"Bezig...":"Genereer"}</button>
                  {shoppingList.length>0&&<button onClick={()=>{setShoppingList([]);LS.set("fitcoach_shopping",[]);}} style={{padding:"7px 12px",borderRadius:10,border:`1px solid ${BORDER}`,background:"none",color:isDark?"#444":"#666",fontSize:11,fontWeight:700,cursor:"pointer"}}>{T.leeg}</button>}
                </div>
              </div>
              {!weekMenu&&<div style={{...S.card,padding:"10px 14px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{fontSize:11,color:"#555"}}>Maak eerst een weekmenu voor een slimme lijst</div><button onClick={()=>setFoodSubTab("weekmenu")} style={{padding:"5px 10px",borderRadius:8,border:`1px solid ${LIME}`,background:"none",color:LIME,fontSize:11,fontWeight:700,cursor:"pointer"}}>Weekmenu →</button></div>}
              {/* Zelf item toevoegen */}
              <div style={{display:"flex",gap:8,marginBottom:12}}>
                <input 
                  value={newShoppingItem} 
                  onChange={e=>setNewShoppingItem(e.target.value)}
                  onKeyDown={e=>{if(e.key==="Enter"&&newShoppingItem.trim()){const u=[...shoppingList,{name:newShoppingItem.trim(),checked:false}];setShoppingList(u);LS.set("fitcoach_shopping",u);setNewShoppingItem("");}}}
                  placeholder="Item toevoegen..." 
                  style={{flex:1,padding:"11px 14px",borderRadius:12,border:`1px solid ${BORDER}`,background:isDark?"#111":CARD_BG,color:TEXT,fontSize:13,outline:"none"}}
                />
                <button onClick={()=>{if(!newShoppingItem.trim())return;const u=[...shoppingList,{name:newShoppingItem.trim(),checked:false}];setShoppingList(u);LS.set("fitcoach_shopping",u);setNewShoppingItem("");}} style={{padding:"11px 16px",borderRadius:12,border:"none",background:LIME,color:"#000",fontWeight:800,fontSize:16,cursor:"pointer"}}>+</button>
              </div>
              {shoppingList.length>0?(
                <div style={{...S.card,padding:14}}>
                  {shoppingList.map((item,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:12,paddingBottom:11,marginBottom:11,borderBottom:i<shoppingList.length-1?"1px solid #111":"none"}}>
                      <div onClick={()=>{const u=[...shoppingList];u[i]={...u[i],checked:!u[i].checked};setShoppingList(u);LS.set("fitcoach_shopping",u);}} style={{width:20,height:20,borderRadius:5,border:`1.5px solid ${item.checked?LIME:isDark?"#333":"#666"}`,background:item.checked?"rgba(200,241,56,0.15)":"none",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:LIME,flexShrink:0,cursor:"pointer"}}>{item.checked?"✓":""}</div>
                      <div onClick={()=>{const u=[...shoppingList];u[i]={...u[i],checked:!u[i].checked};setShoppingList(u);LS.set("fitcoach_shopping",u);}} style={{fontSize:13,color:item.checked?isDark?"#444":"#777":"#ccc",textDecoration:item.checked?"line-through":"none",flex:1,cursor:"pointer"}}>{typeof item==="string"?item:item.name}</div>
                      <button onClick={()=>{const u=shoppingList.filter((_,j)=>j!==i);setShoppingList(u);LS.set("fitcoach_shopping",u);}} style={{background:"none",border:"none",color:isDark?"#444":"#666",fontSize:16,cursor:"pointer",padding:"0 4px",flexShrink:0}}>×</button>
                    </div>
                  ))}
                </div>
              ):<div style={{...S.card,padding:24,textAlign:"center"}}><div style={{fontSize:13,color:isDark?"#444":"#666",marginBottom:8}}>Nog geen items</div><div style={{fontSize:11,color:isDark?"#333":"#666"}}>Typ hierboven om te beginnen of genereer via weekmenu</div></div>}
            </div>
          )}

          {foodSubTab==="recepten"&&(
            <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <div style={{fontSize:13,fontWeight:800}}>{T.opgeslagenRecepten}</div>
                <button onClick={async()=>{const txt=await ai(`Één gezond recept voor ${profile.name}, fase: ${fase}, doel: ${profile.goal}. NL, max 150 woorden.`);const newR={id:Date.now(),text:txt,date:TODAY_KEY};const u=[newR,...savedRecipes].slice(0,20);setSavedRecipes(u);LS.set("fitcoach_recipes",u);}} style={{padding:"7px 14px",borderRadius:10,border:`1px solid ${ORANGE}`,background:"rgba(255,107,43,0.06)",color:ORANGE,fontSize:11,fontWeight:700,cursor:"pointer"}}>+ Roan recept</button>
              </div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>{["Hoog eiwit ontbijt","Snelle lunch","Post-workout maaltijd","Laag carb diner"].map(s=><button key={s} onClick={async()=>{const txt=await ai(`Recept: ${s}. Voor ${profile.name}, fase: ${fase}. NL, max 120 woorden.`);const newR={id:Date.now(),text:txt,date:TODAY_KEY,tag:s};const u=[newR,...savedRecipes].slice(0,20);setSavedRecipes(u);LS.set("fitcoach_recipes",u);}} style={{padding:"6px 12px",borderRadius:20,border:`1px solid ${BORDER}`,background:isDark?"#111":CARD_BG,color:isDark?"#666":"#666",fontSize:11,cursor:"pointer",fontWeight:600}}>{s}</button>)}</div>
              {savedRecipes.length===0?<div style={{...S.card,padding:20,textAlign:"center"}}><div style={{fontSize:12,color:isDark?"#444":"#666",marginBottom:4}}>Geen recepten opgeslagen</div></div>:savedRecipes.map(r=><div key={r.id} style={{...S.card,padding:16,marginBottom:8}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><div style={{display:"flex",gap:8,alignItems:"center"}}><div style={{fontSize:10,color:isDark?"#444":"#666"}}>{r.date}</div>{r.tag&&<div style={{fontSize:9,color:ORANGE,fontWeight:700,letterSpacing:1,textTransform:"uppercase"}}>{r.tag}</div>}</div><button onClick={()=>{const u=savedRecipes.filter(x=>x.id!==r.id);setSavedRecipes(u);LS.set("fitcoach_recipes",u);}} style={{background:"none",border:"none",color:isDark?"#333":"#666",fontSize:14,cursor:"pointer"}}>×</button></div><div style={{fontSize:12,lineHeight:1.7,color:"#bbb",whiteSpace:"pre-wrap"}}>{r.text}</div></div>)}
            </div>
          )}
        </div>
      )}

      {/* COACH TAB */}
      {tab===T.coach&&(
        <div style={{padding:"24px 16px",display:"flex",flexDirection:"column",alignItems:"center"}}>
          <div style={{...S.lbl,color:LIME,marginBottom:4,alignSelf:"flex-start"}}>{T.jouwCoach}</div>
          <div style={{fontSize:32,fontWeight:900,letterSpacing:-1,marginBottom:24,alignSelf:"flex-start"}}>{T.meetRoan}</div>
          <div style={{marginBottom:16,position:"relative",display:"flex",justifyContent:"center",flexDirection:"column",alignItems:"center"}}>
            <div style={{position:"relative"}}>
              <FinnImg size={200} emotion="cool"/>
              <div style={{position:"absolute",top:8,right:-10,background:LIME,borderRadius:99,padding:"4px 12px",fontSize:10,fontWeight:800,color:"#000"}}>{T.online}</div>
            </div>
            <div style={{fontSize:28,fontWeight:900,letterSpacing:-1,color:TEXT,marginTop:8}}>Roan</div>
            <div style={{fontSize:13,color:"#555",marginTop:2}}>Jouw persoonlijke AI coach</div>
          </div>
          <div style={{...S.card,padding:16,marginBottom:16,width:"100%"}}>
            <div style={{display:"flex",gap:10,alignItems:"center"}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:LIME,flexShrink:0}}/>
              <div style={{fontSize:13,color:isDark?"#888":"#666",lineHeight:1.7}}>Ik ken jouw trainingen, voeding en doelen. Stel me een vraag of geef me een opdracht — ik voer het uit.</div>
            </div>
          </div>
          <div style={{width:"100%",marginBottom:16}}>
            <div style={{...S.lbl,marginBottom:12}}>{T.vraagRoan}</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>{["Motiveer me!","Wat eten vandaag?","Analyseer mijn week","Maak een schema","Ik ben moe","Hoe val ik af?"].map(q=><button key={q} onClick={()=>openFinnWith(q)} style={{padding:"12px 14px",borderRadius:14,border:`1px solid ${BORDER}`,background:CARD_BG,color:isDark?"#888":"#666",fontSize:12,cursor:"pointer",fontWeight:600,textAlign:"left"}}>{q}</button>)}</div>
          </div>
          <button onClick={()=>openFinnWith(null)} style={{width:"100%",padding:16,borderRadius:16,border:"none",cursor:"pointer",background:ORANGE,color:TEXT,fontSize:15,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",gap:12}}><FinnImg size={32}/>{T.chatRoan}</button>
        </div>
      )}

      {/* BOTTOM NAV */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:isDark?"rgba(13,13,13,0.97)":"rgba(245,245,240,0.97)",borderTop:`1px solid ${BORDER}`,display:"flex",zIndex:20,backdropFilter:"blur(24px)"}}>
        {[
          {id:T.home,svg:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>},
          {id:T.training,svg:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M6 4v16M18 4v16M2 8h4M18 8h4M2 16h4M18 16h4"/></svg>},
          {id:T.voortgang,svg:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>},
          {id:T.voeding,svg:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 2C8 2 4 6 4 10c0 5.25 8 12 8 12s8-6.75 8-12c0-4-4-8-8-8z"/></svg>},
          {id:T.coach,svg:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>},
        ].map(t=>(
          <button key={t.id} onClick={()=>{
            if(t.id===T.training&&tab===T.training&&!selectingMuscles){setSelectingMuscles(true);setSession(null);setTargetMuscles([]);}
            else{setTab(t.id);}
          }} style={{flex:1,padding:"12px 4px 10px",border:"none",background:"none",cursor:"pointer",color:tab===t.id?(t.id===T.coach?ORANGE:LIME):isDark?"#777":"#999",display:"flex",flexDirection:"column",alignItems:"center",gap:4,transition:"color .15s"}}>
            {t.svg}
            <div style={{fontSize:9,fontWeight:700,letterSpacing:0.5}}>{t.id.toUpperCase()}</div>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
