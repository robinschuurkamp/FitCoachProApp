*{box-sizing:border-box;margin:0;padding:0}

const WORKER="https://fitcoachai.robinschuurkamp.workers.dev";
const LS={get:(k)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}},set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}}};

function fmtDate(d){const dd=String(d.getDate()).padStart(2,'0'),mm=String(d.getMonth()+1).padStart(2,'0');return`${dd}/${mm}/${d.getFullYear()}`;}
function parseDate(s){const p=s.split('/');return new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));}
async function resizeImg(file){return new Promise(res=>{const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>{const max=220,ratio=Math.min(max/img.width,max/img.height),c=document.createElement('canvas');c.width=img.width*ratio;c.height=img.height*ratio;c.getContext('2d').drawImage(img,0,0,c.width,c.height);res(c.toDataURL('image/jpeg',0.75));};img.src=e.target.result;};r.readAsDataURL(file);});}
async function ai(prompt){
  try{
    const controller=new AbortController();
    const timeout=setTimeout(()=>controller.abort(),20000);
    const r=await fetch(WORKER,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:400,messages:[{role:"user",content:prompt}]}),
      signal:controller.signal
    });
    clearTimeout(timeout);
    if(!r.ok){console.error("Worker error:",r.status);return"Roan is even niet beschikbaar. Probeer het opnieuw.";}
    const d=await r.json();
    console.log("Response:",JSON.stringify(d).slice(0,100));
    if(d.content?.[0]?.text)return d.content[0].text;
    if(d.text)return d.text;
    if(d.response)return d.response;
    return"Roan heeft geen antwoord. Probeer het opnieuw.";
  }catch(e){
    if(e.name==="AbortError")return"Roan reageert te langzaam. Probeer het opnieuw.";
    return"Verbindingsfout. Controleer je internet.";
  }
}

function speak(txt,lang){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(txt);
  const appLang=lang||localStorage.getItem("fitcoach_lang")||"nl";
  u.lang=appLang==="en"?"en-GB":appLang==="de"?"de-DE":"nl-NL";
  u.rate=1.0;u.pitch=1.0;
  const voices=window.speechSynthesis.getVoices();
  const match=voices.find(v=>v.lang.startsWith(u.lang.split("-")[0]))||voices[0];
  if(match)u.voice=match;
  window.speechSynthesis.speak(u);
}
function startListening(onResult,onEnd){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return null;
  const appLang=localStorage.getItem("fitcoach_lang")||"nl";
  const r=new SR();r.lang=appLang==="en"?"en-GB":appLang==="de"?"de-DE":"nl-NL";r.continuous=false;r.interimResults=false;
  r.onresult=e=>{const t=e.results[0][0].transcript.toLowerCase().trim();onResult(t);};
  r.onend=()=>{if(onEnd)onEnd();};r.onerror=()=>{if(onEnd)onEnd();};r.start();return r;
}

function adjustForGoal(exercises,goal,sportType){
  if(!goal||sportType==="hiit"||sportType==="cardio")return exercises;
  return exercises.map(ex=>{
    const e={...ex};
    if(goal==="afvallen"){
      e.reps=typeof e.reps==="string"&&e.reps.includes("-")?e.reps.split("-").map((n,i)=>i===0?parseInt(n)+2:parseInt(n)+4).join("-"):e.reps;
      e.weights=e.weights.map(w=>w>0?Math.max(0,Math.round(w*0.8)):0);
      e.restSecs=Math.min(45,e.restSecs||60);
    } else if(goal==="spiermassa"){
      e.reps=typeof e.reps==="string"&&e.reps.includes("-")?e.reps.split("-").map(n=>Math.max(4,parseInt(n)-2)).join("-"):e.reps;
      e.weights=e.weights.map(w=>w>0?Math.round(w*1.05):0);
      e.restSecs=Math.min(90,Math.max(60,e.restSecs||60));
    } else if(goal==="fitter"){
      e.restSecs=Math.min(45,e.restSecs||60);
    }
    return e;
  });
}

  "Fire Hydrant":{muscle:"billen",unit:"reps",rest:20,info:"Op handen en knieën. Hef een knie zijwaarts omhoog. Houd heupen stabiel.",yt:"fire+hydrant+exercise"},
  "Single Leg Deadlift":{muscle:"billen",unit:"kg",rest:60,info:"Sta op één been. Kantel voorover terwijl je het vrije been naar achteren strekt. Dumbbell in één hand.",yt:"single+leg+deadlift"},
  "Frog Pump":{muscle:"billen",unit:"reps",rest:20,info:"Lig op rug, voetzolen tegen elkaar, knieën wijd. Duw heupen omhoog. Beter met weerstandsband.",yt:"frog+pump+glutes"},

  "Ab Wheel Rollout":{muscle:"buik",unit:"reps",rest:30,info:"Begin op knieën met ab wheel. Rol naar voren zo ver als je kunt terwijl je core strak houdt. Rol terug.",yt:"ab+wheel+rollout"},
  "Bicycle Crunch":{muscle:"buik",unit:"reps",rest:20,info:"Lig op rug. Breng elleboog naar tegenovergestelde knie terwijl je wisselt. Rotatie activeert obliques.",yt:"bicycle+crunch"},
  "Russian Twist":{muscle:"buik",unit:"reps",rest:20,info:"Zit met voeten omhoog, rug licht achterover. Roteer van links naar rechts met gewicht of zonder.",yt:"russian+twist"},
  "Dead Bug":{muscle:"buik",unit:"reps",rest:20,info:"Lig op rug, armen omhoog, knieën 90 graden. Laat tegenovergestelde arm en been zakken zonder je rug van de grond te laten gaan.",yt:"dead+bug+exercise"},
  "Dragon Flag":{muscle:"buik",unit:"reps",rest:45,info:"Lig op bank, houd de bank achter je hoofd. Houd je lichaam recht en laat het gecontroleerd zakken en omhoog komen. Extreem moeilijk.",yt:"dragon+flag"},

  "Hollow Hold":{muscle:"buik",unit:"sec",rest:20,info:"Lig op rug. Armen boven je hoofd, benen gestrekt. Hef alles iets van de grond. Maak je lichaam hol.",yt:"hollow+body+hold"},
  "Pallof Press":{muscle:"buik",unit:"reps",rest:30,info:"Kabel op borsthoogte. Staan naast de kabel. Druk het handvat recht voor je uit en trek terug. Anti-rotatie core-oefening.",yt:"pallof+press"},
  "Clean and Press":{muscle:"full body",unit:"kg",rest:120,info:"Trek de stang van de grond naar je schouders in een explosieve beweging (clean). Duw daarna overhead (press). Hoge technische eisen.",yt:"clean+and+press"},
  "Thruster":{muscle:"full body",unit:"kg",rest:90,info:"Front squat gecombineerd met overhead press in één vloeiende beweging. Gebruik de kracht uit de squat om de druk omhoog te helpen.",yt:"thruster+exercise"},
  "Turkish Get-Up":{muscle:"full body",unit:"kg",rest:90,info:"Begin liggend met kettlebell boven je. Kom omhoog naar staand in een reeks gecontroleerde stappen. Combineert mobiliteit, stabiliteit en kracht.",yt:"turkish+get+up"},
  "Farmers Walk":{muscle:"full body",unit:"kg",rest:60,info:"Pak zwaar dumbbells of kettlebells. Loop een afstand terwijl je ze vasthoudt. Traint grip, traps, core en conditie tegelijk.",yt:"farmers+walk"},
  "Kettlebell Snatch":{muscle:"full body",unit:"kg",rest:75,info:"Explosief: kettlebell van grond naar overhead in één beweging. Begin met lichte gewichten en leer de techniek.",yt:"kettlebell+snatch"},

  "Bird Dog":{muscle:"buik",unit:"reps",rest:0,info:"Op handen en knieën. Strek tegenovergestelde arm en been tegelijk. Houd even vast. Traint balans en core-stabiliteit.",yt:"bird+dog+exercise"},
  "Superman":{muscle:"rug",unit:"reps",rest:0,info:"Lig op je buik. Hef armen en benen tegelijk van de grond. Houd even vast. Versterkt lage rug, billen en hamstrings.",yt:"superman+exercise"},
  "Worlds Greatest Stretch":{muscle:"full body",unit:"reps",rest:0,info:"Lunge voorwaarts. Zet hand naast voorste voet. Open thorax naar het plafond. Dan heup uitrekken.",yt:"worlds+greatest+stretch"},
  "Foam Roll Quads":{muscle:"benen",unit:"sec",rest:0,info:"Leg foamroller onder je quads. Rol langzaam van heup naar knie. Stop op pijnpunten. 60-90 seconden per been.",yt:"foam+roll+quads"},
  "Thoracic Rotation":{muscle:"rug",unit:"reps",rest:0,info:"Zit op knieën. Handen achter je hoofd. Roteer je bovenrug zo ver mogelijk naar links en rechts.",yt:"thoracic+rotation+stretch"},
  // ── CALISTHENICS ──────────────────────────────────────────────
  "Muscle-up":{muscle:"calisthenics",unit:"reps",rest:120,info:"Begin hangend aan de stang. Trek explosief omhoog en duw jezelf boven de stang. Combinatie van pull-up en dip. Vereist kracht én coördinatie. Begin met negatieve herhalingen.",yt:"muscle+up+tutorial"},
  "Handstand Push-up":{muscle:"calisthenics",unit:"reps",rest:90,info:"Ga in handstand tegen de muur. Buig je ellebogen gecontroleerd totdat je hoofd de grond raakt. Duw explosief terug omhoog. Traint schouders, triceps en core intensief.",yt:"handstand+push+up+tutorial"},
  "Pistol Squat":{muscle:"calisthenics",unit:"reps",rest:60,info:"Sta op één been, andere been gestrekt vooruit. Zak gecontroleerd door tot je bil bijna de grond raakt. Duw terug omhoog via de hiel. Uitstekende kracht- en balans oefening.",yt:"pistol+squat+tutorial"},
  "L-sit":{muscle:"calisthenics",unit:"sec",rest:60,info:"Zit op de grond of parallettes met gestrekte armen. Hef je benen horizontaal tot parallel aan de grond. Houd zo lang mogelijk vast. Traint core, heupflexoren en triceps maximaal.",yt:"l+sit+tutorial"},
  "Front Lever":{muscle:"calisthenics",unit:"sec",rest:90,info:"Hang aan de stang. Hef je lichaam horizontaal, parallel aan de grond met gestrekte armen. Eén van de moeilijkste calisthenics houdingen. Bouw op via tuck en straddle varianten.",yt:"front+lever+tutorial"},
  "Back Lever":{muscle:"calisthenics",unit:"sec",rest:90,info:"Hang met je rug naar beneden, lichaam horizontaal. Kracht in schouders, borst en core. Minder bekend maar geweldige oefening. Bouw op via gebogen knieën.",yt:"back+lever+tutorial"},
  "Human Flag":{muscle:"calisthenics",unit:"sec",rest:120,info:"Houd een verticale paal vast en houd je lichaam horizontaal zijwaarts. Extreme laterale kracht. Begin met gebogen knieën en bouw langzaam op.",yt:"human+flag+tutorial"},
  "Dragon Flag":{muscle:"calisthenics",unit:"reps",rest:60,info:"Lig op een bank, houd de bank achter je hoofd. Houd je lichaam volledig recht en laat het gecontroleerd zakken en omhoog komen. Favoriete oefening van Rocky Balboa.",yt:"dragon+flag+rocky"},
  "Planche":{muscle:"calisthenics",unit:"sec",rest:120,info:"Houd je lichaam horizontaal voorwaarts op gestrekte armen op de grond. Ultieme druk oefening. Begin met tuck planche en bouw langzaam op over maanden training.",yt:"planche+progression+tutorial"},
  "Ring Dips":{muscle:"calisthenics",unit:"reps",rest:75,info:"Dips op gymnastieken ringen. Moeilijker dan stang dips door de instabiliteit. Traint borst, triceps en schouders. Houd de ringen stabiel naast je lichaam.",yt:"ring+dips+tutorial"},
  "Ring Pull-ups":{muscle:"calisthenics",unit:"reps",rest:75,info:"Pull-ups op ringen. De roterende ringen passen mee met je beweging, minder belasting op gewrichten. Draai je polsen naar buiten bovenaan.",yt:"ring+pull+ups"},

  "Archer Push-up":{muscle:"calisthenics",unit:"reps",rest:45,info:"Brede push-up waarbij je naar één arm leunt terwijl de andere gestrekt blijft. Stap richting one-arm push-up. Afwisselen per herhaling.",yt:"archer+push+up"},
  "One-arm Push-up":{muscle:"calisthenics",unit:"reps",rest:60,info:"Push-up op één arm. Voeten wijd voor stabiliteit. Houd je lichaam recht, geen draaien in de romp. Een van de meest herkenbare calisthenics oefeningen.",yt:"one+arm+push+up"},
  "Typewriter Pull-up":{muscle:"calisthenics",unit:"reps",rest:75,info:"Trek jezelf op en beweeg zijwaarts langs de stang van links naar rechts. Traint de rug vanuit verschillende hoeken. Langzame gecontroleerde beweging.",yt:"typewriter+pull+up"},
  "Commando Pull-up":{muscle:"calisthenics",unit:"reps",rest:60,info:"Neutrale grip, handen voor elkaar op de stang. Breng je hoofd afwisselend links en rechts langs de stang omhoog. Traint rug en biceps asymmetrisch.",yt:"commando+pull+up"},
  "Toes-to-bar":{muscle:"calisthenics",unit:"reps",rest:45,info:"Hang aan de stang. Breng je benen omhoog totdat je tenen de stang aanraken. Uitstekende core en heupflexor oefening. Houd je armen recht.",yt:"toes+to+bar"},
  "Skin the Cat":{muscle:"calisthenics",unit:"reps",rest:60,info:"Hang aan ringen of stang. Breng je benen door je armen heen en draai je lichaam volledig door. Extreem goed voor schoudermobiliteit en rompkracht.",yt:"skin+the+cat+rings"},

  "Hollow Body Rock":{muscle:"calisthenics",unit:"reps",rest:30,info:"Vanuit hollow body positie wiegel je voor en achter als een schommelstoel. Constant spanning op de core. Populair in crossfit en turnen.",yt:"hollow+body+rock"},
  "Superman Hold":{muscle:"calisthenics",unit:"sec",rest:30,info:"Lig op je buik. Strek armen en benen en hef ze gelijktijdig zo hoog mogelijk. Houd de spanning vast. Traint lage rug, billen en schouders.",yt:"superman+hold+exercise"},
  "Archer Pull-up":{muscle:"calisthenics",unit:"reps",rest:75,info:"Brede grip pull-up waarbij je naar één arm leunt en de andere gestrekt houdt. Stap richting one-arm pull-up. Een van de moeilijkere calisthenics oefeningen.",yt:"archer+pull+up"},
  "Negative Pull-up":{muscle:"calisthenics",unit:"reps",rest:60,info:"Spring omhoog naar de bovenpositie en laat jezelf zo langzaam mogelijk zakken (5-10 seconden). Beste methode om pull-ups te leren. 5 seconden omlaag per herhaling.",yt:"negative+pull+ups+beginner"},
  "Negative Muscle-up":{muscle:"calisthenics",unit:"reps",rest:90,info:"Spring boven de stang en laat jezelf zo langzaam mogelijk zakken door de muscle-up beweging heen. Essentieel voor het leren van de muscle-up.",yt:"negative+muscle+up"},
  "Australian Pull-up":{muscle:"calisthenics",unit:"reps",rest:45,info:"Lig onder een lage stang, houd hem vast en trek je borst ernaar toe. Makkelijker dan een normale pull-up. Ideaal voor beginners of superset.",yt:"australian+pull+up+rows"},
  "Dip Shrugs":{muscle:"calisthenics",unit:"reps",rest:30,info:"Houd jezelf op de dip bars met gestrekte armen. Schouders omhoog/omlaag zonder de ellebogen te buigen. Traint trapezius en schouders.",yt:"dip+bar+shrugs"},
  "Bar Hang":{muscle:"calisthenics",unit:"sec",rest:30,info:"Hang aan de stang zo lang mogelijk. Verbetert grijpkracht, schoudermobiliteit en decompresseert de wervelkolom. Dagelijks doen voor 30-60 seconden.",yt:"dead+hang+benefits"},
  "Wall Handstand":{muscle:"calisthenics",unit:"sec",rest:45,info:"Handstand met voeten tegen de muur voor ondersteuning. Bouw schouder- en kernkracht op voor vrije handstand. Dagelijks oefenen voor 30-60 seconden.",yt:"wall+handstand+hold"},
  "Frog Stand":{muscle:"calisthenics",unit:"sec",rest:30,info:"Zit in hurkzak en plaats handen op de grond. Leun voorover en balanceer op je handen met knieën op je ellebogen. Eerste stap richting handstand.",yt:"frog+stand+tutorial"},
  "Crab Walk":{muscle:"calisthenics",unit:"sec",rest:20,info:"Zit met handen en voeten op de grond, buik omhoog. Loop achterwaarts, voorwaarts of zijwaarts. Traint schouders, triceps, core en billen.",yt:"crab+walk+exercise"},
  "Explosive Push-up":{muscle:"calisthenics",unit:"reps",rest:30,info:"Push-up waarbij je explosief omhoog springt zodat handen van de grond komen. Bouw plyometrische kracht en snelheid. Land zacht en direct in volgende herhaling.",yt:"explosive+clapping+push+up"},
  "Hanging Knee Raise":{muscle:"calisthenics",unit:"reps",rest:30,info:"Hang aan de stang. Trek je knieën naar je borst. Makkelijker dan rechte beenheffen. Ideaal als eerste stap richting toes-to-bar.",yt:"hanging+knee+raise"},
  "Ring Row":{muscle:"calisthenics",unit:"reps",rest:45,info:"Hang onder ringen met gestrekte armen, voeten op de grond. Trek je borst naar de ringen. Aanpasbaar in moeilijkheid door voetpositie. Goed voor beginners.",yt:"ring+rows+tutorial"},

function getSetValueOptions(unit){if(unit==="sec")return SEC_OPT;if(unit==="reps")return REPS_OPT;if(unit==="banen")return BANEN_OPT;return KG_OPT;}
function fmtVal(v,unit){
  if(!v&&v!==0)return"–";if(!v)return"–";
  if(unit==="sec"){if(v>=3600)return`${Math.floor(v/3600)}u${Math.floor((v%3600)/60)?Math.floor((v%3600)/60)+'m':''}`;if(v>=60)return`${Math.floor(v/60)}m${v%60?v%60+'s':''}`;return`${v}s`;}
  if(unit==="reps")return`${v}x`;if(unit==="banen")return`${v} banen`;
  return`${v>0?v+"kg":"–"}`;
}
function unitLabel(unit,exName){if(unit==="sec"){const n=(exName||"").toLowerCase();if(n.includes("hardlop")||n.includes("sprint")||n.includes("wandel")||n.includes("interval"))return"Duur";return"Tijd";}if(unit==="banen")return"Banen";if(unit==="reps")return"Herhalingen";return"Gewicht";}
function setLabel(unit,idx){if(unit==="sec")return`Ronde ${idx+1}`;if(unit==="banen")return`Ronde ${idx+1}`;return`Set ${idx+1}`;}

function RestTimer({seconds,onDone}){
  const [left,setLeft]=useState(seconds);
  const ref=useRef(null);
  useEffect(()=>{if(left>0){ref.current=setTimeout(()=>setLeft(l=>l-1),1000);}else{if(onDone)onDone();}return()=>clearTimeout(ref.current);},[left]);
  const pct=(left/seconds)*100;
  return(
    <div style={{background:CARD_BG,border:"1px solid "+BORDER,borderRadius:14,padding:"14px 16px",marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div><div style={{fontSize:10,letterSpacing:3,color:isDark?"#444":"#666",fontWeight:700,textTransform:"uppercase",marginBottom:2}}>Rust</div><div style={{fontSize:28,fontWeight:900,letterSpacing:-1,color:LIME,lineHeight:1}}>{left}<span style={{fontSize:13,color:isDark?"#444":"#666",fontWeight:400,marginLeft:2}}>sec</span></div></div>
        <button onClick={()=>{clearTimeout(ref.current);if(onDone)onDone();}} style={{padding:"8px 16px",borderRadius:8,border:`1px solid ${BORDER}`,background:"none",color:"#555",fontSize:12,fontWeight:700,cursor:"pointer",letterSpacing:1}}>SKIP</button>
      </div>
      <div style={{background:isDark?"#1A1A1A":"#E0E0D8",borderRadius:2,height:2,overflow:"hidden"}}><div style={{width:`${pct}%`,height:2,background:LIME,transition:"width .9s linear"}}/></div>
    </div>
  );
}

function HiitWorkout({exercises,onDone,voiceOn}){
  const WORK_OPTS=[20,30,40,45],REST_HIIT_OPTS=[10,15,20,30],EX_COUNT_OPTS=[4,5,6,7,8],ROUNDS_OPTS=[2,3,4,5];
  const [configured,setConfigured]=useState(false);
  const [workSec,setWorkSec]=useState(40),[restSec,setRestSec]=useState(20),[exCount,setExCount]=useState(6),[rounds,setRounds]=useState(3),[useWeights,setUseWeights]=useState(false);
  const [phase,setPhase]=useState("work"),[left,setLeft]=useState(workSec),[exIdx,setExIdx]=useState(0),[roundIdx,setRoundIdx]=useState(1),[totalLeft,setTotalLeft]=useState(20*60),[running,setRunning]=useState(false);
  const ref=useRef(null),totalRef=useRef(null);
  const ALL_HIIT_EX=Object.entries(EX_DB).filter(([n,db])=>["full body","benen","buik","borst","armen"].includes(db.muscle)&&(useWeights||(db.unit==="reps"||db.unit==="sec"))).map(([n])=>n);
  const poolBase=exercises.map(e=>e.name),poolExtra=ALL_HIIT_EX.filter(n=>!poolBase.includes(n)),pool=[...poolBase,...poolExtra],circuitEx=pool.slice(0,exCount);
  function say(txt){if(voiceOn)speak(txt);}
  const totalSets=circuitEx.length*rounds,totalSecCalc=(workSec+restSec)*totalSets,estMin=Math.round(totalSecCalc/60);
  useEffect(()=>{
    if(!configured||!running)return;
    if(left>0){ref.current=setTimeout(()=>{const nl=left-1;setLeft(nl);if(nl===3&&phase==="work")say("Drie. Twee. Één.");if(nl===3&&phase==="rest")say("Drie. Twee. Één. Go!");},1000);}
    else{if(phase==="work"){say("Rust.");setPhase("rest");setLeft(restSec);}else{const ni=exIdx+1;if(ni>=circuitEx.length){const nr=roundIdx+1;if(nr>rounds){say("Training voltooid.");setRunning(false);setPhase("done");}else{say(`Ronde ${nr} van ${rounds}. ${circuitEx[0]}.`);setRoundIdx(nr);setExIdx(0);setPhase("work");setLeft(workSec);}}else{say(`${circuitEx[ni]}.`);setExIdx(ni);setPhase("work");setLeft(workSec);}}}
    return()=>clearTimeout(ref.current);
  },[configured,running,left,phase]);
  useEffect(()=>{
    if(!configured||!running)return;

      <div style={{marginBottom:20}}><button onClick={()=>setUseWeights(v=>!v)} style={{width:"100%",padding:"12px 16px",borderRadius:12,border:`1px solid ${useWeights?LIME:"#1C1C1C"}`,background:useWeights?"rgba(200,241,56,0.06)":"#111",color:useWeights?LIME:"#555",fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}><span>Oefeningen met gewichten</span><span style={{fontSize:11,color:useWeights?LIME:isDark?"#333":"#666"}}>{useWeights?"Aan":"Uit"}</span></button></div>
      <div style={{background:BG,borderRadius:12,padding:"10px 14px",marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{fontSize:12,color:"#555"}}>Geschatte duur</div><div style={{fontSize:14,fontWeight:900,color:estMin>45?"#ef4444":LIME}}>{estMin} min {estMin>45&&<span style={{fontSize:11,color:"#ef4444"}}>· te lang!</span>}</div></div>
      <div style={{background:BG,borderRadius:14,padding:14,marginBottom:20}}><div style={{fontSize:10,letterSpacing:3,color:isDark?"#444":"#888",fontWeight:700,textTransform:"uppercase",marginBottom:10}}>Circuit ({circuitEx.length} oefeningen · {rounds} rondes)</div>{circuitEx.map((name,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingBottom:8,marginBottom:8,borderBottom:i<circuitEx.length-1?"1px solid #111":"none"}}><div style={{fontSize:13,color:isDark?"#ccc":"#333",fontWeight:600}}>{name}</div><div style={{fontSize:10,color:isDark?"#444":"#888"}}>{workSec}s · {restSec}s rust</div></div>)}</div>
      <button onClick={()=>{setConfigured(true);setLeft(workSec);setTotalLeft(20*60);say(`${rounds} rondes. ${circuitEx.length} oefeningen. Ronde 1. ${circuitEx[0]}. Start.`);setRunning(true);}} disabled={estMin>45} style={{width:"100%",padding:18,borderRadius:14,border:"none",cursor:estMin>45?"default":"pointer",background:estMin>45?"#1C1C1C":ORANGE,color:estMin>45?isDark?"#444":"#777":"#fff",fontSize:16,fontWeight:900,letterSpacing:-0.5}}>{estMin>45?"Verklein circuit (max 45 min)":"Start circuit"}</button>
    </div>
  );
  if(phase==="done")return(<div style={{padding:"60px 0",textAlign:"center"}}><div style={{fontSize:11,letterSpacing:4,color:isDark?"#444":"#888",fontWeight:700,textTransform:"uppercase",marginBottom:16}}>Voltooid</div><div style={{fontSize:52,fontWeight:900,letterSpacing:-2,color:LIME,marginBottom:4,lineHeight:1}}>{rounds} rondes</div><div style={{fontSize:14,color:"#555",marginBottom:8}}>{circuitEx.length} oefeningen · HIIT circuit</div><button onClick={onDone} style={{padding:"16px 40px",borderRadius:14,border:"none",cursor:"pointer",background:LIME,color:"#000",fontSize:15,fontWeight:900}}>Opslaan</button></div>);
  const isWork=phase==="work",curEx=circuitEx[exIdx%circuitEx.length],nextExName=circuitEx[(exIdx+1)%circuitEx.length],curSec=isWork?workSec:restSec,pct=(left/curSec)*100,isAlert=left<=3&&running;
  return(
    <div>
      <div style={{marginBottom:16}}><div style={{display:"flex",justifyContent:"space-between",fontSize:10,letterSpacing:2,color:isDark?"#444":"#888",fontWeight:700,textTransform:"uppercase",marginBottom:6}}><span>Ronde {roundIdx} / {rounds}</span><span>{Math.floor(totalLeft/60)}:{String(totalLeft%60).padStart(2,'0')}</span></div><div style={{background:isDark?"#111":CARD_BG,borderRadius:2,height:2}}><div style={{width:`${Math.min(100,100-(totalLeft/(20*60)*100))}%`,height:2,background:isDark?"#333":"#666",transition:"width 1s linear"}}/></div></div>
      <div style={{background:BG,borderRadius:20,padding:"32px 24px",marginBottom:12,textAlign:"center",border:`1px solid ${isWork?"#1C1C1C":"rgba(200,241,56,0.1)"}`}}>
        <div style={{fontSize:10,letterSpacing:4,fontWeight:700,textTransform:"uppercase",color:isWork?ORANGE:LIME,marginBottom:16}}>{isWork?"Work":"Rust"}</div>
        {isWork&&<div style={{fontSize:28,fontWeight:900,letterSpacing:-1,marginBottom:4}}>{curEx}</div>}
        {!isWork&&<div style={{marginBottom:16}}><div style={{fontSize:12,color:isDark?"#444":"#888",marginBottom:4}}>Volgende</div><div style={{fontSize:22,fontWeight:900,color:isDark?"#888":"#666"}}>{nextExName}</div></div>}
        <div style={{fontSize:isAlert?90:76,fontWeight:900,letterSpacing:-4,lineHeight:1,color:isAlert?"#ef4444":isWork?ORANGE:LIME,transition:"color .3s",marginBottom:6}}>{left}</div>
        <div style={{fontSize:10,letterSpacing:3,color:isDark?"#444":"#888",textTransform:"uppercase"}}>seconden</div>
        <div style={{background:isDark?"#111":CARD_BG,borderRadius:2,height:2,marginTop:20,overflow:"hidden"}}><div style={{width:`${pct}%`,height:2,background:isWork?ORANGE:LIME,transition:"width .9s linear"}}/></div>
      </div>
      {isWork&&<div style={{background:BG,border:"1px solid "+BORDER,borderRadius:12,padding:"10px 16px",marginBottom:12,display:"flex",justifyContent:"space-between"}}><div style={{fontSize:10,letterSpacing:2,color:isDark?"#444":"#888",fontWeight:700,textTransform:"uppercase"}}>Daarna</div><div style={{fontSize:13,color:"#555",fontWeight:600}}>{nextExName}</div></div>}
      <div style={{display:"flex",gap:8}}><button onClick={()=>setRunning(r=>!r)} style={{flex:1,padding:"16px",borderRadius:14,border:"none",cursor:"pointer",background:running?"#1C1C1C":ORANGE,color:running?"#555":"#fff",fontSize:13,fontWeight:900,letterSpacing:1,textTransform:"uppercase"}}>{running?"Pauze":"Hervat"}</button><button onClick={()=>setLeft(0)} style={{padding:"16px 20px",borderRadius:14,border:`1px solid ${BORDER}`,background:"none",color:isDark?"#444":"#888",fontSize:11,fontWeight:700,cursor:"pointer",letterSpacing:1,textTransform:"uppercase"}}>Skip</button></div>
    </div>
  );
}

function haversine(a,b){const R=6371000,dLat=(b.lat-a.lat)*Math.PI/180,dLon=(b.lon-a.lon)*Math.PI/180;const x=Math.sin(dLat/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLon/2)**2;return 2*R*Math.asin(Math.sqrt(x));}

// ── Zwem Tracker ──────────────────────────────────────────────
function SwimTracker({onDone,profile}){
  const SLAGEN=[
    {v:"vrije slag",l:"Vrije slag",cal:0.014},
    {v:"schoolslag",l:"Schoolslag",cal:0.012},
    {v:"rugslag",l:"Rugslag",cal:0.013},
    {v:"wisselslag",l:"Wisselslag",cal:0.015},
    {v:"borstcrawl",l:"Borstcrawl",cal:0.016},
  ];
  const BAANLENGTE=[25,50];
  const [modus,setModus]=useState("live"); // live | achteraf
  const [slag,setSlag]=useState("vrije slag");
  const [baanM,setBaanM]=useState(25);
  const [doelBanen,setDoelBanen]=useState(20);
  const [fase,setFase]=useState("setup");
  // Live modus state
  const [banen,setBanen]=useState(0);
  const [elapsed,setElapsed]=useState(0);
  const [running,setRunning]=useState(false);
  const [splits,setSplits]=useState([]);
  const timerRef=useRef(null);
  const elapsedRef=useRef(0);
  // Achteraf modus state
  const [aNBanen,setANBanen]=useState("");
  const [aTijd,setATijd]=useState("");

  const gewicht=parseFloat(profile?.weight)||75;
  const slagInfo=SLAGEN.find(s=>s.v===slag)||SLAGEN[0];
  const totaalM=banen*baanM;
  const kcal=Math.round(gewicht*slagInfo.cal*totaalM/100*100);
  function fmtTime(s){const m=Math.floor(s/60),sec=s%60;return m+":"+String(sec).padStart(2,"0");}

  function startLive(){
    setFase("live");setBanen(0);setElapsed(0);setSplits([]);elapsedRef.current=0;setRunning(true);
    timerRef.current=setInterval(()=>{elapsedRef.current+=1;setElapsed(elapsedRef.current);},1000);
  }
  function baanGedaan(){
    const nb=banen+1;
    setBanen(nb);
    setSplits(p=>[...p,{baan:nb,tijd:elapsedRef.current}]);
    if(nb>=doelBanen){clearInterval(timerRef.current);setRunning(false);setFase("klaar");}
  }
  function stopLive(){clearInterval(timerRef.current);setRunning(false);setFase("klaar");}
  useEffect(()=>()=>clearInterval(timerRef.current),[]);

  const S={card:{background:CARD_BG,borderRadius:14,border:"1px solid "+BORDER}};
  const BLAUW="#60a5fa";

  // ── SETUP ────────────────────────────────────────────────────
  if(fase==="setup")return(
    <div>
      {/* Header foto stijl */}
      <div style={{height:130,borderRadius:14,overflow:"hidden",position:"relative",marginBottom:16,background:isDark?"#111":CARD_BG}}>
        <img src={P.rug} alt="Zwemmen" style={{width:"100%",height:"100%",objectFit:"cover",opacity:0.6}}/>
        <div style={{position:"absolute",inset:0,background:"linear-gradient(to bottom,transparent,rgba(0,0,0,0.8))"}}/>
        <div style={{position:"absolute",bottom:14,left:16}}>
          <div style={{fontSize:10,letterSpacing:3,color:BLAUW,fontWeight:700,textTransform:"uppercase",marginBottom:4}}>Zwemmen</div>
          <div style={{fontSize:22,fontWeight:900,color:"#fff"}}>Stel je training in</div>
        </div>
      </div>

      {/* Modus */}
      <div style={{fontSize:11,letterSpacing:2,color:isDark?"#444":"#888",fontWeight:700,textTransform:"uppercase",marginBottom:8}}>Hoe wil je bijhouden?</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
        {[{v:"live",l:"Live tellen",d:"Tik na elke baan — telefoon in waterdicht hoesje"},{v:"achteraf",l:"Achteraf invoeren",d:"Vul in na je training"}].map(m=>(
          <button key={m.v} onClick={()=>setModus(m.v)} style={{padding:"13px 12px",borderRadius:12,border:"1px solid "+(modus===m.v?BLAUW:"#1C1C1C"),background:modus===m.v?"rgba(96,165,250,0.08)":"#111",cursor:"pointer",textAlign:"left"}}>
            <div style={{fontSize:13,fontWeight:800,color:modus===m.v?BLAUW:TEXT,marginBottom:3}}>{m.l}</div>
            <div style={{fontSize:10,color:isDark?"#444":"#888",lineHeight:1.4}}>{m.d}</div>
          </button>
        ))}
      </div>

      {/* Baanlengte */}
      <div style={{fontSize:11,letterSpacing:2,color:isDark?"#444":"#888",fontWeight:700,textTransform:"uppercase",marginBottom:8}}>Baanlengte</div>
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        {BAANLENGTE.map(m=>(
          <button key={m} onClick={()=>setBaanM(m)} style={{flex:1,padding:"12px",borderRadius:12,border:"1px solid "+(baanM===m?BLAUW:"#1C1C1C"),background:baanM===m?"rgba(96,165,250,0.08)":"#111",cursor:"pointer",textAlign:"center"}}>
            <div style={{fontSize:18,fontWeight:900,color:baanM===m?BLAUW:TEXT}}>{m}m</div>
            <div style={{fontSize:10,color:isDark?"#444":"#888",marginTop:2}}>{m===25?"Klein bad":"Olympisch bad"}</div>
          </button>
        ))}
      </div>

      {/* Slag */}
      <div style={{fontSize:11,letterSpacing:2,color:isDark?"#444":"#888",fontWeight:700,textTransform:"uppercase",marginBottom:8}}>Slag</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
        {SLAGEN.map(s=>(
          <button key={s.v} onClick={()=>setSlag(s.v)} style={{padding:"11px 14px",borderRadius:12,border:"1px solid "+(slag===s.v?BLAUW:"#1C1C1C"),background:slag===s.v?"rgba(96,165,250,0.08)":"#111",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:13,fontWeight:700,color:slag===s.v?BLAUW:TEXT}}>{s.l}</span>
            <span style={{fontSize:10,color:isDark?"#333":"#999"}}>{Math.round(gewicht*s.cal*100)} kcal/100m</span>
          </button>
        ))}
      </div>

      {/* Doel banen — alleen voor live modus */}
      {modus==="live"&&<>
        <div style={{fontSize:11,letterSpacing:2,color:isDark?"#444":"#888",fontWeight:700,textTransform:"uppercase",marginBottom:8}}>Doel</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:16}}>
          {[10,20,30,40,50,60,80,100].map(n=>(
            <button key={n} onClick={()=>setDoelBanen(n)} style={{padding:"10px 4px",borderRadius:10,border:"1px solid "+(doelBanen===n?BLAUW:"#1C1C1C"),background:doelBanen===n?"rgba(96,165,250,0.08)":"#111",cursor:"pointer",textAlign:"center"}}>
              <div style={{fontSize:13,fontWeight:800,color:doelBanen===n?BLAUW:TEXT}}>{n}</div>
              <div style={{fontSize:9,color:isDark?"#333":"#999"}}>{n*baanM}m</div>
            </button>
          ))}
        </div>
      </>}

      {/* Achteraf invoer */}
      {modus==="achteraf"&&<>
        <div style={{fontSize:11,letterSpacing:2,color:isDark?"#444":"#888",fontWeight:700,textTransform:"uppercase",marginBottom:8}}>Training invoeren</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
          <div>
            <div style={{fontSize:11,color:isDark?"#555":"#888",marginBottom:6}}>Aantal banen</div>
            <input type="number" value={aNBanen} onChange={e=>setANBanen(e.target.value)} placeholder="bijv. 40" style={{width:"100%",padding:"13px 14px",borderRadius:12,border:"1px solid "+BORDER,background:isDark?"#111":CARD_BG,color:TEXT,fontSize:16,fontWeight:700,outline:"none",boxSizing:"border-box"}}/>
          </div>
          <div>
            <div style={{fontSize:11,color:isDark?"#555":"#888",marginBottom:6}}>Tijd (minuten)</div>
            <input type="number" value={aTijd} onChange={e=>setATijd(e.target.value)} placeholder="bijv. 45" style={{width:"100%",padding:"13px 14px",borderRadius:12,border:"1px solid "+BORDER,background:isDark?"#111":CARD_BG,color:TEXT,fontSize:16,fontWeight:700,outline:"none",boxSizing:"border-box"}}/>
          </div>
        </div>
      </>}

      {/* Calorie preview */}
      {(modus==="live"||aNBanen)&&<div style={{...S.card,padding:"10px 16px",marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center",borderTop:"2px solid "+BLAUW}}>
        <span style={{fontSize:12,color:isDark?"#555":"#888"}}>Geschatte calorieën</span>
        <span style={{fontSize:16,fontWeight:900,color:BLAUW}}>~{modus==="live"?Math.round(gewicht*slagInfo.cal*doelBanen*baanM):Math.round(gewicht*slagInfo.cal*(parseInt(aNBanen)||0)*baanM)} kcal</span>
      </div>}

      <button onClick={()=>{
        if(modus==="achteraf"){
          if(!aNBanen)return;
          const totM=(parseInt(aNBanen)||0)*baanM;
          const totSec=(parseFloat(aTijd)||0)*60;
          onDone({sport:"zwemmen",banen:parseInt(aNBanen),afstand:totM,tijd:totSec,cal:Math.round(gewicht*slagInfo.cal*totM),slag,baanM});
        } else {

function RunTracker({voiceOn,onDone,prevRun,profile,log,defaultRunType}){
  const S={card:{background:CARD_BG,borderRadius:16,border:"1px solid "+BORDER}};
  // Hoofdmenu tabs
  const [mainTab,setMainTab]=useState("start"); // start | plannen | geschiedenis | records
  // Run setup
  const GOALS={vrij:{label:"Vrij",target:0,sub:"Geen doel"},k5:{label:"5 km",target:5000,sub:"Beginnersdoel"},k10:{label:"10 km",target:10000,sub:"Intermediate"},half:{label:"Halve marathon",target:21097,sub:"21.1 km"},marathon:{label:"Marathon",target:42195,sub:"42.2 km"}};
  const RUN_TYPES=[
    {v:"steady",l:"Duurloop",d:"Constant tempo, vetverbranding",kleur:LIME},
    {v:"interval",l:"Interval",d:"Sprint & herstel beurtelings",kleur:ORANGE},
    {v:"tempo",l:"Tempoloop",d:"Comfortabel hard, lactaat drempel",kleur:"#f59e0b"},
    {v:"wandel",l:"Wandelen",d:"Rustig of incline wandeling",kleur:"#60a5fa"},
  ];
  const [runType,setRunType]=useState(defaultRunType||"steady");
  const [selectedGoal,setSelectedGoal]=useState("vrij");
  const [sprintSec,setSprintSec]=useState(30);
  const [restSec,setRestSec]=useState(90);
  const [voiceKm,setVoiceKm]=useState(true);
  const [inclineMode,setInclineMode]=useState(false);
  // Actieve run state
  const [phase,setPhase]=useState("setup");
  const [dist,setDist]=useState(0);
  const [elapsed,setElapsed]=useState(0);
  const [isRunning,setIsRunning]=useState(false);
  const [kmSplits,setKmSplits]=useState([]);
  const [gpsError,setGpsError]=useState("");
  const [routePoints,setRoutePoints]=useState([]);
  const [currentPace,setCurrentPace]=useState("–");
  const [intervalPhase,setIntervalPhase]=useState("sprint");
  const [intervalLeft,setIntervalLeft]=useState(sprintSec);
  const [intervalCount,setIntervalCount]=useState(0);
  const [calories,setCalories]=useState(0);
  // Plan state
  const [activePlan,setActivePlan]=useState(()=>LS.get("fitcoach_run_plan")||null);
  // Refs
  const watchRef=useRef(null),timerRef=useRef(null),intRef=useRef(null);
  const lastPosRef=useRef(null),distRef=useRef(0),elapsedRef=useRef(0);
  const kmAlertsRef=useRef([]),routeRef=useRef([]);
  const lastPaceRef=useRef("–"),paceWindowRef=useRef([]);

  const gewicht=parseFloat(profile?.weight)||75;
  function say(txt){if(voiceOn)speak(txt);}
  function fmtTime(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;return h>0?h+":"+String(m).padStart(2,"0")+":"+String(sec).padStart(2,"0"):m+":"+String(sec).padStart(2,"0");}
  function calcPace(d,t){if(d<50||t<5)return"–";const mpm=(t/60)/(d/1000);if(mpm>20)return"–";return Math.floor(mpm)+":"+String(Math.round((mpm%1)*60)).padStart(2,"0");}
  function calcSpeed(d,t){if(d<50||t<1)return"0.0";return((d/1000)/(t/3600)).toFixed(1);}
  function calcCal(d,t){return Math.round(gewicht*d/1000*(runType==="wandel"?0.8:1.0)*0.95);}
  function hartzone(pace){
    if(pace==="–")return{zone:0,label:"–",color:"#555"};
    const [m,s]=pace.split(":").map(Number);const minKm=m+(s/60);
    if(minKm>8)return{zone:1,label:"Zone 1 — Herstel",color:"#60a5fa"};
    if(minKm>7)return{zone:2,label:"Zone 2 — Vetverbranding",color:"#34d399"};
    if(minKm>6)return{zone:3,label:"Zone 3 — Aerob",color:LIME};
    if(minKm>5)return{zone:4,label:"Zone 4 — Lactaatdrempel",color:ORANGE};
    return{zone:5,label:"Zone 5 — Maximaal",color:"#ef4444"};
  }
  // Hardloop PRs ophalen
  const runPRs=LS.get("fitcoach_run_prs")||{};
  // Hardloopgeschiedenis
  const runHistory=(log||[]).filter(e=>e.runDist>0);

  function startRun(){
    setPhase("running");setIsRunning(true);
    setDist(0);setElapsed(0);setKmSplits([]);setRoutePoints([]);setCalories(0);
    distRef.current=0;elapsedRef.current=0;kmAlertsRef.current=[];routeRef.current=[];paceWindowRef.current=[];
    const g=GOALS[selectedGoal];
    say(g.target>0?g.label+" start!":"Start "+RUN_TYPES.find(r=>r.v===runType)?.l+"!");
    // GPS
    if(navigator.geolocation){
      watchRef.current=navigator.geolocation.watchPosition(pos=>{
        const newP={lat:pos.coords.latitude,lon:pos.coords.longitude,t:Date.now()};
        if(lastPosRef.current){
          const d=haversine(lastPosRef.current,newP);
          if(d>(runType==="wandel"?0.5:1)&&d<200){
            distRef.current+=d;
            setDist(distRef.current);
            routeRef.current=[...routeRef.current,newP];
            setRoutePoints([...routeRef.current]);
            // Rolling pace (laatste 30 seconden)
            paceWindowRef.current=[...paceWindowRef.current,{d:distRef.current,t:elapsedRef.current}].slice(-30);
            if(paceWindowRef.current.length>5){
              const w=paceWindowRef.current;
              const dd=w[w.length-1].d-w[0].d;
              const dt=w[w.length-1].t-w[0].t;
              const p=calcPace(dd,dt);
              lastPaceRef.current=p;
              setCurrentPace(p);
            }
          }
        }
        lastPosRef.current=newP;
      },{enableHighAccuracy:true,maximumAge:1000,timeout:10000},
      ()=>setGpsError("GPS niet beschikbaar — controleer toestemming."));
    } else setGpsError("GPS niet ondersteund op dit apparaat.");
    // Timer
    timerRef.current=setInterval(()=>{
      elapsedRef.current+=1;
      setElapsed(elapsedRef.current);
      setCalories(calcCal(distRef.current,elapsedRef.current));
      // Km alerts
      const km=Math.floor(distRef.current/1000);
      if(km>0&&!kmAlertsRef.current.includes(km)){
        kmAlertsRef.current=[...kmAlertsRef.current,km];
        setKmSplits(prev=>[...prev,{km,time:elapsedRef.current,pace:lastPaceRef.current}]);
        if(voiceKm){
          const p=lastPaceRef.current!=="–"?lastPaceRef.current:calcPace(distRef.current,elapsedRef.current);
          say(km+" kilometer. Tempo "+p+" per kilometer.");
        }
        // PR check
        const prDist=km===5?5000:km===10?10000:null;
        if(prDist&&distRef.current>=prDist){
          const oldPR=runPRs["k"+km];
          if(!oldPR||elapsedRef.current<oldPR.time){say("Nieuw PR op "+km+" kilometer!");}
        }
        // Doel bereikt
        const target=GOALS[selectedGoal].target;
        if(target>0&&distRef.current>=target){say("Gefeliciteerd! "+GOALS[selectedGoal].label+" klaar in "+fmtTime(elapsedRef.current)+"!");stopRun(true);}
      }
    },1000);
    // Interval timer
    if(runType==="interval"){
      setIntervalLeft(sprintSec);setIntervalPhase("sprint");setIntervalCount(0);
      intRef.current=setInterval(()=>{
        setIntervalLeft(l=>{
          if(l<=1){
            setIntervalPhase(ip=>{
              if(ip==="sprint"){say("Herstel.");setIntervalCount(c=>c+1);setIntervalLeft(restSec);return"recovery";}
              else{say("Sprint!");setIntervalLeft(sprintSec);return"sprint";}
            });return 0;
          }return l-1;
        });
      },1000);
    }
  }

  function pauseRun(){
    setIsRunning(false);
    clearInterval(timerRef.current);clearInterval(intRef.current);
    if(watchRef.current)navigator.geolocation.clearWatch(watchRef.current);
    say("Pauze.");
  }
  function resumeRun(){
    setIsRunning(true);
    say("Hervat.");
    if(navigator.geolocation){watchRef.current=navigator.geolocation.watchPosition(pos=>{const newP={lat:pos.coords.latitude,lon:pos.coords.longitude,t:Date.now()};if(lastPosRef.current){const d=haversine(lastPosRef.current,newP);if(d>1&&d<200){distRef.current+=d;setDist(distRef.current);routeRef.current=[...routeRef.current,newP];setRoutePoints([...routeRef.current]);}}lastPosRef.current=newP;},{enableHighAccuracy:true,maximumAge:1000});}
    timerRef.current=setInterval(()=>{elapsedRef.current+=1;setElapsed(elapsedRef.current);setCalories(calcCal(distRef.current,elapsedRef.current));},1000);
    if(runType==="interval"&&intRef.current===null){intRef.current=setInterval(()=>{setIntervalLeft(l=>{if(l<=1){setIntervalPhase(ip=>{if(ip==="sprint"){say("Herstel.");setIntervalCount(c=>c+1);setIntervalLeft(restSec);return"recovery";}else{say("Sprint!");setIntervalLeft(sprintSec);return"sprint";}});return 0;}return l-1;});},1000);}
  }
  function stopRun(finished=false){
    clearInterval(timerRef.current);clearInterval(intRef.current);
    if(watchRef.current)navigator.geolocation.clearWatch(watchRef.current);
    timerRef.current=null;intRef.current=null;
    setIsRunning(false);
    if(finished||distRef.current>100){setPhase("done");}
    else{setPhase("setup");}
  }
  useEffect(()=>()=>{clearInterval(timerRef.current);clearInterval(intRef.current);if(watchRef.current)navigator.geolocation.clearWatch(watchRef.current);},[]);

  // ── SVG Route kaart ──────────────────────────────────────────
  function RouteKaart({points,height,live}){
    const H=height||200;
    const mapRef=useRef(null);
    const mapInstanceRef=useRef(null);
    const polylineRef=useRef(null);
    const markerRef=useRef(null);
    const startMarkerRef=useRef(null);
    const mapIdRef=useRef("map-"+Math.random().toString(36).slice(2,8));

    useEffect(()=>{
      if(typeof L==="undefined")return;
      if(!mapInstanceRef.current){
        const container=document.getElementById(mapIdRef.current);
        if(!container)return;
        const map=L.map(container,{zoomControl:false,attributionControl:true,dragging:true,touchZoom:true});
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
          attribution:"© OpenStreetMap",maxZoom:19
        }).addTo(map);
        mapInstanceRef.current=map;
      }
      return()=>{
        if(mapInstanceRef.current){mapInstanceRef.current.remove();mapInstanceRef.current=null;polylineRef.current=null;markerRef.current=null;startMarkerRef.current=null;}
      };
    },[]);

    useEffect(()=>{
      const map=mapInstanceRef.current;
      if(!map||typeof L==="undefined"||points.length===0)return;
      const latlngs=points.map(p=>[p.lat,p.lon]);
      // Update of maak polyline
      if(polylineRef.current){polylineRef.current.setLatLngs(latlngs);}
      else{polylineRef.current=L.polyline(latlngs,{color:"#C8F138",weight:4,opacity:0.9,lineCap:"round"}).addTo(map);}
      // Start marker (blauw)
      if(!startMarkerRef.current&&points.length>0){
        const startIcon=L.divIcon({html:'<div style="width:12px;height:12px;border-radius:50%;background:#60a5fa;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.5)"></div>',iconSize:[12,12],iconAnchor:[6,6],className:""});
        startMarkerRef.current=L.marker([points[0].lat,points[0].lon],{icon:startIcon}).addTo(map);
      }
      // Huidige positie marker (groen)
      const last=points[points.length-1];
      const currIcon=L.divIcon({html:'<div style="width:16px;height:16px;border-radius:50%;background:#C8F138;border:3px solid #fff;box-shadow:0 2px 8px rgba(200,241,56,0.6)"></div>',iconSize:[16,16],iconAnchor:[8,8],className:""});
      if(markerRef.current){markerRef.current.setLatLng([last.lat,last.lon]);}
      else{markerRef.current=L.marker([last.lat,last.lon],{icon:currIcon}).addTo(map);}
      // Zoom naar route
      if(points.length===1){map.setView([last.lat,last.lon],16);}
      else if(live){map.setView([last.lat,last.lon],16);}
      else{map.fitBounds(L.polyline(latlngs).getBounds(),{padding:[20,20]});}
    },[points]);

    if(points.length===0)return(
      <div style={{height:H,background:isDark?"#111":"#E8E8E0",borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:8,border:"1px solid "+(isDark?"#1C1C1C":"#E0E0D8")}}>
        <div style={{fontSize:20,color:isDark?"#444":"#888"}}>GPS</div>
        <div style={{fontSize:12,color:isDark?"#444":"#888",fontWeight:600}}>Wacht op GPS-signaal...</div>
      </div>
    );

    return(
      <div id={mapIdRef.current} style={{height:H,borderRadius:12,overflow:"hidden",border:"1px solid "+(isDark?"#1C1C1C":"#E0E0D8")}}/>
    );
  }

  // ── Samenvatting scherm ───────────────────────────────────────
  if(phase==="done"){
    const hz=hartzone(calcPace(dist,elapsed));
    // Sla PRs op
    [5000,10000,21097,42195].forEach(target=>{
      const key=target===5000?"k5":target===10000?"k10":target===21097?"half":"marathon";
      if(dist>=target){
        const splitTime=kmSplits[Math.round(target/1000)-1]?.time;
        if(splitTime&&(!runPRs[key]||splitTime<runPRs[key].time)){
          const newPRs={...runPRs,[key]:{time:splitTime,date:TODAY_KEY,dist:target}};
          LS.set("fitcoach_run_prs",newPRs);
        }
      }
    });
    return(
      <div>
        <div style={{textAlign:"center",padding:"24px 0 16px"}}>
          <div style={{fontSize:11,letterSpacing:4,color:isDark?"#444":"#888",fontWeight:700,textTransform:"uppercase",marginBottom:10}}>{runType==="wandel"?"Wandeling voltooid":"Run voltooid"}</div>
          <div style={{fontSize:72,fontWeight:900,letterSpacing:-4,color:LIME,lineHeight:1}}>{(dist/1000).toFixed(2)}</div>
          <div style={{fontSize:16,color:isDark?"#555":"#888",marginBottom:20}}>kilometer</div>
          <div style={{display:"flex",justifyContent:"center",gap:28,marginBottom:16}}>
            {[{l:"Tijd",v:fmtTime(elapsed)},{l:"Tempo",v:calcPace(dist,elapsed)+" /km"},{l:"Snelheid",v:calcSpeed(dist,elapsed)+" km/u"},{l:"Calorieën",v:calories+" kcal"}].map(s=>(
              <div key={s.l} style={{textAlign:"center"}}><div style={{fontSize:18,fontWeight:900,color:TEXT}}>{s.v}</div><div style={{fontSize:9,color:"#555",marginTop:2}}>{s.l}</div></div>
            ))}
          </div>
          <div style={{display:"inline-flex",padding:"6px 14px",borderRadius:99,background:hz.color+"22",border:"1px solid "+hz.color+"44",fontSize:11,fontWeight:700,color:hz.color,marginBottom:16}}>{hz.label}</div>
        </div>
        {routePoints.length>1&&(
          <div style={{marginBottom:16}}>
            <RouteKaart points={routePoints} height={260}/>
            <div style={{display:"flex",gap:8,marginTop:10}}>
              <button onClick={()=>{
                const pts=routePoints;
                if(pts.length<2)return;
                const lats=pts.map(p=>p.lat),lons=pts.map(p=>p.lon);
                const minLat=Math.min(...lats),maxLat=Math.max(...lats),minLon=Math.min(...lons),maxLon=Math.max(...lons);
                const pad=0.0003,W=800,H=500;
                const toX=lon=>((lon-minLon+pad)/(maxLon-minLon+pad*2))*W;
                const toY=lat=>H-((lat-minLat+pad)/(maxLat-minLat+pad*2))*H;
                const pathD=pts.map((p,i)=>(i===0?"M":"L")+toX(p.lon).toFixed(1)+","+toY(p.lat).toFixed(1)).join(" ");
                const last=pts[pts.length-1];
                const kmTxt=(dist/1000).toFixed(2)+" km";
                const statsTxt=fmtTime(elapsed)+" · "+calcPace(dist,elapsed)+" /km · "+calories+" kcal";
                const svgStr=
                  '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 '+W+' '+(H+120)+'">'
                  +'<rect width="'+W+'" height="'+(H+120)+'" fill="#0D0D0D"/>'
                  +'<path d="'+pathD+'" fill="none" stroke="#C8F138" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>'
                  +'<circle cx="'+toX(pts[0].lon).toFixed(1)+'" cy="'+toY(pts[0].lat).toFixed(1)+'" r="8" fill="#60a5fa"/>'
                  +'<circle cx="'+toX(last.lon).toFixed(1)+'" cy="'+toY(last.lat).toFixed(1)+'" r="10" fill="#C8F138" stroke="#0D0D0D" stroke-width="2"/>'
                  +'<text x="40" y="'+(H+52)+'" font-family="Arial" font-size="52" font-weight="900" fill="#C8F138">'+kmTxt+'</text>'
                  +'<text x="40" y="'+(H+88)+'" font-family="Arial" font-size="22" fill="#888">'+statsTxt+'</text>'
                  +'<text x="'+(W-30)+'" y="'+(H+108)+'" font-family="Arial" font-size="16" fill="#444" text-anchor="end">FitCoach Pro</text>'
                  +'</svg>';
                const blob=new Blob([svgStr],{type:"image/svg+xml"});
                const url=URL.createObjectURL(blob);
                const a=document.createElement("a");
                a.href=url;a.download="route.svg";
                document.body.appendChild(a);a.click();document.body.removeChild(a);
                setTimeout(()=>URL.revokeObjectURL(url),1000);
              }} style={{flex:1,padding:"11px",borderRadius:12,border:"1px solid rgba(200,241,56,0.3)",background:"rgba(200,241,56,0.06)",color:LIME,fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                Download route
              </button>
              {navigator.share&&<button onClick={async()=>{
                try{
                  const type=runType==="wandel"?"gewandeld":"gelopen";
                  await navigator.share({title:"Mijn route — FitCoach Pro",text:"Zojuist "+(dist/1000).toFixed(2)+" km "+type+" in "+fmtTime(elapsed)+"! Tempo: "+calcPace(dist,elapsed)+" /km. 🔥 "+calories+" kcal verbrand. Via FitCoach Pro 💪"});
                }catch(e){}
              }} style={{flex:1,padding:"11px",borderRadius:12,border:"none",background:LIME,color:"#000",fontSize:13,fontWeight:800,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                Delen
              </button>}
            </div>
          </div>
        )}
        {kmSplits.length>0&&(
          <div style={{...S.card,padding:14,marginBottom:14}}>
            <div style={{fontSize:10,letterSpacing:3,color:isDark?"#444":"#888",fontWeight:700,textTransform:"uppercase",marginBottom:10}}>Km splits</div>
            {kmSplits.map((s,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingBottom:8,marginBottom:8,borderBottom:i<kmSplits.length-1?"1px solid "+(isDark?"#111":"#E8E8E0"):"none"}}>
                <div style={{fontSize:13,color:isDark?"#888":"#666",fontWeight:600}}>Km {s.km}</div>
                <div style={{display:"flex",gap:16}}>
                  <div style={{fontSize:12,color:isDark?"#666":"#888"}}>{s.pace||"–"} /km</div>
                  <div style={{fontSize:13,fontWeight:700,color:LIME}}>{fmtTime(i===0?s.time:s.time-kmSplits[i-1].time)}</div>
                </div>
              </div>
            ))}
          </div>
        )}
        <button onClick={()=>onDone({dist,time:elapsed,pace:calcPace(dist,elapsed),speed:calcSpeed(dist,elapsed),cal:calories,goal:selectedGoal,type:runType,splits:kmSplits,route:routePoints})} style={{width:"100%",padding:16,borderRadius:14,border:"none",cursor:"pointer",background:LIME,color:"#000",fontSize:15,fontWeight:900,marginBottom:8}}>Opslaan & klaar</button>
        <button onClick={()=>setPhase("setup")} style={{width:"100%",padding:12,borderRadius:14,border:"1px solid "+BORDER,background:"none",color:isDark?"#555":"#888",fontSize:13,cursor:"pointer"}}>Nieuwe run</button>
      </div>
    );
  }

  // ── Actieve run scherm ────────────────────────────────────────
  if(phase==="running"){
    const hz=hartzone(currentPace);
    const targetDist=GOALS[selectedGoal].target;
    const progPct=targetDist>0?Math.min(100,(dist/targetDist)*100):0;
    return(
      <div>
        {gpsError&&<div style={{background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:10,padding:"8px 12px",marginBottom:10,fontSize:11,color:"#ef4444"}}>{gpsError}</div>}
        {targetDist>0&&(
          <div style={{marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:isDark?"#444":"#888",fontWeight:700,letterSpacing:2,textTransform:"uppercase",marginBottom:6}}>
              <span>{GOALS[selectedGoal].label}</span><span>{(dist/1000).toFixed(2)} / {(targetDist/1000).toFixed(1)} km</span>
            </div>
            <div style={{background:isDark?"#111":"#E8E8E0",borderRadius:99,height:4,overflow:"hidden"}}>
              <div style={{width:progPct+"%",height:4,background:LIME,borderRadius:99,transition:"width 2s"}}/>
            </div>
          </div>
        )}
        <div style={{marginBottom:10}}><RouteKaart points={routePoints} height={180} live={true}/></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
          <div style={{...S.card,padding:14,textAlign:"center"}}>
            <div style={{fontSize:9,letterSpacing:2,color:isDark?"#444":"#888",fontWeight:700,textTransform:"uppercase",marginBottom:4}}>Afstand</div>
            <div style={{fontSize:32,fontWeight:900,color:LIME,letterSpacing:-1}}>{(dist/1000).toFixed(2)}</div>
            <div style={{fontSize:10,color:isDark?"#444":"#888"}}>km</div>
          </div>
          <div style={{...S.card,padding:14,textAlign:"center"}}>
            <div style={{fontSize:9,letterSpacing:2,color:isDark?"#444":"#888",fontWeight:700,textTransform:"uppercase",marginBottom:4}}>Tijd</div>
            <div style={{fontSize:32,fontWeight:900,letterSpacing:-1}}>{fmtTime(elapsed)}</div>
          </div>
          <div style={{...S.card,padding:14,textAlign:"center"}}>
            <div style={{fontSize:9,letterSpacing:2,color:isDark?"#444":"#888",fontWeight:700,textTransform:"uppercase",marginBottom:4}}>Tempo</div>
            <div style={{fontSize:28,fontWeight:900,color:hz.color,letterSpacing:-1}}>{currentPace}</div>
            <div style={{fontSize:9,color:isDark?"#444":"#888"}}>/km</div>
          </div>
          <div style={{...S.card,padding:14,textAlign:"center"}}>
            <div style={{fontSize:9,letterSpacing:2,color:isDark?"#444":"#888",fontWeight:700,textTransform:"uppercase",marginBottom:4}}>Snelheid</div>
            <div style={{fontSize:28,fontWeight:900,letterSpacing:-1}}>{calcSpeed(dist,elapsed)}</div>
            <div style={{fontSize:9,color:isDark?"#444":"#888"}}>km/u</div>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
          <div style={{...S.card,padding:10,display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:hz.color,flexShrink:0}}/>
            <div style={{fontSize:10,color:hz.color,fontWeight:700}}>{hz.label}</div>
          </div>
          <div style={{...S.card,padding:10,textAlign:"center"}}>
            <div style={{fontSize:10,color:isDark?"#444":"#888"}}>{calories} kcal verbrand</div>
          </div>
        </div>
        {runType==="interval"&&(
          <div style={{...S.card,padding:"12px 16px",marginBottom:10,border:"1px solid "+(intervalPhase==="sprint"?"rgba(255,107,43,0.3)":"rgba(200,241,56,0.2)"),display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontSize:9,letterSpacing:3,color:intervalPhase==="sprint"?ORANGE:LIME,fontWeight:700,textTransform:"uppercase",marginBottom:2}}>{intervalPhase==="sprint"?"Sprint":"Herstel"}</div>
              <div style={{fontSize:36,fontWeight:900,color:intervalPhase==="sprint"?ORANGE:LIME,letterSpacing:-2}}>{intervalLeft}<span style={{fontSize:12,color:isDark?"#444":"#888",marginLeft:2}}>s</span></div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:9,color:isDark?"#333":"#888",textTransform:"uppercase",letterSpacing:2}}>Interval</div>
              <div style={{fontSize:28,fontWeight:900}}>{intervalCount+1}</div>
            </div>
          </div>
        )}
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>isRunning?pauseRun():resumeRun()} style={{flex:1,padding:16,borderRadius:14,border:"none",cursor:"pointer",background:isRunning?isDark?"#1C1C1C":"#E8E8E0":LIME,color:isRunning?isDark?"#555":"#888":"#000",fontSize:14,fontWeight:900,letterSpacing:1}}>
            {isRunning?"⏸ Pauze":"▶ Hervat"}
          </button>
          <button onClick={()=>{if(window.confirm("Run stoppen?"))stopRun(true);}} style={{padding:"16px 20px",borderRadius:14,border:"1px solid rgba(239,68,68,0.3)",background:"none",color:"#ef4444",fontSize:13,fontWeight:700,cursor:"pointer"}}>⏹ Stop</button>
        </div>
      </div>
    );
  }

  // ── Setup scherm ─────────────────────────────────────────────
  // Sub-tabs
  const tabs=[{id:"start",l:"Start"},{id:"plannen",l:"Plannen"},{id:"geschiedenis",l:"Historie"},{id:"records",l:"PRs"}];
  return(
    <div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:16}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setMainTab(t.id)} style={{padding:"11px 8px",borderRadius:10,border:"1px solid "+(mainTab===t.id?LIME:BORDER),cursor:"pointer",background:mainTab===t.id?"rgba(200,241,56,0.07)":isDark?"#111":CARD_BG,color:mainTab===t.id?LIME:isDark?"#555":"#888",fontSize:13,fontWeight:mainTab===t.id?800:500,textAlign:"center",transition:"all .15s",letterSpacing:-0.3}}>{t.l}</button>
        ))}
      </div>

      {mainTab==="start"&&(
        <div>
          {/* Vorige run */}
          {prevRun&&prevRun.dist>100&&(
            <div style={{...S.card,padding:"12px 16px",marginBottom:16,borderTop:"3px solid "+LIME}}>
              <div style={{fontSize:10,letterSpacing:2,color:LIME,fontWeight:700,textTransform:"uppercase",marginBottom:10}}>Vorige run</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                {[{l:"Afstand",v:(prevRun.dist/1000).toFixed(2)+" km",c:LIME},{l:"Tijd",v:fmtTime(prevRun.time||0),c:TEXT},{l:"Tempo",v:(prevRun.pace||"–")+" /km",c:TEXT}].map(s=>(
                  <div key={s.l} style={{textAlign:"center"}}>
                    <div style={{fontSize:16,fontWeight:900,color:s.c,marginBottom:2}}>{s.v}</div>
                    <div style={{fontSize:9,color:isDark?"#444":"#888",textTransform:"uppercase",letterSpacing:1}}>{s.l}</div>
                  </div>
                ))}
              </div>
            </div>
          )}
          {/* Type training — foto stijl */}
          <div style={{fontSize:11,letterSpacing:2,color:isDark?"#444":"#888",fontWeight:700,textTransform:"uppercase",marginBottom:10}}>Type training</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
            {RUN_TYPES.map(t=>{
              const fotoMap={steady:P.cardio,interval:P.hiit,tempo:P["full body"],wandel:P.buik};
              const foto=fotoMap[t.v]||P.cardio;
              return(
                <button key={t.v} onClick={()=>setRunType(t.v)} style={{height:100,borderRadius:14,border:"2px solid "+(runType===t.v?t.kleur:"transparent"),cursor:"pointer",overflow:"hidden",position:"relative",textAlign:"left"}}>
                  <img src={foto} alt={t.l} style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover"}}/>
                  <div style={{position:"absolute",inset:0,background:runType===t.v?"rgba(0,0,0,0.45)":"linear-gradient(to bottom,transparent 10%,rgba(0,0,0,0.8))"}}/>
                  {runType===t.v&&<div style={{position:"absolute",top:8,right:8,width:18,height:18,borderRadius:"50%",background:t.kleur,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#000",fontWeight:900}}>✓</div>}
                  <div style={{position:"relative",padding:"8px 10px",height:"100%",display:"flex",flexDirection:"column",justifyContent:"flex-end"}}>
                    <div style={{fontSize:14,fontWeight:900,color:"#fff",marginBottom:2}}>{t.l}</div>
                    <div style={{fontSize:9,color:"rgba(255,255,255,0.7)"}}>{t.d}</div>
                  </div>
                </button>
              );
            })}
          </div>
          {/* Incline voor wandelen */}
          {runType==="wandel"&&(
            <div style={{...S.card,padding:"10px 14px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div><div style={{fontSize:13,fontWeight:700,color:TEXT}}>Incline wandeling</div><div style={{fontSize:11,color:isDark?"#444":"#888"}}>Extra calorieverbranding, loopband helling</div></div>
              <div onClick={()=>setInclineMode(v=>!v)} style={{width:40,height:22,borderRadius:11,background:inclineMode?"rgba(96,165,250,0.2)":"#222",border:"1px solid "+(inclineMode?"#60a5fa":isDark?"#333":"#888"),position:"relative",cursor:"pointer",flexShrink:0}}>
                <div style={{width:16,height:16,borderRadius:"50%",background:inclineMode?"#60a5fa":isDark?"#444":"#888",position:"absolute",top:2,left:inclineMode?20:2,transition:"left .2s"}}/>
              </div>
            </div>
          )}
          {/* Doel afstand */}
          <div style={{fontSize:11,letterSpacing:2,color:isDark?"#444":"#888",fontWeight:700,textTransform:"uppercase",marginBottom:10}}>Doel</div>

function buildSession(muscles,log,profile){
  const stype=profile?.sportType||"kracht",epref=profile?.equipmentPref||"mixed",level=profile?.level||"beginner",goal=profile?.goal||"fitter",age=parseInt(profile?.age)||30;
  const diffs=LS.get("fitcoach_difficulty")||{};
  const machineEx=["Leg Press","Leg Extension","Leg Curl","Lat Pulldown","Seated Cable Row","Cable Fly","Triceps Pushdown","Face Pulls"];
  const dumbEx=["Incline Dumbbell Press","Lateral Raises","Hammer Curl","Incline Dumbbell Curl","Concentration Curl","Arnold Press"];
  const seniorAvoid=["Deadlift","Squat","Skull Crushers","Nordic Curl","Dragon Flag","Clean and Press","Thruster"];
  const exercises=[];
  muscles.forEach(muscle=>{
    const variants=ALL_WV[muscle]||WV[muscle]||WV["full body"];if(!variants)return;
    const prevCount=log.filter(e=>(e.targetMuscles||[]).includes(muscle)).length;
    const variant=variants[prevCount%variants.length]||variants[0];
    const last=log.find(e=>(e.targetMuscles||[]).includes(muscle));
    const lastMap={};if(last)last.exercises.forEach(e=>{lastMap[e.name]=e;});
    let filtered=[...variant];
    if(stype==="kracht"||stype==="gemixed"){if(epref==="machines"){const m=variant.filter(ex=>machineEx.includes(ex.name));if(m.length>=2)filtered=m;}else if(epref==="dumbbells"){const d=variant.filter(ex=>dumbEx.includes(ex.name));if(d.length>=2)filtered=d;}}
    if(age>=60){filtered=filtered.filter(ex=>!seniorAvoid.includes(ex.name));}
    if(level==="beginner"||age>=65){const compounds=filtered.filter(e=>e.compound).slice(0,2);const isolatie=filtered.filter(e=>!e.compound).slice(0,2);filtered=[...compounds,...isolatie];}
    else if(level==="gemiddeld"){const compounds=filtered.filter(e=>e.compound).slice(0,2);const isolatie=filtered.filter(e=>!e.compound).slice(0,3);filtered=[...compounds,...isolatie];}
    else{const compounds=filtered.filter(e=>e.compound).slice(0,2);const isolatie=filtered.filter(e=>!e.compound).slice(0,4);filtered=[...compounds,...isolatie];}
    filtered.forEach(ex=>{
      if(!exercises.find(e=>e.name===ex.name)){
        const db=EX_DB[ex.name]||{},unit=db.unit||"kg",prevEx=lastMap[ex.name];
        let weights=prevEx?[...prevEx.weights]:[...ex.weights];
        if(goal==="spiermassa"&&prevEx&&stype==="kracht"){const maxPrev=Math.max(0,...prevEx.weights.filter(w=>w>0));if(maxPrev>0){const increment=maxPrev<20?1.25:maxPrev<50?2.5:5;weights=weights.map(w=>w>0?Math.round((w+increment)/2.5)*2.5:w);}}
        if(age>=60){weights=weights.map(w=>w>0?Math.round(w*0.7/2.5)*2.5:w);}
        const diff=diffs[muscle];
        if(diff==="makkelijk"){weights=weights.map(w=>w>0?Math.round((w*1.075)/2.5)*2.5:w);}
        if(diff==="zwaar"){weights=weights.map(w=>w>0?Math.round((w*0.9)/2.5)*2.5:w);}
        exercises.push({...ex,weights,note:"",saved:false,unit,info:db.info||"",yt:db.yt||"",prevWeights:prevEx?.weights||null,prevNote:prevEx?.note||""});
      }
    });
  });
  const adjusted=adjustForGoal(exercises,goal,stype);
  if(age>=60){adjusted.forEach(e=>{if(!e.restSecs)e.restSecs=90;});}
  if(goal==="afvallen"&&(stype==="kracht"||stype==="gemixed")){const cf=CARDIO_FINISH[Math.floor(Math.random()*CARDIO_FINISH.length)];const db=EX_DB[cf.name]||{};adjusted.push({...cf,note:"",saved:false,unit:cf.unit||"sec",info:db.info||"",yt:db.yt||"",prevWeights:null,prevNote:"",isCardioFinish:true});}
  return adjusted;
}

function Ring({pct,size=80,stroke=7,color=LIME,value,label}){
  const r=(size-stroke*2)/2,circ=2*Math.PI*r,offset=circ*(1-Math.min(1,(pct||0)/100));
  return(<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6}}><div style={{position:"relative",width:size,height:size}}><svg width={size} height={size} style={{transform:"rotate(-90deg)"}}><circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#1C1C1C" strokeWidth={stroke}/><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round" style={{transition:"stroke-dashoffset .8s ease"}}/></svg><div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{fontSize:size>70?15:12,fontWeight:800,color,lineHeight:1}}>{value}</div></div></div><div style={{fontSize:10,color:isDark?"#666":"#666",fontWeight:600,letterSpacing:0.5,textTransform:"uppercase",textAlign:"center"}}>{label}</div></div>);
}
function LineChart({data,height=120}){
  if(!data||data.length<2)return<div style={{height,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:isDark?"#444":"#666"}}>Meer metingen nodig</div>;
  const vals=data.map(d=>d.w),mn=Math.min(...vals)-0.5,mx=Math.max(...vals)+0.5,rng=mx-mn,W=320,H=height-24;
  const pts=data.map((d,i)=>({x:20+(i/(data.length-1))*(W-40),y:H-((d.w-mn)/rng*H)+4,w:d.w,date:d.date}));
  const pd="M"+pts.map((p,i)=>{if(i===0)return p.x+","+p.y;const pv=pts[i-1],cx=(pv.x+p.x)/2;return "C"+cx+","+pv.y+" "+cx+","+p.y+" "+p.x+","+p.y;}).join(" ");
  return(<svg viewBox={`0 0 ${W} ${height}`} style={{width:"100%",height}}><defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={LIME} stopOpacity="0.25"/><stop offset="100%" stopColor={LIME} stopOpacity="0"/></linearGradient></defs><path d={pd+` L${pts[pts.length-1].x},${H+4} L${pts[0].x},${H+4} Z`} fill="url(#lg)"/><path d={pd} fill="none" stroke={LIME} strokeWidth="2.5" strokeLinecap="round"/>{pts.map((p,i)=>(<g key={i}><circle cx={p.x} cy={p.y} r={i===pts.length-1?5:2.5} fill={i===pts.length-1?LIME:isDark?"#333":"#666"} stroke={i===pts.length-1?"#0D0D0D":"none"} strokeWidth={2}/>{(i===0||i===pts.length-1||data.length<=6)&&<text x={p.x} y={height-2} textAnchor="middle" fontSize="8" fill="#555">{p.date.slice(0,5)}</text>}{i===pts.length-1&&<text x={p.x} y={p.y-10} textAnchor="middle" fontSize="9" fill={LIME} fontWeight="700">{p.w}kg</text>}</g>))}</svg>);
}

function VolumeBarChart({log}){
  // Bouw data van afgelopen 8 weken
  const weeks=[];
  for(let w=7;w>=0;w--){
    const weekStart=new Date(TODAY);
    weekStart.setDate(TODAY.getDate()-(TODAY.getDay()===0?6:TODAY.getDay()-1)-w*7);
    weekStart.setHours(0,0,0,0);
    const weekEnd=new Date(weekStart);weekEnd.setDate(weekStart.getDate()+7);
    const count=log.filter(e=>{try{const d=parseDate(e.date);return d>=weekStart&&d<weekEnd;}catch{return false;}}).length;
    const label=w===0?"Nu":w===1?"Vorig":`-${w}w`;
    weeks.push({count,label,isCurrentWeek:w===0});
  }
  const max=Math.max(...weeks.map(w=>w.count),1);
  return(
    <div>
      <div style={{display:"flex",gap:5,alignItems:"flex-end",height:70,marginBottom:6}}>
        {weeks.map((w,i)=>(
          <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
            <div style={{width:"100%",minHeight:2,height:w.count>0?Math.max(4,Math.round((w.count/max)*52)):2,background:w.isCurrentWeek?LIME:w.count>0?"rgba(200,241,56,0.3)":"#1C1C1C",borderRadius:"3px 3px 0 0",transition:"height .5s ease"}}/>
            {w.count>0&&<div style={{fontSize:8,color:w.isCurrentWeek?LIME:"#555",fontWeight:700}}>{w.count}x</div>}
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:5}}>
        {weeks.map((w,i)=><div key={i} style={{flex:1,textAlign:"center",fontSize:8,color:w.isCurrentWeek?isDark?"#fff":"#111":isDark?"#333":"#555",fontWeight:w.isCurrentWeek?700:400}}>{w.label}</div>)}
      </div>
    </div>
  );
}
