                    const restSecs=ex.restSecs!=null?ex.restSecs:defaultRest;
                    return(
                      <div key={ex.name+ei} style={{...S.card,marginBottom:12,overflow:"hidden",border:`1px solid ${ex.saved?"rgba(200,241,56,0.25)":"#1C1C1C"}`}}>
                        <div style={{height:160,position:"relative",background:"#1C1C1C"}}>
                          {photo&&<img src={photo} alt={ex.name} style={{width:"100%",height:"100%",objectFit:"cover",objectPosition:"center 30%"}} onError={e=>e.target.style.display="none"}/>}
                          <div style={{position:"absolute",inset:0,background:"linear-gradient(to bottom,transparent 40%,#141414)"}}/>
                          <div style={{position:"absolute",bottom:12,left:16,right:12,display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
                            <div><div style={{fontSize:17,fontWeight:900}}>{ex.name}</div><div style={{fontSize:11,color:"rgba(255,255,255,0.5)",marginTop:2}}>{ex.weights.length} sets · {ex.reps}</div></div>
                            <div style={{display:"flex",gap:6}}>
                              <button onClick={()=>setInfoEx(ex)} style={{background:"rgba(0,0,0,0.55)",border:"none",color:"#fff",width:32,height:32,borderRadius:"50%",cursor:"pointer",fontSize:13,fontWeight:700}}>i</button>
                              <button onClick={()=>setWisselIndex(wisselIndex===ei?null:ei)} style={{background:"rgba(0,0,0,0.55)",border:"none",color:"#fff",padding:"6px 10px",borderRadius:20,cursor:"pointer",fontSize:11,fontWeight:700}}>↕</button>
                              <button onClick={()=>removeExercise(ei)} style={{background:"rgba(239,68,68,0.7)",border:"none",color:"#fff",width:32,height:32,borderRadius:"50%",cursor:"pointer",fontSize:14,fontWeight:700}}>×</button>
                            </div>
                          </div>
                        </div>
                        <div style={{padding:16}}>
                          {isPR&&<div style={{fontSize:10,color:LIME,fontWeight:700,letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>PR!</div>}
                          {ex.isCardioFinish&&<div style={{fontSize:10,color:ORANGE,fontWeight:700,letterSpacing:2,textTransform:"uppercase",marginBottom:10,borderBottom:`1px solid rgba(255,107,43,0.15)`,paddingBottom:8}}>Cardio finish · Vetverbranding</div>}
                          {/* Progressieve overload suggestie */}
                          {profile?.goal==="spiermassa"&&ex.prevWeights&&!ex.isCardioFinish&&(()=>{
                            const maxPrev=Math.max(0,...ex.prevWeights.filter(w=>w>0));
                            const maxNow=Math.max(0,...ex.weights.filter(w=>w>0));
                            const increment=maxPrev<20?1.25:maxPrev<50?2.5:5;
                            const suggested=Math.round((maxPrev+increment)/2.5)*2.5;
                            if(maxPrev>0&&maxNow===maxPrev)return(
                              <div style={{background:"rgba(200,241,56,0.04)",border:"1px solid rgba(200,241,56,0.12)",borderRadius:10,padding:"8px 12px",marginBottom:10,fontSize:11,color:LIME}}>
                                Vorige keer {maxPrev}kg — probeer vandaag {suggested}kg voor progressie
                              </div>
                            );
                            return null;
                          })()}
                          {ex.prevWeights&&<div style={{background:"#1C1C1C",borderRadius:12,padding:"10px 14px",marginBottom:12}}><div style={{...S.lbl,marginBottom:8}}>Vorige training</div><div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{ex.prevWeights.map((w,i)=><div key={i} style={{textAlign:"center",minWidth:44}}><div style={{fontSize:9,color:"#444",marginBottom:3}}>{setLabel(unit,i)}</div><div style={{fontSize:13,fontWeight:700,color:"#666"}}>{fmtVal(w,unit)}</div></div>)}</div></div>}

                          <div style={{...S.lbl,marginBottom:8}}>{unitLabel(unit,ex.name)}</div>
                          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:4}}>
                            {ex.weights.map((w,si)=>{
                              const pv=ex.prevWeights?.[si];const up=w>0&&pv>0&&w>pv;
                              const setDone=ex.setsDone&&ex.setsDone[si];
                              return(<div key={si} style={{textAlign:"center"}}>
                                <div style={{...S.lbl,marginBottom:4,color:setDone?LIME:"#555"}}>{setLabel(unit,si)}{setDone?" ✓":""}</div>
                                {pv>0&&<div style={{fontSize:9,color:"#444",marginBottom:3}}>{fmtVal(pv,unit)}</div>}
                                <select value={w} onChange={e=>setW2(ei,si,Number(e.target.value))} style={{width:64,padding:"10px 4px",borderRadius:12,border:`1px solid ${up?"rgba(200,241,56,0.3)":w>0?"#333":"#1C1C1C"}`,background:up?"rgba(200,241,56,0.06)":w>0?"#1C1C1C":"#111",color:up?LIME:w>0?"#fff":"#444",fontSize:13,fontWeight:800,cursor:"pointer",textAlign:"center"}}>
                                  {opts.map(o=><option key={o} value={o}>{o>0?fmtVal(o,unit):"–"}</option>)}
                                </select>
                                {up&&<div style={{fontSize:9,color:LIME,marginTop:3,fontWeight:700}}>↑PR</div>}
                                {/* Set afvinken knop → start rust timer */}
                                {!setDone&&<button onClick={()=>{
                                  setSession(p=>p.map((e,i)=>i!==ei?e:{...e,
                                    setsDone:{...(e.setsDone||{}),[si]:true},
                                    activeRest:si<e.weights.length-1?si:null
                                  }));
                                }} style={{display:"block",width:64,marginTop:4,padding:"4px",borderRadius:8,border:"none",cursor:"pointer",background:"#1C1C1C",color:"#555",fontSize:10,fontWeight:700}}>Klaar</button>}
                              </div>);
                            })}
                            <div style={{display:"flex",flexDirection:"column",justifyContent:"center",gap:4,paddingBottom:4}}>
                              <button onClick={()=>setSession(p=>p.map((e,i)=>i!==ei?e:{...e,weights:[...e.weights,e.weights[e.weights.length-1]||0]}))} style={{width:40,height:40,borderRadius:10,border:"1px dashed #333",background:"none",color:"#555",fontSize:20,cursor:"pointer",fontWeight:300,lineHeight:1}}>+</button>
                              {ex.weights.length>1&&<button onClick={()=>setSession(p=>p.map((e,i)=>i!==ei?e:{...e,weights:e.weights.slice(0,-1)}))} style={{width:40,height:24,borderRadius:8,border:"1px solid #1C1C1C",background:"none",color:"#333",fontSize:10,cursor:"pointer",fontWeight:700,letterSpacing:0.5}}>–set</button>}
                            </div>
                          </div>

                          {/* Rust timer verschijnt tussen sets */}
                          {ex.activeRest!=null&&(
                            <RestTimer key={`${ei}-${ex.activeRest}`} seconds={restSecs} onDone={()=>setSession(p=>p.map((e,i)=>i!==ei?e:{...e,activeRest:null}))}/>
                          )}

                          {/* Rust instelling */}
                          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:12,marginTop:8}}>
                            <span style={{fontSize:10,color:"#444",fontWeight:700,flexShrink:0}}>⏱ Rust:</span>
                            <div style={{display:"flex",gap:4}}>
                              {REST_OPTS.map(s=><button key={s} onClick={()=>setSession(p=>p.map((e,i)=>i!==ei?e:{...e,restSecs:s}))} style={{padding:"3px 7px",borderRadius:6,border:"none",cursor:"pointer",background:restSecs===s?LIME:"#1C1C1C",color:restSecs===s?"#000":"#555",fontSize:10,fontWeight:700}}>{s}s</button>)}
                            </div>
                          </div>

                          {/* Opslaan hele oefening */}
                          <button onClick={()=>markSave(ei)} style={{width:"100%",padding:"10px",borderRadius:12,border:"none",cursor:"pointer",background:ex.saved?LIME:"#1C1C1C",color:ex.saved?"#000":"#666",fontSize:13,fontWeight:800,marginBottom:10}}>{ex.saved?"✓ Opgeslagen":"Oefening opslaan"}</button>

                          <div style={{display:"flex",gap:8}}>
                            <input value={ex.note} onChange={e=>setN(ei,e.target.value)} placeholder="Notitie..." style={{flex:1,padding:"10px 12px",borderRadius:12,border:"1px solid #1C1C1C",background:"#111",color:"#fff",fontSize:12,outline:"none",minWidth:0}}/>
                            <button onClick={()=>submitNote(ei)} disabled={!ex.note.trim()||noteLoading[ei]} style={{padding:"10px 14px",borderRadius:12,border:"none",fontWeight:700,fontSize:11,cursor:ex.note.trim()?"pointer":"default",background:ex.note.trim()?ORANGE:"#1C1C1C",color:ex.note.trim()?"#fff":"#444",opacity:noteLoading[ei]?0.5:1,flexShrink:0}}>{noteLoading[ei]?"...":"Finn"}</button>
                          </div>
                          {noteAdvice[ei]&&<div style={{background:"rgba(255,107,43,0.06)",border:"1px solid rgba(255,107,43,0.15)",borderRadius:12,padding:12,marginTop:8,fontSize:12,lineHeight:1.7,color:"#bbb"}}>{noteAdvice[ei].text}</div>}
                          {wisselIndex===ei&&alts.length>0&&(
                            <div style={{marginTop:12,background:"#1C1C1C",borderRadius:14,padding:14}}>
                              <div style={{...S.lbl,marginBottom:10}}>Wissel oefening</div>
                              {swapMemory[ex.name]&&<div style={{background:"rgba(200,241,56,0.06)",borderRadius:10,padding:"8px 12px",marginBottom:10,fontSize:12,color:LIME}}>Eerder gewisseld naar: <strong>{swapMemory[ex.name]}</strong></div>}
                              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                                {[...new Set([swapMemory[ex.name],...alts].filter(Boolean))].slice(0,6).map(name=><button key={name} onClick={()=>wisselOefening(ei,name)} style={{padding:"10px 14px",borderRadius:10,border:`1px solid ${name===swapMemory[ex.name]?"rgba(200,241,56,0.2)":"#333"}`,background:name===swapMemory[ex.name]?"rgba(200,241,56,0.04)":"#141414",color:"#fff",fontSize:13,cursor:"pointer",textAlign:"left",fontWeight:600,display:"flex",justifyContent:"space-between",alignItems:"center"}}><span>{name}</span><span style={{fontSize:11,color:"#555"}}>{EX_DB[name]?.muscle}</span></button>)}
                              </div>
                              <button onClick={()=>setWisselIndex(null)} style={{width:"100%",marginTop:10,padding:"9px",borderRadius:10,border:"1px solid #333",background:"none",color:"#555",fontSize:12,cursor:"pointer"}}>Annuleren</button>
                            </div>
                          )}
                        </div>
                      </div>
                    );
                  })}
                  <button onClick={saveWorkout} style={{width:"100%",padding:18,borderRadius:16,border:"none",cursor:"pointer",background:LIME,color:"#000",fontSize:16,fontWeight:800}}>Training opslaan</button>
                </div>
              )}
            </div>
          )}
        </div>
      )}
      {tab==="Voortgang"&&(
        <div style={{padding:"24px 16px"}}>
          <div style={{...S.lbl,color:LIME,marginBottom:4}}>Statistieken</div>
          <div style={{fontSize:32,fontWeight:900,letterSpacing:-1,marginBottom:4}}>Voortgang</div>
          <div style={{fontSize:14,color:"#555",marginBottom:20}}>{profile.name} · {startW}→{goalW}kg</div>
          <div style={{...S.card,padding:24,marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
              <div><div style={{...S.lbl,marginBottom:8}}>Huidig gewicht</div><div style={{fontSize:52,fontWeight:900,letterSpacing:-2,color:LIME,lineHeight:1}}>{curW}</div><div style={{fontSize:14,color:"#555",marginTop:4}}>kilogram</div></div>
              <div style={{textAlign:"right"}}>{curW>goalW&&<div style={{fontSize:11,color:"#ef4444",fontWeight:700,marginBottom:4}}>Nog {(curW-goalW).toFixed(1)}kg</div>}<div style={{fontSize:24,fontWeight:900,marginTop:8}}>{pct}%</div><div style={{fontSize:10,color:"#444"}}>behaald</div></div>
            </div>
            <div style={{background:"#1C1C1C",borderRadius:99,height:8,overflow:"hidden",marginBottom:6}}><div style={{width:`${pct}%`,height:8,background:`linear-gradient(90deg,${LIME},#A8D020)`,borderRadius:99,transition:"width .8s ease"}}/></div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#444"}}><span>Start: {startW}kg</span><span>Doel: {goalW}kg</span></div>
          </div>
          <div style={{...S.card,padding:20,marginBottom:14}}><div style={{...S.lbl,marginBottom:16}}>Gewichtsverloop</div><LineChart data={wLog.slice(-14)} height={130}/></div>
          <div style={{...S.card,padding:16,marginBottom:14}}>
            <div style={{...S.lbl,marginBottom:12}}>Gewicht invoeren</div>
            <div style={{display:"flex",gap:8}}>
              <input type="number" value={newW} onChange={e=>setNewW(e.target.value)} placeholder="kg" step="0.1" style={{flex:1,padding:"12px 14px",borderRadius:12,border:"1px solid #222",background:"#111",color:"#fff",fontSize:15,fontWeight:700,outline:"none"}}/>
              <button onClick={addWeight} style={{padding:"12px 20px",borderRadius:12,border:"none",cursor:"pointer",background:LIME,color:"#000",fontWeight:800,fontSize:14}}>Opslaan</button>
            </div>
          </div>
          {wLog.length>0&&<><div style={{...S.lbl,marginBottom:10}}>Metingen</div>
            {wLog.slice().reverse().slice(0,10).map((e,i,arr)=>{const prev=arr[i+1];const diff=prev?(e.w-prev.w).toFixed(1):null;return(<div key={e.id||i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",...S.card,padding:"12px 16px",marginBottom:6}}><div style={{fontSize:13,color:"#666"}}>{e.date}</div><div style={{display:"flex",gap:12,alignItems:"center"}}>{diff!==null&&<div style={{fontSize:12,fontWeight:700,color:parseFloat(diff)<0?LIME:parseFloat(diff)>0?"#ef4444":"#555"}}>{parseFloat(diff)>0?`+${diff}`:diff}kg</div>}<div style={{fontWeight:800,fontSize:16,color:LIME}}>{e.w}kg</div><button onClick={()=>deleteWeight(e.id)} style={{background:"none",border:"none",color:"#444",fontSize:16,cursor:"pointer",padding:"0 4px"}}>×</button></div></div>);})}</>}
          {log.length>0&&<><div style={{...S.lbl,marginBottom:12,marginTop:20}}>Trainingslog</div>
            {log.slice(0,8).map((e,i)=><div key={e.id||i} style={{...S.card,padding:16,marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:10,alignItems:"flex-start"}}><div><div style={{fontSize:14,fontWeight:800}}>{e.workout}</div><div style={{fontSize:11,color:"#444",marginTop:2}}>{e.day} · {e.date}</div></div><button onClick={()=>deleteWorkout(e.id)} style={{background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:8,color:"#ef4444",fontSize:11,cursor:"pointer",padding:"4px 10px",fontWeight:600,flexShrink:0}}>Verwijder</button></div>
              {(e.exercises||[]).slice(0,4).map((ex,j)=><div key={j} style={{display:"flex",justifyContent:"space-between",paddingBottom:6,marginBottom:6,borderBottom:j<Math.min(3,(e.exercises||[]).length-1)?"1px solid #1C1C1C":"none"}}><div style={{fontSize:11,color:"#666"}}>{ex.name}</div><div style={{fontSize:11,fontWeight:700,color:LIME}}>{(ex.weights||[]).filter(w=>w>0).map(w=>fmtVal(w,ex.unit||"kg")).join("·")||"–"}</div></div>)}
            </div>)}</>}
        </div>
      )}

      {tab==="Voeding"&&(
        <div style={{padding:"24px 16px"}}>
          <div style={{...S.lbl,color:LIME,marginBottom:4}}>Voeding</div>
          <div style={{fontSize:32,fontWeight:900,letterSpacing:-1,marginBottom:16}}>Voeding</div>

          {/* Subtabs */}
          <div style={{display:"flex",gap:4,background:"#111",borderRadius:12,padding:4,marginBottom:20}}>
            {[{k:"dagelijks",l:"Dagelijks"},{k:"weekmenu",l:"Weekmenu"},{k:"boodschappen",l:"Boodschappen"},{k:"recepten",l:"Recepten"}].map(t=>(
              <button key={t.k} onClick={()=>setFoodSubTab(t.k)} style={{flex:1,padding:"9px 4px",borderRadius:10,border:"none",cursor:"pointer",background:foodSubTab===t.k?"#1C1C1C":"none",color:foodSubTab===t.k?"#fff":"#555",fontSize:10,fontWeight:foodSubTab===t.k?700:400,transition:"all .15s"}}>
                {t.l}
              </button>
            ))}
          </div>

          {foodSubTab==="dagelijks"&&<>
          <div style={{display:"flex",gap:8,marginBottom:16,alignItems:"center"}}>
            <button onClick={()=>setFoodDate(d=>fmtDate(new Date(parseDate(d).getTime()-86400000)))} style={{width:36,height:36,borderRadius:10,border:"1px solid #222",background:"#141414",color:"#fff",fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
            <div style={{flex:1,textAlign:"center"}}>
              <div style={{fontSize:13,fontWeight:700,color:foodDate===TODAY_KEY?LIME:"#888"}}>{foodDate===TODAY_KEY?"Vandaag":foodDate}</div>
              <div style={{fontSize:10,color:"#555"}}>{DAYS[parseDate(foodDate).getDay()]}</div>
            </div>
            <button onClick={()=>{if(foodDate!==TODAY_KEY)setFoodDate(d=>fmtDate(new Date(parseDate(d).getTime()+86400000)));}} disabled={foodDate===TODAY_KEY} style={{width:36,height:36,borderRadius:10,border:"1px solid #222",background:foodDate===TODAY_KEY?"#111":"#141414",color:foodDate===TODAY_KEY?"#333":"#fff",fontSize:18,cursor:foodDate===TODAY_KEY?"default":"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
          </div>

          <div style={{...S.card,padding:"12px 16px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><div style={{...S.lbl,marginBottom:2}}>Fase</div><div style={{fontSize:15,fontWeight:800,color:faseObj.c}}>{fase}</div></div>
            <div style={{textAlign:"right"}}><div style={{fontSize:11,color:"#555",marginBottom:2}}>Dagdoel</div><div style={{fontSize:18,fontWeight:900,color:LIME}}>{kcalT} kcal</div><div style={{fontSize:11,color:"#555"}}>{protT}g eiwit</div></div>

          </div>
          <div style={{...S.card,padding:24,marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-around",alignItems:"center",marginBottom:16}}>
              <Ring pct={Math.min(100,selTotals.kcal/kcalT*100)} size={92} stroke={8} color={LIME} value={selTotals.kcal} label="Calorieën"/>
              <div style={{display:"flex",flexDirection:"column",gap:14}}>
                <Ring pct={Math.min(100,selTotals.prot/protT*100)} size={66} stroke={6} color="#60a5fa" value={`${selTotals.prot}g`} label="Eiwit"/>
                <Ring pct={Math.min(100,selTotals.carbs/Math.max(1,carbsT)*100)} size={66} stroke={6} color="#f59e0b" value={`${selTotals.carbs}g`} label="Koolh."/>
              </div>

                <div style={{...S.card,padding:14}}>
                  {shoppingList.map((item,i)=>(
                    <div key={i} onClick={()=>{const u=[...shoppingList];u[i]={...u[i],checked:!u[i].checked};setShoppingList(u);LS.set("fitcoach_shopping",u);}} style={{display:"flex",alignItems:"center",gap:12,paddingBottom:11,marginBottom:11,borderBottom:i<shoppingList.length-1?"1px solid #111":"none",cursor:"pointer"}}>
                      <div style={{width:20,height:20,borderRadius:5,border:`1.5px solid ${item.checked?LIME:"#333"}`,background:item.checked?"rgba(200,241,56,0.15)":"none",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:LIME,flexShrink:0}}>{item.checked?"✓":""}</div>
                      <div style={{fontSize:13,color:item.checked?"#444":"#ccc",textDecoration:item.checked?"line-through":"none",flex:1}}>{item.name}</div>
                    </div>
                  ))}
                </div>
              ):(
                <div style={{...S.card,padding:24,textAlign:"center"}}>
                  <div style={{fontSize:13,color:"#444",marginBottom:8}}>Nog geen boodschappenlijst</div>
                  <div style={{fontSize:11,color:"#333"}}>Genereer er een op basis van je weekmenu</div>
                </div>
              )}
            </div>
          )}

          {foodSubTab==="recepten"&&(
            <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <div style={{fontSize:13,fontWeight:800}}>Opgeslagen recepten</div>
                <button onClick={async()=>{
                  const txt=await ai(`Één gezond recept voor ${profile.name}, fase: ${fase}, doel: ${profile.goal}. NL, max 150 woorden.`);
                  const newR={id:Date.now(),text:txt,date:TODAY_KEY};
                  const updated=[newR,...savedRecipes].slice(0,20);
                  setSavedRecipes(updated);LS.set("fitcoach_recipes",updated);
                }} style={{padding:"7px 14px",borderRadius:10,border:`1px solid ${ORANGE}`,background:"rgba(255,107,43,0.06)",color:ORANGE,fontSize:11,fontWeight:700,cursor:"pointer"}}>
                  + Finn recept
                </button>
              </div>
              {/* Snel suggesties */}
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>
                {["Hoog eiwit ontbijt","Snelle lunch","Post-workout maaltijd","Laag carb diner"].map(s=>(
                  <button key={s} onClick={async()=>{
                    const txt=await ai(`Recept: ${s}. Voor ${profile.name}, fase: ${fase}. NL, max 120 woorden.`);
                    const newR={id:Date.now(),text:txt,date:TODAY_KEY,tag:s};
                    const updated=[newR,...savedRecipes].slice(0,20);
                    setSavedRecipes(updated);LS.set("fitcoach_recipes",updated);
                  }} style={{padding:"6px 12px",borderRadius:20,border:"1px solid #222",background:"#111",color:"#666",fontSize:11,cursor:"pointer",fontWeight:600}}>{s}</button>
                ))}
              </div>
              {/* Weekmenu link */}
              {weekMenu&&<div style={{...S.card,padding:"10px 14px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{fontSize:12,color:"#555"}}>Weekmenu is actief</div>
                <button onClick={()=>setFoodSubTab("weekmenu")} style={{padding:"5px 12px",borderRadius:8,border:`1px solid ${LIME}`,background:"none",color:LIME,fontSize:11,fontWeight:700,cursor:"pointer"}}>Bekijk →</button>
              </div>}
              {savedRecipes.length===0?(
                <div style={{...S.card,padding:20,textAlign:"center"}}>
                  <div style={{fontSize:12,color:"#444",marginBottom:4}}>Geen recepten opgeslagen</div>
                  <div style={{fontSize:11,color:"#333"}}>Klik op een suggestie of vraag Finn een recept</div>
                </div>
              ):(
                savedRecipes.map((r)=>(
                  <div key={r.id} style={{...S.card,padding:16,marginBottom:8}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                      <div style={{display:"flex",gap:8,alignItems:"center"}}>
                        <div style={{fontSize:10,color:"#444"}}>{r.date}</div>
                        {r.tag&&<div style={{fontSize:9,color:ORANGE,fontWeight:700,letterSpacing:1,textTransform:"uppercase"}}>{r.tag}</div>}
                      </div>
                      <button onClick={()=>{const u=savedRecipes.filter(x=>x.id!==r.id);setSavedRecipes(u);LS.set("fitcoach_recipes",u);}} style={{background:"none",border:"none",color:"#333",fontSize:14,cursor:"pointer"}}>×</button>
                    </div>
                    <div style={{fontSize:12,lineHeight:1.7,color:"#bbb",whiteSpace:"pre-wrap"}}>{r.text}</div>
                  </div>
                ))
              )}
            </div>
          )}
        </div>
      )}

      {tab==="Recepten"&&(
        <div style={{padding:"24px 16px"}}>
          <div style={{fontSize:14,color:"#555",textAlign:"center",marginTop:40}}>Recepten zijn verplaatst naar Voeding → Recepten tab</div>
        </div>
      )}

      {tab==="Coach"&&(
        <div style={{padding:"24px 16px",display:"flex",flexDirection:"column",alignItems:"center"}}>
          <div style={{...S.lbl,color:LIME,marginBottom:4,alignSelf:"flex-start"}}>Jouw coach</div>
          <div style={{fontSize:32,fontWeight:900,letterSpacing:-1,marginBottom:24,alignSelf:"flex-start"}}>Meet Finn</div>
          <div style={{marginBottom:24,position:"relative",display:"flex",justifyContent:"center"}}>
            <div style={{width:220,height:280,animation:"finnFloat 3s ease-in-out infinite"}}>
              <img src={FINN_IMG} alt="Finn" style={{width:"100%",height:"100%",objectFit:"contain",objectPosition:"top center",filter:"drop-shadow(0 12px 32px rgba(255,107,43,0.4))"}}/>
            </div>
            <div style={{position:"absolute",top:8,right:40,background:LIME,borderRadius:99,padding:"4px 12px",fontSize:10,fontWeight:800,color:"#000"}}>● Online</div>
          </div>
          <div style={{...S.card,padding:20,marginBottom:16,width:"100%",textAlign:"center"}}>
            <div style={{fontSize:16,fontWeight:800,marginBottom:8}}>Finn, jouw persoonlijke AI coach</div>
            <div style={{fontSize:13,color:"#666",lineHeight:1.8}}>Ik ken jouw trainingen, voeding en doelen. Ik geef je altijd persoonlijk advies.</div>
          </div>
          <div style={{width:"100%",marginBottom:16}}>
            <div style={{...S.lbl,marginBottom:12}}>Vraag Finn iets</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {["Motiveer me!","Wat eten vandaag?","Analyseer mijn week","Maak een schema","Ik ben moe","Hoe val ik af?"].map(q=>(
                <button key={q} onClick={()=>openFinnWith(q)} style={{padding:"12px 14px",borderRadius:14,border:"1px solid #1C1C1C",background:"#141414",color:"#888",fontSize:12,cursor:"pointer",fontWeight:600,textAlign:"left"}}>{q}</button>
              ))}
            </div>
          </div>
          <button onClick={()=>openFinnWith(null)} style={{width:"100%",padding:16,borderRadius:16,border:"none",cursor:"pointer",background:ORANGE,color:"#fff",fontSize:15,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",gap:12}}>
            <FinnImg size={32}/>Chat met Finn
          </button>
        </div>
      )}

      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"rgba(13,13,13,0.97)",borderTop:"1px solid #1C1C1C",display:"flex",zIndex:20,backdropFilter:"blur(24px)"}}>
        {[
          {id:"Home",svg:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>},
          {id:"Training",svg:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M6 4v16M18 4v16M2 8h4M18 8h4M2 16h4M18 16h4"/></svg>},
          {id:"Voortgang",svg:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>},
          {id:"Voeding",svg:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 2C8 2 4 6 4 10c0 5.25 8 12 8 12s8-6.75 8-12c0-4-4-8-8-8z"/></svg>},
          {id:"Coach",svg:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>},
        ].map(t=>(
          <button key={t.id} onClick={()=>{
            if(t.id==="Training"&&tab==="Training"&&!selectingMuscles){
              setSelectingMuscles(true);setSession(null);setTargetMuscles([]);
            } else {
              setTab(t.id);
            }
          }} style={{flex:1,padding:"12px 4px 10px",border:"none",background:"none",cursor:"pointer",color:tab===t.id?(t.id==="Coach"?ORANGE:LIME):"#333",display:"flex",flexDirection:"column",alignItems:"center",gap:4,transition:"color .15s"}}>
            {t.svg}
            <div style={{fontSize:9,fontWeight:700,letterSpacing:0.5}}>{t.id.toUpperCase()}</div>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
