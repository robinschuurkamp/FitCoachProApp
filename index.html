async function ai(prompt){
  try{
    const r=await fetch(WORKER,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,messages:[{role:"user",content:prompt}]})});
    const d=await r.json();
    return d.content?.[0]?.text||"";
  }catch(e){return "Verbindingsfout.";}
}

function buildSession(muscles,log){
  const exercises=[];
  muscles.forEach(muscle=>{
    const variants=WV[muscle];
    if(!variants)return;
    const prevCount=log.filter(e=>(e.targetMuscles||[]).includes(muscle)).length;
    const variant=variants[prevCount%2]||variants[0];
    const last=log.find(e=>(e.targetMuscles||[]).includes(muscle));
    const lastMap={};
    if(last)last.exercises.forEach(e=>{lastMap[e.name]=e;});
    variant.forEach(ex=>{
      if(!exercises.find(e=>e.name===ex.name)){
        const db=EXERCISE_DB[ex.name]||{};
        exercises.push({...ex,weights:lastMap[ex.name]?[...lastMap[ex.name].weights]:[...ex.weights],note:"",saved:false,info:db.info||"",youtube:db.youtube||"",prevWeights:lastMap[ex.name]?.weights||null,prevNote:lastMap[ex.name]?.note||""});
      }
    });
  });
  return exercises;
}

function Ring({pct,size=80,stroke=7,color=LIME,value,label}){
  const r=(size-stroke*2)/2,circ=2*Math.PI*r,offset=circ*(1-Math.min(1,(pct||0)/100));
  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
      <div style={{position:"relative",width:size,height:size}}>
        <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#1C1C1C" strokeWidth={stroke}/>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round" style={{transition:"stroke-dashoffset .8s ease"}}/>
        </svg>
        <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{fontSize:size>70?15:12,fontWeight:800,color,lineHeight:1}}>{value}</div>
        </div>
      </div>
      <div style={{fontSize:10,color:"#666",fontWeight:600,letterSpacing:0.5,textTransform:"uppercase",textAlign:"center"}}>{label}</div>
    </div>
  );
}

function LineChart({data,height=120}){
  if(!data||data.length<2)return<div style={{height,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"#444"}}>Meer metingen nodig</div>;
  const vals=data.map(d=>d.w);
  const mn=Math.min(...vals)-0.5,mx=Math.max(...vals)+0.5,rng=mx-mn;
  const W=320,H=height-24;
  const pts=data.map((d,i)=>({x:20+(i/(data.length-1))*(W-40),y:H-((d.w-mn)/rng*H)+4,w:d.w,date:d.date}));
  const pd="M"+pts.map((p,i)=>{if(i===0)return`${p.x},${p.y}`;const pv=pts[i-1],cx=(pv.x+p.x)/2;return`C${cx},${pv.y} ${cx},${p.y} ${p.x},${p.y}`;}).join(" ");
  return(
    <svg viewBox={`0 0 ${W} ${height}`} style={{width:"100%",height}}>
      <defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={LIME} stopOpacity="0.25"/><stop offset="100%" stopColor={LIME} stopOpacity="0"/></linearGradient></defs>
      <path d={pd+` L${pts[pts.length-1].x},${H+4} L${pts[0].x},${H+4} Z`} fill="url(#lg)"/>
      <path d={pd} fill="none" stroke={LIME} strokeWidth="2.5" strokeLinecap="round"/>
      {pts.map((p,i)=>(
        <g key={i}>
          <circle cx={p.x} cy={p.y} r={i===pts.length-1?5:2.5} fill={i===pts.length-1?LIME:"#333"} stroke={i===pts.length-1?"#0D0D0D":"none"} strokeWidth={2}/>
          {(i===0||i===pts.length-1||data.length<=6)&&<text x={p.x} y={height-2} textAnchor="middle" fontSize="8" fill="#555">{p.date.slice(0,5)}</text>}
          {i===pts.length-1&&<text x={p.x} y={p.y-10} textAnchor="middle" fontSize="9" fill={LIME} fontWeight="700">{p.w}kg</text>}
        </g>
      ))}
    </svg>
  );
}

function FinnPopup({onClose,pendingMsg}){
  const [input,setInput]=useState("");
  const [msgs,setMsgs]=useState([{r:"a",t:"Hey! Finn hier. Wat kan ik voor je doen?"}]);
  const [loading,setLoading]=useState(false);
  const endRef=useRef(null);
  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"});},[msgs,loading]);
  useEffect(()=>{if(pendingMsg)doSend(pendingMsg);},[]);
  async function doSend(txt){
    if(!txt?.trim()||loading)return;
    const nc=[...msgs,{r:"u",t:txt}];
    setMsgs(nc);setLoading(true);
    const reply=await ai("Jij bent Finn, energieke AI fitnesscoach. Reageer motiverend en kort. Max 2 zinnen. NL.\n\nGebruiker: "+txt+"\nFinn:");
    setMsgs(p=>[...p,{r:"a",t:reply}]);

    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:200,display:"flex",alignItems:"flex-end"}} onClick={onClose}>

          <div ref={endRef}/>

        <div style={{display:"flex",gap:8,marginTop:12}}>

    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",zIndex:99,display:"flex",alignItems:"flex-end"}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#141414",borderRadius:"24px 24px 0 0",width:"100%",maxWidth:480,margin:"0 auto",maxHeight:"90vh",overflowY:"auto",padding:24,animation:"slideUp .35s cubic-bezier(.16,1,.3,1)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
          <div style={{fontSize:22,fontWeight:900}}>Instellingen</div>
          <button onClick={onClose} style={{width:36,height:36,borderRadius:"50%",background:"#1C1C1C",border:"none",color:"#fff",fontSize:18,cursor:"pointer"}}>×</button>
        </div>
        <div style={{...S.card,padding:16,marginBottom:16}}>
          <div style={{...S.lbl,marginBottom:12}}>Profielfoto URL</div>
          <input style={inp} placeholder="https://..." value={p.fotoUrl||""} onChange={e=>u("fotoUrl",e.target.value)}/>
        </div>
        <div style={{...S.card,padding:16,marginBottom:16}}>
          <div style={{...S.lbl,marginBottom:12}}>Gegevens</div>
          <input style={inp} placeholder="Naam" value={p.name||""} onChange={e=>u("name",e.target.value)}/>
          <input style={inp} type="number" placeholder="Huidig gewicht (kg)" value={p.weight||""} onChange={e=>u("weight",e.target.value)}/>
          <input style={inp} type="number" placeholder="Doelgewicht (kg)" value={p.goalWeight||""} onChange={e=>u("goalWeight",e.target.value)}/>
        </div>
        <div style={{...S.card,padding:16,marginBottom:16}}>
          <div style={{...S.lbl,marginBottom:12}}>Huidige fase</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {FASE_OPTIES.map(f=>(
              <button key={f.v} onClick={()=>u("fase",f.v)} style={{padding:"12px 14px",borderRadius:12,border:`1.5px solid ${p.fase===f.v?f.c:"#222"}`,background:p.fase===f.v?f.c+"18":"#111",cursor:"pointer",textAlign:"left",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div><div style={{fontSize:13,fontWeight:700,color:p.fase===f.v?f.c:"#fff",marginBottom:2}}>{f.l}</div><div style={{fontSize:11,color:"#555"}}>{f.d}</div></div>
                {p.fase===f.v&&<div style={{width:20,height:20,borderRadius:"50%",background:f.c,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#000",fontWeight:900}}>✓</div>}
              </button>
            ))}
          </div>
        </div>
        <button onClick={()=>onSave(p)} style={{width:"100%",padding:16,borderRadius:14,border:"none",background:LIME,color:"#000",fontSize:15,fontWeight:800,cursor:"pointer",marginBottom:12}}>Opslaan</button>
        <button onClick={onClose} style={{width:"100%",padding:14,borderRadius:14,border:"1px solid #222",background:"none",color:"#555",fontSize:14,cursor:"pointer"}}>Annuleren</button>
      </div>
    </div>
  );
}

function ExInfo({ex,onClose}){
  if(!ex)return null;
  const db=EXERCISE_DB[ex.name]||{};
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",zIndex:99,display:"flex",alignItems:"flex-end"}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#141414",borderRadius:"24px 24px 0 0",width:"100%",maxWidth:480,margin:"0 auto",maxHeight:"82vh",overflowY:"auto",animation:"slideUp .35s cubic-bezier(.16,1,.3,1)"}}>
        <div style={{height:200,position:"relative",overflow:"hidden",borderRadius:"24px 24px 0 0",background:"#1C1C1C"}}>
          {EX_PHOTOS[ex.name]&&<img src={EX_PHOTOS[ex.name]} alt={ex.name} style={{width:"100%",height:"100%",objectFit:"cover"}} onError={e=>e.target.style.display="none"}/>}
          <div style={{position:"absolute",inset:0,background:"linear-gradient(to bottom,transparent 30%,#141414)"}}/>
        </div>
        <div style={{padding:24}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <div style={{fontSize:22,fontWeight:900}}>{ex.name}</div>
            <button onClick={onClose} style={{width:36,height:36,borderRadius:"50%",background:"#1C1C1C",border:"none",color:"#fff",fontSize:18,cursor:"pointer"}}>×</button>
          </div>
          <div style={{background:"#1C1C1C",borderRadius:14,padding:16,marginBottom:16}}>
            <div style={{fontSize:14,color:"#bbb",lineHeight:1.8}}>{db.info||"Voer de oefening gecontroleerd uit."}</div>
          </div>
          {db.youtube&&<a href={db.youtube} target="_blank" rel="noopener noreferrer" style={{display:"flex",alignItems:"center",justifyContent:"center",background:"#FF0000",borderRadius:14,padding:14,color:"#fff",fontWeight:700,fontSize:14,textDecoration:"none"}}>Bekijk op YouTube</a>}
        </div>
      </div>
    </div>
  );
}

function App(){
  const [profile,setProfile]=useState(()=>LS.get("fitcoach_profile"));
  const [tab,setTab]=useState("Home");
  const [session,setSession]=useState(null);
  const [targetMuscles,setTargetMuscles]=useState([]);
  const [selectingMuscles,setSelectingMuscles]=useState(true);
  const [log,setLog]=useState(()=>LS.get("fitcoach_log")||[]);
  const [wLog,setWLog]=useState(()=>LS.get("fitcoach_wlog")||[]);
  const [newW,setNewW]=useState("");
  const [food,setFood]=useState(()=>LS.get("fitcoach_food")||{});
  const [foodInput,setFoodInput]=useState({Ochtend:"",Middag:"",Avond:"",Snack:""});
  const [foodLoading,setFoodLoading]=useState({Ochtend:false,Middag:false,Avond:false,Snack:false});
  const [foodAdvice,setFoodAdvice]=useState("");
  const [loadingFA,setLoadingFA]=useState(false);
  const [noteAdvice,setNoteAdvice]=useState({});
  const [noteLoading,setNoteLoading]=useState({});
  const [savedFlash,setSavedFlash]=useState(null);
  const [savedBanner,setSavedBanner]=useState(false);
  const [infoEx,setInfoEx]=useState(null);
  const [showSettings,setShowSettings]=useState(false);
  const [showFinn,setShowFinn]=useState(false);
  const [pendingMsg,setPendingMsg]=useState(null);
  const [recipe,setRecipe]=useState("");
  const [loadingRecipe,setLoadingRecipe]=useState(false);
  const [recipeTab,setRecipeTab]=useState(false);
  const [showCustom,setShowCustom]=useState(false);
  const [customName,setCustomName]=useState("");
  const [customExercises,setCustomExercises]=useState([{name:"",sets:"3",reps:"10",weights:""}]);
  const [wisselIndex,setWisselIndex]=useState(null);

  useEffect(()=>{if(profile)LS.set("fitcoach_profile",profile);},[profile]);
  useEffect(()=>{LS.set("fitcoach_log",log);},[log]);
  useEffect(()=>{LS.set("fitcoach_wlog",wLog);},[wLog]);
  useEffect(()=>{LS.set("fitcoach_food",food);},[food]);

  useEffect(()=>{
    if(!localStorage.getItem('fcp_installed')){
      localStorage.setItem('fcp_installed','true');
      setTimeout(()=>{
        const m=document.getElementById('installModal');
        if(m)m.classList.add('show');
      },1500);
    }
  },[]);

  const todayFood=food[TODAY_KEY]||{Ochtend:[],Middag:[],Avond:[],Snack:[]};
  const totals=MEALS.reduce((a,m)=>{(todayFood[m]||[]).forEach(i=>{a.kcal+=(i.kcal||0);a.prot+=(i.prot||0);a.carbs+=(i.carbs||0);a.fat+=(i.fat||0);});return a;},{kcal:0,prot:0,carbs:0,fat:0});
  const curW=wLog.length>0?wLog[wLog.length-1].w:parseFloat(profile?.weight)||80;
  const goalW=parseFloat(profile?.goalWeight)||75;
  const startW=parseFloat(profile?.weight)||80;
  const pct=Math.max(0,Math.min(100,Math.round((1-(curW-goalW)/(startW-goalW))*100)));
  const fase=profile?.fase||"onderhoud";
  const faseObj=FASE_OPTIES.find(f=>f.v===fase)||FASE_OPTIES[2];
  const kcalT=Math.round(curW*faseObj.mul);
  const protT=fase.includes("bulken")?Math.round(curW*2.2):Math.round(curW*2);
  const fatT=Math.round(curW*0.9);
  const carbsT=Math.max(0,Math.round((kcalT-protT*4-totals.fat*9)/4));

  function openFinnWith(msg){setPendingMsg(msg||null);setShowFinn(true);}

  function startSess(muscles,custom){
    if(custom){
      setSession(custom.exercises.map(e=>({...e,weights:Array(parseInt(e.sets)||3).fill(parseFloat(e.weights)||0),note:"",saved:false,info:EXERCISE_DB[e.name]?.info||"",youtube:EXERCISE_DB[e.name]?.youtube||"",prevWeights:null,prevNote:""})));
      setTargetMuscles([custom.name]);
    }else{
      if(!muscles.length)return;
      setSession(buildSession(muscles,log));
      setTargetMuscles(muscles);
    }
    setSelectingMuscles(false);setNoteAdvice({});setSavedFlash(null);
  }

  function setW2(ei,si,v){setSession(p=>p.map((e,i)=>i!==ei?e:{...e,weights:e.weights.map((w,j)=>j===si?v:w)}));}
  function setN(ei,v){setSession(p=>p.map((e,i)=>i!==ei?e:{...e,note:v}));}
  function markSave(ei){setSession(p=>p.map((e,i)=>i!==ei?e:{...e,saved:true}));setSavedFlash(ei);setTimeout(()=>setSavedFlash(null),1500);}
  function removeExercise(ei){setSession(p=>p.filter((_,i)=>i!==ei));}

  async function submitNote(ei){
    const ex=session[ei];if(!ex.note.trim())return;
    setNoteLoading(p=>({...p,[ei]:true}));
    const txt=await ai(`Coach Finn voor ${profile?.name}. Oefening: ${ex.name}. Notitie: "${ex.note}". Motiveer kort. NL, 2 zinnen.`);
    setNoteAdvice(p=>({...p,[ei]:{text:txt}}));
    setNoteLoading(p=>({...p,[ei]:false}));
  }

  function wisselOefening(ei,newName){
    const db=EXERCISE_DB[newName]||{};
    setSession(p=>p.map((e,i)=>i!==ei?e:{...e,name:newName,info:db.info||"",youtube:db.youtube||"",note:"",saved:false}));
    setWisselIndex(null);
  }

  function saveWorkout(){
    if(!session?.length)return;
    const entry={date:TODAY_KEY,day:DAY_NL,workout:targetMuscles.map(m=>MUSCLE_META[m]?.label||m).join(" + "),exercises:session.map(e=>({name:e.name,weights:[...e.weights],reps:e.reps,note:e.note})),targetMuscles,id:Date.now()};
    const updated=[entry,...log].slice(0,100);
    setLog(updated);LS.set("fitcoach_log",updated);
    setSavedBanner(true);setTimeout(()=>setSavedBanner(false),3000);
    setSelectingMuscles(true);setSession(null);setTargetMuscles([]);setTab("Home");
  }

  function deleteWorkout(id){const u=log.filter(e=>e.id!==id);setLog(u);LS.set("fitcoach_log",u);}
  function deleteWeight(id){const u=wLog.filter(e=>e.id!==id);setWLog(u);LS.set("fitcoach_wlog",u);}

  async function addFood(meal,quickItem){
    const txt=quickItem||foodInput[meal].trim();if(!txt)return;
    if(!quickItem)setFoodLoading(p=>({...p,[meal]:true}));
    const raw=await ai(`Voedingswaarden voor: "${txt}". ALLEEN JSON: {"desc":"${txt}","kcal":0,"prot":0,"carbs":0,"fat":0}.`);
    try{
      const pp=JSON.parse(raw.replace(/```json|```/g,"").trim());
      const item={desc:pp.desc||txt,kcal:pp.kcal||0,prot:pp.prot||0,carbs:pp.carbs||0,fat:pp.fat||0};
      const day=food[TODAY_KEY]||{Ochtend:[],Middag:[],Avond:[],Snack:[]};
      const updated={...food,[TODAY_KEY]:{...day,[meal]:[...(day[meal]||[]),item]}};
      setFood(updated);LS.set("fitcoach_food",updated);
      const ck="fitcoach_custom_foods";
      const custom=LS.get(ck)||{Ochtend:[],Middag:[],Avond:[],Snack:[]};
      if(custom[meal]&&!custom[meal].includes(txt)){custom[meal]=[txt,...custom[meal]].slice(0,6);LS.set(ck,custom);}
      if(!quickItem)setFoodInput(p=>({...p,[meal]:""}));
    }catch(e){}
    if(!quickItem)setFoodLoading(p=>({...p,[meal]:false}));
  }

  function remFood(meal,idx){
    const day=food[TODAY_KEY]||{Ochtend:[],Middag:[],Avond:[],Snack:[]};
    const updated={...food,[TODAY_KEY]:{...day,[meal]:(day[meal]||[]).filter((_,i)=>i!==idx)}};
    setFood(updated);LS.set("fitcoach_food",updated);
  }

  function addWeight(){
    const w=parseFloat(newW);if(!w||w<40||w>250)return;
    const updated=[...wLog,{date:TODAY_KEY,w,id:Date.now()}];
    setWLog(updated);LS.set("fitcoach_wlog",updated);setNewW("");
  }

  async function getRecipe(){
    setLoadingRecipe(true);setRecipe("");
    const txt=await ai(`Maak een gezond recept voor ${profile?.name} met fase: ${fase}. NL, max 250 woorden.`);
    setRecipe(txt);setLoadingRecipe(false);
  }

  if(!profile)return<Onboarding onComplete={p=>setProfile(p)}/>;

  return(
    <div style={{background:"#0D0D0D",minHeight:"100vh",maxWidth:480,margin:"0 auto",paddingBottom:80}}>
      {infoEx&&<ExInfo ex={infoEx} onClose={()=>setInfoEx(null)}/>}
      {showSettings&&<SettingsModal profile={profile} onSave={p=>{setProfile(p);setShowSettings(false);}} onClose={()=>setShowSettings(false)}/>}
      {showFinn&&<FinnPopup onClose={()=>{setShowFinn(false);setPendingMsg(null);}} pendingMsg={pendingMsg}/>}
      {savedBanner&&<div style={{position:"fixed",top:0,left:"50%",transform:"translateX(-50%)",zIndex:100,background:LIME,color:"#000",padding:"14px 28px",borderRadius:"0 0 20px 20px",fontWeight:800,fontSize:14,maxWidth:480,width:"100%",textAlign:"center"}}>Training opgeslagen!</div>}

      {tab==="Home"&&(
        <div>
          <div style={{position:"relative",height:300,overflow:"hidden"}}>
            <img src={P.hero} alt="" style={{width:"100%",height:"100%",objectFit:"cover",objectPosition:"center top"}}/>
            <div style={{position:"absolute",inset:0,background:"linear-gradient(160deg,rgba(0,0,0,0.2) 0%,rgba(13,13,13,0.98) 85%)"}}/>
            <button onClick={()=>setShowSettings(true)} style={{position:"absolute",top:16,right:16,width:42,height:42,borderRadius:"50%",background:"rgba(0,0,0,0.5)",border:"1px solid rgba(255,255,255,0.1)",backdropFilter:"blur(8px)",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",overflow:"hidden"}}>
              {profile.fotoUrl?<img src={profile.fotoUrl} alt="profiel" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<span style={{fontSize:16}}>⚙️</span>}
            </button>
            <div style={{position:"absolute",bottom:0,left:0,right:0,padding:"0 20px 24px"}}>
              <div style={{...S.lbl,color:"rgba(200,241,56,0.8)",marginBottom:6}}>{DAY_NL.toUpperCase()} · {IS_WEEKEND?"WEEKEND":"TRAININGSDAG"}</div>
              <div style={{fontSize:26,fontWeight:900,letterSpacing:-0.5,marginBottom:4}}>Goedendag, {profile.name}</div>
              <div style={{fontSize:13,color:"rgba(255,255,255,0.4)"}}>Doel: {startW}→{goalW}kg · {pct}% behaald</div>
            </div>
          </div>
          <div style={{padding:"0 16px"}}>
            <div style={{display:"flex",gap:12,alignItems:"flex-start",background:"rgba(255,107,43,0.07)",border:"1px solid rgba(255,107,43,0.15)",borderRadius:16,padding:14,margin:"16px 0",transform:"translateY(-8px)"}}>
              <FinnImg size={44}/>
              <div><div style={{fontSize:11,color:ORANGE,fontWeight:700,marginBottom:3}}>Finn zegt</div><div style={{fontSize:13,color:"rgba(255,255,255,0.7)",lineHeight:1.6}}>{IS_WEEKEND?"Weekend! Herstel is net zo belangrijk als trainen.":"Weeg jezelf 's ochtends nuchter voor de meest betrouwbare meting."}</div></div>
            </div>
            <div style={{...S.card,padding:18,marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <div style={{...S.lbl}}>Voortgang naar doel</div>
                <div style={{fontSize:15,fontWeight:800,color:LIME}}>{pct}%</div>
              </div>
              <div style={{background:"#1C1C1C",borderRadius:99,height:8,overflow:"hidden",marginBottom:10}}><div style={{width:`${pct}%`,height:8,background:`linear-gradient(90deg,${LIME},#A8D020)`,borderRadius:99,transition:"width .8s ease"}}/></div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#444"}}><span>Start: {startW}kg</span><span>Nu: {curW}kg</span><span>Doel: {goalW}kg</span></div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:16}}>
              {[{l:"Trainingen",v:log.length,c:"#fff"},{l:"Kcal vandaag",v:totals.kcal,c:totals.kcal>kcalT?"#ef4444":LIME},{l:"Eiwit",v:`${totals.prot}g`,c:totals.prot>=protT?LIME:"#f59e0b"}].map(s=>(
                <div key={s.l} style={{...S.card,padding:"14px 10px",textAlign:"center"}}><div style={{...S.lbl,marginBottom:6}}>{s.l}</div><div style={{fontSize:18,fontWeight:800,color:s.c}}>{s.v}</div></div>
              ))}
            </div>
            <button onClick={()=>setTab("Training")} style={{width:"100%",padding:17,borderRadius:16,border:"none",cursor:"pointer",background:LIME,color:"#000",fontSize:15,fontWeight:800,marginBottom:20}}>Start Training</button>
            <div style={{...S.lbl,marginBottom:14}}>Train vandaag</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:24}}>
              {MUSCLE_GROUPS.slice(0,6).map((m,i)=>(
                <button key={m} onClick={()=>{setTargetMuscles([m]);startSess([m]);setTab("Training");}} style={{height:i===0||i===3?140:110,borderRadius:18,border:"none",cursor:"pointer",overflow:"hidden",position:"relative",textAlign:"left"}}>
                  <img src={P[m]} alt={m} style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover"}}/>
                  <div style={{position:"absolute",inset:0,background:"linear-gradient(135deg,rgba(0,0,0,0.05),rgba(0,0,0,0.72))"}}/>
                  <div style={{position:"relative",padding:"12px 14px",height:"100%",display:"flex",flexDirection:"column",justifyContent:"flex-end"}}>
                    <div style={{fontSize:14,fontWeight:900,color:"#fff",marginBottom:2}}>{MUSCLE_META[m].label}</div>
                    <div style={{fontSize:9,color:"rgba(255,255,255,0.5)"}}>{MUSCLE_META[m].sub}</div>
                  </div>
                </button>
              ))}
            </div>
            {log[0]&&(
              <><div style={{...S.lbl,marginBottom:12}}>Laatste training</div>
              <div style={{...S.card,padding:16,marginBottom:20}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}><div style={{fontSize:15,fontWeight:800}}>{log[0].workout}</div><div style={{fontSize:11,color:"#444"}}>{log[0].day} · {log[0].date}</div></div>
                {(log[0].exercises||[]).slice(0,4).map((ex,j)=>(
                  <div key={j} style={{display:"flex",justifyContent:"space-between",paddingBottom:7,marginBottom:7,borderBottom:j<3?"1px solid #1C1C1C":"none"}}>
                    <div style={{fontSize:12,color:"#666"}}>{ex.name}</div>
                    <div style={{fontSize:12,fontWeight:700,color:LIME}}>{(ex.weights||[]).filter(w=>w>0).map(w=>`${w}kg`).join("·")||"–"}</div>
                  </div>
                ))}
              </div></>
            )}
          </div>
        </div>
      )}

      {tab==="Training"&&(
        <div style={{padding:"24px 16px"}}>
          <div style={{fontSize:26,fontWeight:900,letterSpacing:-0.5,marginBottom:4}}>Training</div>
          <div style={{fontSize:13,color:"#555",marginBottom:20}}>{DAY_NL}</div>
          {selectingMuscles?(
            <div>
              <div style={{...S.lbl,marginBottom:12}}>Snelle splits</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:20}}>
                {SPLITS.map(s=>(
                  <button key={s.label} onClick={()=>startSess(s.muscles)} style={{padding:"8px 14px",borderRadius:20,border:"1px solid #222",background:"#141414",color:"#fff",fontSize:12,cursor:"pointer",fontWeight:600}}>{s.label}</button>
                ))}
              </div>
              <button onClick={()=>setShowCustom(!showCustom)} style={{width:"100%",padding:"12px",borderRadius:14,border:`1px solid ${showCustom?LIME:"#222"}`,background:showCustom?"rgba(200,241,56,0.07)":"#141414",color:showCustom?LIME:"#888",fontSize:12,fontWeight:700,cursor:"pointer",marginBottom:16}}>+ Eigen workout</button>
              {showCustom&&(
                <div style={{...S.card,padding:16,marginBottom:16}}>
                  <input value={customName} onChange={e=>setCustomName(e.target.value)} placeholder="Naam bijv. 'Push dag'" style={{width:"100%",padding:"11px 14px",borderRadius:12,border:"1px solid #222",background:"#111",color:"#fff",fontSize:13,outline:"none",marginBottom:12,boxSizing:"border-box"}}/>
                  {customExercises.map((ex,i)=>(
                    <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 50px 50px 50px 28px",gap:6,marginBottom:8,alignItems:"center"}}>
                      <input value={ex.name} onChange={e=>setCustomExercises(p=>p.map((x,j)=>j===i?{...x,name:e.target.value}:x))} placeholder="Oefening" style={{padding:"9px 10px",borderRadius:10,border:"1px solid #222",background:"#111",color:"#fff",fontSize:12,outline:"none",boxSizing:"border-box"}}/>
                      <input value={ex.sets} onChange={e=>setCustomExercises(p=>p.map((x,j)=>j===i?{...x,sets:e.target.value}:x))} placeholder="Sets" style={{padding:"9px 4px",borderRadius:10,border:"1px solid #222",background:"#111",color:"#fff",fontSize:12,outline:"none",textAlign:"center",boxSizing:"border-box"}}/>

            setFoodAdvice(txt);setLoadingFA(false);
          }} disabled={loadingFA} style={{width:"100%",padding:14,borderRadius:14,border:"none",cursor:"pointer",background:ORANGE,color:"#fff",fontSize:14,fontWeight:800,marginBottom:12,opacity:loadingFA?0.7:1}}>
            {loadingFA?"Finn analyseert...":"Vraag voedingsadvies aan Finn"}
          </button>
          {foodAdvice&&<div style={{...S.card,padding:16,fontSize:13,lineHeight:1.8,color:"#bbb",marginBottom:12}}>{foodAdvice}</div>}
        </div>
      )}

      {tab==="Coach"&&(
        <div style={{padding:"24px 16px",display:"flex",flexDirection:"column",alignItems:"center"}}>
          <div style={{...S.lbl,color:LIME,marginBottom:4,alignSelf:"flex-start"}}>Jouw coach</div>
          <div style={{fontSize:32,fontWeight:900,letterSpacing:-1,marginBottom:24,alignSelf:"flex-start"}}>Meet Finn</div>
          <div style={{marginBottom:24,position:"relative",display:"flex",justifyContent:"center"}}>
            <div style={{width:220,height:280,animation:"finnFloat 3s ease-in-out infinite"}}>
              <img src={FINN_IMG} alt="Finn" style={{width:"100%",height:"100%",objectFit:"contain",objectPosition:"top center",filter:"drop-shadow(0 12px 32px rgba(255,107,43,0.4))"}}/>
            </div>
            <div style={{position:"absolute",top:8,right:40,background:LIME,borderRadius:99,padding:"4px 12px",fontSize:10,fontWeight:800,color:"#000"}}>● Online</div>
          </div>
          <div style={{...S.card,padding:20,marginBottom:16,width:"100%",textAlign:"center"}}>
            <div style={{fontSize:16,fontWeight:800,marginBottom:8}}>Finn, jouw persoonlijke AI coach</div>
            <div style={{fontSize:13,color:"#666",lineHeight:1.8}}>Ik help je met trainingsadvies, voeding en motivatie.</div>
          </div>
          <div style={{width:"100%",marginBottom:16}}>
            <div style={{...S.lbl,marginBottom:12}}>Vraag Finn iets</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {["Motiveer me!","Wat eten vandaag?","Hoe val ik af?","Maak een schema","Analyse mijn week","Ik ben moe"].map(q=>(
                <button key={q} onClick={()=>openFinnWith(q)} style={{padding:"12px 14px",borderRadius:14,border:"1px solid #1C1C1C",background:"#141414",color:"#888",fontSize:12,cursor:"pointer",fontWeight:600,textAlign:"left"}}>{q}</button>
              ))}
            </div>
          </div>
          <button onClick={()=>openFinnWith(null)} style={{width:"100%",padding:16,borderRadius:16,border:"none",cursor:"pointer",background:ORANGE,color:"#fff",fontSize:15,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",gap:12}}>
            <FinnImg size={32}/>Chat met Finn
          </button>
        </div>
      )}

      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"rgba(13,13,13,0.97)",borderTop:"1px solid #1C1C1C",display:"flex",zIndex:20,backdropFilter:"blur(24px)"}}>
        {[
          {id:"Home",svg:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>},
          {id:"Training",svg:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M6 4v16M18 4v16M2 8h4M18 8h4M2 16h4M18 16h4"/></svg>},
          {id:"Voortgang",svg:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>},
          {id:"Voeding",svg:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 2C8 2 4 6 4 10c0 5.25 8 12 8 12s8-6.75 8-12c0-4-4-8-8-8z"/></svg>},
          {id:"Coach",svg:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>},
        ].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"12px 4px 10px",border:"none",background:"none",cursor:"pointer",color:tab===t.id?(t.id==="Coach"?ORANGE:LIME):"#333",display:"flex",flexDirection:"column",alignItems:"center",gap:4,transition:"color .15s"}}>
            {t.svg}
            <div style={{fontSize:9,fontWeight:700,letterSpacing:0.5}}>{t.id.toUpperCase()}</div>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
