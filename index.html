function fmtDate(d){const dd=String(d.getDate()).padStart(2,'0'),mm=String(d.getMonth()+1).padStart(2,'0');return`${dd}/${mm}/${d.getFullYear()}`;}
function parseDate(s){const p=s.split('/');return new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));}

async function resizeImg(file){return new Promise(res=>{const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>{const max=220,ratio=Math.min(max/img.width,max/img.height),c=document.createElement('canvas');c.width=img.width*ratio;c.height=img.height*ratio;c.getContext('2d').drawImage(img,0,0,c.width,c.height);res(c.toDataURL('image/jpeg',0.75));};img.src=e.target.result;};r.readAsDataURL(file);});}

async function ai(prompt){try{const r=await fetch(WORKER,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,messages:[{role:"user",content:prompt}]})});const d=await r.json();return d.content?.[0]?.text||"";}catch(e){return"Verbindingsfout.";}}

// ── SPRAAK ──────────────────────────────────────────────────
function speak(txt){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(txt);
  u.lang="nl-NL";u.rate=1.0;u.pitch=1.0;
  // probeer Nederlandse stem
  const voices=window.speechSynthesis.getVoices();
  const nl=voices.find(v=>v.lang.startsWith("nl"))||voices[0];
  if(nl)u.voice=nl;
  window.speechSynthesis.speak(u);
}

function startListening(onResult,onEnd){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return null;
  const r=new SR();
  r.lang="nl-NL";r.continuous=false;r.interimResults=false;
  r.onresult=e=>{const t=e.results[0][0].transcript.toLowerCase().trim();onResult(t);};
  r.onend=()=>{if(onEnd)onEnd();};
  r.onerror=()=>{if(onEnd)onEnd();};
  r.start();
  return r;
}

  "Hip Thrust":{muscle:"billen",unit:"kg",rest:75,info:"Bovenrug op een bank, stang over je heupen (gebruik een pad). Voeten plat, knieën 90 graden. Duw heupen explosief omhoog en knijp je billen zo hard mogelijk samen bovenaan. Even vasthouden.",yt:"hip+thrust"},
  "Glute Bridge":{muscle:"billen",unit:"reps",rest:45,info:"Lig op je rug met knieën gebogen, voeten plat. Duw je heupen omhoog tot je lichaam een rechte lijn vormt. Knijp billen samen bovenaan. Makkelijker variant van de hip thrust.",yt:"glute+bridge"},
  "Plank":{muscle:"buik",unit:"sec",rest:30,info:"Steun op onderarmen en tenen. Lichaam als een rechte plank — geen hangende heupen, geen omhoog gestoken billen. Span je core, billen en benen aan. Adem rustig door. Kijk naar de grond.",yt:"plank"},
  "Crunches":{muscle:"buik",unit:"reps",rest:30,info:"Lig op je rug, knieën gebogen. Kroel je bovenlichaam omhoog door je core samen te trekken — niet door je nek te trekken. Stop halverwege, je lage rug blijft op de grond. Langzaam terug.",yt:"crunches"},
  "Leg Raises":{muscle:"buik",unit:"reps",rest:30,info:"Lig plat. Benen gestrekt omhoog heffen tot 90 graden. Laat langzaam zakken tot net boven de grond — raak niet helemaal neer. Houd je lage rug op de grond voor maximale core-activatie.",yt:"leg+raises"},
  "Mountain Climber":{muscle:"buik",unit:"sec",rest:20,info:"Plank positie op gestrekte armen. Breng beurtelings je knie explosief naar je borst alsof je heuvel oprent. Heupen laag houden. Hoe sneller, hoe hoger de hartslag. Core altijd gespannen.",yt:"mountain+climbers"},
  "Arnold Press":{muscle:"schouders",unit:"kg",rest:75,info:"Begin met palmen naar jou gericht op ooghoogte. Terwijl je omhoog drukt roteer je je handen naar buiten. Bovenaan wijzen je palmen naar voren. Omgekeerd terug. Werkt alle drie de deltoid-koppen.",yt:"arnold+press"},
  "Face Pulls":{muscle:"schouders",unit:"kg",rest:45,info:"Kabel op ooghoogte of iets erboven. Trek naar je gezicht met ellebogen omhoog. Externe rotatie aan het einde — duimen naar achteren. Essentieel voor gezonde schouders en houding.",yt:"face+pulls"},
  "Burpee":{muscle:"full body",unit:"reps",rest:30,info:"Vanuit staande positie: squat neer, handen op grond, spring naar plank, doe een push-up (optioneel), spring terug naar squat, spring omhoog met armen overhead. Intense totaallichaams-oefening.",yt:"burpee"},
  "Jump Squat":{muscle:"benen",unit:"reps",rest:30,info:"Doe een normale squat. Vanuit de onderste positie spring je explosief omhoog. Armen gebruiken voor vaart. Land zacht met gebogen knieën om de schok op te vangen. Direct door naar de volgende rep.",yt:"jump+squat"},
  "High Knees":{muscle:"full body",unit:"sec",rest:20,info:"Sta recht en ren op de plaats met knieën zo hoog mogelijk — idealiter tot heuphoogte. Armen meebewegen alsof je echt rent. Hoge intensiteit, verhoogt hartslag snel. Heel de grond niet raken.",yt:"high+knees"},
  "Box Jump":{muscle:"benen",unit:"reps",rest:45,info:"Sta voor de box. Buig licht door je knieën. Spring explosief omhoog met je armen als hulp. Land met beide voeten tegelijk op de box, zacht met gebogen knieën. Stap voorzichtig naar beneden.",yt:"box+jump"},
  "Jumping Jacks":{muscle:"full body",unit:"reps",rest:15,info:"Sta rechtop. Spring je benen uit elkaar terwijl je armen boven je hoofd brengt. Spring terug naar de startpositie. Goede warming-up of actieve rust-oefening tussen zwaardere sets.",yt:"jumping+jacks"},
  "Kettlebell Swing":{muscle:"full body",unit:"reps",rest:30,info:"Voeten schouderbreedte. Kettlebell tussen je benen. Heupen explosief naar voren duwen — de swing komt van je heupen, niet van je armen! Rug recht, core strak. Laat de kettlebell terug zwaaien tot tussen de knieën.",yt:"kettlebell+swing"},
  "Battle Ropes":{muscle:"schouders",unit:"sec",rest:30,info:"Houd beide touwen vast, licht door de knieën. Maak alternerend golfbewegingen. Hoe groter de golven, hoe zwaarder. Varieer met beide tegelijk, circels of zij-aan-zij bewegen.",yt:"battle+ropes"},
  "Skipping":{muscle:"full body",unit:"sec",rest:30,info:"Houd de handgrepen op heuphoogte. Draai met je polsen — niet je armen. Spring op de bal van je voet. Begin rustig met beide voeten tegelijk en bouw op naar single-leg of dubbel-slagen.",yt:"skipping+rope"},
  "Hardlopen":{muscle:"full body",unit:"sec",rest:60,info:"Goede loopschoenen zijn essentieel. Begin rustig, bouw je tempo op. Adem in door de neus, uit door de mond. Armen meebewegen voor efficiëntie. Landingspatroon: middenvoet, niet op je hiel.",yt:"running+technique+beginners"},
  "Roeien (machine)":{muscle:"rug",unit:"sec",rest:60,info:"Trek in volgorde: benen — romp achterover — armen. Duw terug in omgekeerde volgorde: armen — romp voorover — benen buigen. Volle bewegingsuitslag voor maximale efficiency. Weerstand aanpassen.",yt:"rowing+machine+technique"},
  "Stationary Bike":{muscle:"benen",unit:"sec",rest:30,info:"Zadel op heuphoogte zodat je been bijna gestrekt is onderaan. Trap in cirkels, niet op en neer. Wissel tussen hoge cadans (makkelijk) en lage cadans (zwaar) voor intervallen.",yt:"stationary+bike+workout"},
  "Spinning":{muscle:"benen",unit:"sec",rest:30,info:"Zit rechtop of leun iets voorover. Weerstand opbouwen voor klimmen. Sta op de pedalen voor sprints. Wissel tussen zitten en staan. Cadans controleren met je ademhaling.",yt:"spinning+workout+beginners"},
  "Stair Climber":{muscle:"benen",unit:"sec",rest:45,info:"Sta rechtop, minimaal leunen op de handgrepen — dat vermindert de intensiteit. Volle stap nemen voor maximale billen- en beenactivatie. Tempo aanpassen voor cardio of kracht.",yt:"stair+climber+workout"},
  "Treadmill Walk":{muscle:"full body",unit:"sec",rest:30,info:"Loop op een helling van 5-10% voor maximale calorieverbranding zonder rennen. Handen niet vasthouden aan de leuning. Opgerichte houding. Combineer met intervallen voor extra resultaat.",yt:"treadmill+incline+walking"},
  "Elliptical":{muscle:"full body",unit:"sec",rest:30,info:"Laag impact — goed voor gewrichten. Gebruik de armen actief mee voor een totaallichaams-workout. Wissel van richting (achteruit trappen) voor andere spieren. Helling aanpassen voor meer weerstand.",yt:"elliptical+machine+workout"},
  "Lopen op helling":{muscle:"benen",unit:"sec",rest:30,info:"Loop buiten of op de loopband op 8-15% helling. Lager tempo dan normaal hardlopen maar veel hogere calorieverbranding. Goede knievervanging voor mensen die niet goed kunnen rennen.",yt:"incline+walking+workout"},
  "Touwtjespringen":{muscle:"full body",unit:"sec",rest:30,info:"Begin met beide voeten tegelijk. Polsen draaien, niet de armen. Spring op de bal van je voet voor zachte landingen. 10 minuten touwtjespringen = ±130 calorieën. Goede HIIT optie.",yt:"jump+rope+workout"},
  "Bear Crawl":{muscle:"full body",unit:"sec",rest:30,info:"Handen en knieën, knieën net boven de grond. Beweeg diagonaal: rechterhand met linkervoet tegelijk. Heupen laag houden. Uitstekende core- en schouderstabiliteit oefening.",yt:"bear+crawl+exercise"},
  "Tuck Jump":{muscle:"benen",unit:"reps",rest:30,info:"Spring omhoog en trek je knieën naar je borst op het hoogste punt. Land zacht met gebogen knieën. Explosieve oefening die quad, billen en core activeert. Intensief — bouw langzaam op.",yt:"tuck+jump"},
  "Lateral Shuffle":{muscle:"benen",unit:"sec",rest:20,info:"Ga licht door je knieën in atletische positie. Schuif zijwaarts — voeten niet kruisen. Raak de grond aan bij elke richting wissel. Werkt de buitenkant van je benen en billen.",yt:"lateral+shuffle+exercise"},
  "Inchworm":{muscle:"full body",unit:"reps",rest:20,info:"Sta recht. Loop met je handen naar voren tot plank-positie. Doe een push-up (optioneel). Loop handen terug naar je voeten. Oprekken en warming-up beweging maar ook een goede full-body oefening.",yt:"inchworm+exercise"},
  "Ski Jumps":{muscle:"benen",unit:"reps",rest:30,info:"Spring zijwaarts van been naar been alsof je ski slalom rijdt. Land op één been en buig door je knie voor een zachte landing. Ploeg kracht en coördinatie. Doe 10 per kant.",yt:"skater+jumps+exercise"},
  "Sprint op de plaats":{muscle:"full body",unit:"sec",rest:20,info:"Ren zo snel mogelijk op de plaats. Knieën omhoog, armen hard meebewegen. Volle inspanning. Ideaal als afsluiter van een interval of als opwarmer.",yt:"running+in+place+fast"},
  "Power Jack":{muscle:"full body",unit:"reps",rest:20,info:"Jumping jack maar dan met een squat onderaan. Sla benen uit, zak in squat, duw omhoog en breng benen samen. Combineert plyometrie met kracht.",yt:"power+jack+exercise"},
  "Plank Jack":{muscle:"buik",unit:"reps",rest:20,info:"Begin in plankpositie op gestrekte armen. Spring benen uit elkaar en terug samen — zoals een jumping jack maar horizontaal. Core strak, heupen laag.",yt:"plank+jack+exercise"},
  "Sumo Squat Jump":{muscle:"benen",unit:"reps",rest:30,info:"Brede squat met tenen naar buiten. Zak diep, spring explosief omhoog. Land zacht terug in brede stand. Werkt binnenste dijen en billen extra.",yt:"sumo+squat+jump"},
  "Speed Rope":{muscle:"full body",unit:"sec",rest:20,info:"Springtouw op maximale snelheid. Probeer zo weinig mogelijk tijd op de grond te zijn. Polsen klein houden. Na 30 seconden maximale hartslag.",yt:"speed+rope+workout"},
  "Plyo Push-up":{muscle:"borst",unit:"reps",rest:30,info:"Normale push-up maar explosief omhoog zodat handen van de grond komen. Land zacht en direct in volgende. Geavanceerd — bouw langzaam op.",yt:"plyometric+push+up"},
  "Broad Jump":{muscle:"benen",unit:"reps",rest:30,info:"Sta met voeten schouderbreedte. Buig door knieën, zwaai armen terug en spring zo ver mogelijk vooruit. Land zacht met gebogen knieën. Meet je afstand.",yt:"broad+jump+exercise"},
  "Donkey Kick":{muscle:"billen",unit:"reps",rest:15,info:"Begin op handen en knieën. Schop één been omhoog naar het plafond terwijl je knie gebogen blijft. Knijp bil samen bovenaan. Afwisselend per been.",yt:"donkey+kick+exercise"},
  "Frog Jump":{muscle:"benen",unit:"reps",rest:30,info:"Diepe squat met handen op de grond tussen je voeten. Spring explosief omhoog en laat armen meebewegen. Land terug in diepe squat. Kikker-achtig.",yt:"frog+jump+exercise"},
  "Interval Hardlopen":{muscle:"full body",unit:"sec",rest:60,info:"Wissel 30 seconden sprinten af met 30 seconden rustig joggen. Verhoogt conditie sneller dan steady-state cardio. Bouw intervallen op per week.",yt:"interval+running+workout"},
  "Zwemmen":{muscle:"full body",unit:"sec",rest:30,info:"Laag impact, hoge calorieverbranding. Wissel slagen af voor verschillende spiergroepen. Crawl voor snelheid, schoolslag voor duur. Goed voor herstel.",yt:"swimming+workout+beginners"},
  "Roeien buiten":{muscle:"rug",unit:"sec",rest:60,info:"Buiten roeien geeft extra weerstand door wind en stroom. Trek met heupen en rug, niet alleen armen. Goede houding voorkomt rugklachten.",yt:"rowing+outdoor+technique"},
  "Crosstrainer":{muscle:"full body",unit:"sec",rest:30,info:"Elliptical met armbeweging. Laag impact, hoge calorieverbranding. Stel weerstand in op een niveau dat je nog net kunt praten maar niet zingen.",yt:"cross+trainer+workout"},
  "Wandelen":{muscle:"benen",unit:"sec",rest:0,info:"Onderschat wandelen niet — 30 minuten op tempo verbrandt net zoveel vet als joggen. Houd een flink tempo aan. Goed voor herstel en vetverbranding.",yt:"power+walking+workout"},
  "Treadmill Sprint":{muscle:"full body",unit:"sec",rest:60,info:"Zet de band op maximale snelheid voor korte sprints van 15-30 seconden. Houd je vast bij opstap en neerstap. Niet langer dan 30 seconden per sprint.",yt:"treadmill+sprint+interval"}
};

function RestTimer({seconds,onDone}){
  const [left,setLeft]=useState(seconds);
  const ref=useRef(null);
  useEffect(()=>{
    if(left>0){ref.current=setTimeout(()=>setLeft(l=>l-1),1000);}
    else{if(onDone)onDone();}
    return()=>clearTimeout(ref.current);
  },[left]);
  const pct=(left/seconds)*100;
  const w=pct/100*240;
  return(
    <div style={{background:"#0D0D0D",border:"1px solid #1C1C1C",borderRadius:14,padding:"14px 16px",marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div>
          <div style={{fontSize:10,letterSpacing:3,color:"#444",fontWeight:700,textTransform:"uppercase",marginBottom:2}}>Rust</div>
          <div style={{fontSize:28,fontWeight:900,letterSpacing:-1,color:LIME,lineHeight:1}}>{left}<span style={{fontSize:13,color:"#444",fontWeight:400,marginLeft:2}}>sec</span></div>
        </div>
        <button onClick={()=>{clearTimeout(ref.current);if(onDone)onDone();}} style={{padding:"8px 16px",borderRadius:8,border:"1px solid #222",background:"none",color:"#555",fontSize:12,fontWeight:700,cursor:"pointer",letterSpacing:1}}>SKIP</button>
      </div>
      <div style={{background:"#1A1A1A",borderRadius:2,height:2,overflow:"hidden"}}>
        <div style={{width:`${pct}%`,height:2,background:LIME,transition:"width .9s linear"}}/>
      </div>
    </div>
  );
}

function HiitWorkout({exercises,onDone,voiceOn}){
  const WORK_OPTS=[20,30,40,45];
  const REST_HIIT_OPTS=[10,15,20,30];
  const DUR_OPTS=[10,15,20];
  const [configured,setConfigured]=useState(false);
  const [workSec,setWorkSec]=useState(40);
  const [restSec,setRestSec]=useState(20);
  const [durMin,setDurMin]=useState(15);
  const [phase,setPhase]=useState("work");
  const [left,setLeft]=useState(workSec);
  const [exIdx,setExIdx]=useState(0);
  const [totalLeft,setTotalLeft]=useState(durMin*60);
  const [running,setRunning]=useState(false);
  const ref=useRef(null);
  const totalRef=useRef(null);
  const ex=exercises[exIdx%exercises.length];
  const nextEx=exercises[(exIdx+1)%exercises.length];

  function say(txt){if(voiceOn)speak(txt);}

  useEffect(()=>{
    if(!configured||!running)return;
    if(left>0){
      ref.current=setTimeout(()=>{
        const nl=left-1;setLeft(nl);
        if(nl===3&&phase==="work")say("Drie. Twee. Één.");
        if(nl===3&&phase==="rest")say("Drie. Twee. Één. Go!");
      },1000);
    } else {
      if(phase==="work"){
        say("Rust.");
        setPhase("rest");setLeft(restSec);
      } else {
        const ni=exIdx+1;
        say(`${exercises[ni%exercises.length].name}.`);
        setExIdx(ni);setPhase("work");setLeft(workSec);
      }
    }
    return()=>clearTimeout(ref.current);
  },[configured,running,left,phase]);

  useEffect(()=>{
    if(!configured||!running)return;
    totalRef.current=setTimeout(()=>{
      const nt=totalLeft-1;setTotalLeft(nt);
      if(nt<=0){say("Training voltooid.");setRunning(false);setPhase("done");}
    },1000);
    return()=>clearTimeout(totalRef.current);
  },[configured,running,totalLeft]);

  // Config scherm
  if(!configured) return(
    <div>
      <div style={{marginBottom:24}}>
        <div style={{fontSize:11,letterSpacing:3,color:"#444",fontWeight:700,textTransform:"uppercase",marginBottom:16}}>Stel jouw circuit in</div>
        <div style={{marginBottom:20}}>
          <div style={{fontSize:13,color:"#888",marginBottom:10,fontWeight:600}}>Work tijd per oefening</div>
          <div style={{display:"flex",gap:8}}>
            {WORK_OPTS.map(s=>(
              <button key={s} onClick={()=>setWorkSec(s)} style={{flex:1,padding:"14px 4px",borderRadius:12,border:`1px solid ${workSec===s?ORANGE:"#1C1C1C"}`,background:workSec===s?"rgba(255,107,43,0.1)":"#111",color:workSec===s?ORANGE:"#444",fontWeight:900,fontSize:16,cursor:"pointer",letterSpacing:-0.5}}>
                {s}<span style={{fontSize:10,fontWeight:400,marginLeft:1}}>s</span>
              </button>
            ))}
          </div>
        </div>
        <div style={{marginBottom:20}}>
          <div style={{fontSize:13,color:"#888",marginBottom:10,fontWeight:600}}>Rust tussen oefeningen</div>
          <div style={{display:"flex",gap:8}}>
            {REST_HIIT_OPTS.map(s=>(
              <button key={s} onClick={()=>setRestSec(s)} style={{flex:1,padding:"14px 4px",borderRadius:12,border:`1px solid ${restSec===s?LIME:"#1C1C1C"}`,background:restSec===s?"rgba(200,241,56,0.08)":"#111",color:restSec===s?LIME:"#444",fontWeight:900,fontSize:16,cursor:"pointer"}}>
                {s}<span style={{fontSize:10,fontWeight:400,marginLeft:1}}>s</span>
              </button>
            ))}
          </div>
        </div>
        <div style={{marginBottom:24}}>
          <div style={{fontSize:13,color:"#888",marginBottom:10,fontWeight:600}}>Totale duur</div>
          <div style={{display:"flex",gap:8}}>
            {DUR_OPTS.map(m=>(
              <button key={m} onClick={()=>setDurMin(m)} style={{flex:1,padding:"14px 4px",borderRadius:12,border:`1px solid ${durMin===m?"#fff":"#1C1C1C"}`,background:durMin===m?"rgba(255,255,255,0.06)":"#111",color:durMin===m?"#fff":"#444",fontWeight:900,fontSize:16,cursor:"pointer"}}>
                {m}<span style={{fontSize:10,fontWeight:400,marginLeft:1}}>min</span>
              </button>
            ))}
          </div>
        </div>
      </div>

      <div style={{background:"#0D0D0D",borderRadius:14,padding:16,marginBottom:20}}>
        <div style={{fontSize:10,letterSpacing:3,color:"#333",fontWeight:700,textTransform:"uppercase",marginBottom:12}}>Circuit</div>
        {exercises.map((e,i)=>(
          <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingBottom:10,marginBottom:10,borderBottom:i<exercises.length-1?"1px solid #111":"none"}}>
            <div style={{fontSize:14,fontWeight:700,color:"#ccc"}}>{e.name}</div>
            <div style={{fontSize:11,color:"#333",letterSpacing:1}}>{workSec}s · {restSec}s rust</div>
          </div>
        ))}
      </div>

      <button onClick={()=>{
        setConfigured(true);setLeft(workSec);setTotalLeft(durMin*60);
        say(`${durMin} minuten. ${exercises[0].name}. Start.`);
        setRunning(true);
      }} style={{width:"100%",padding:18,borderRadius:14,border:"none",cursor:"pointer",background:ORANGE,color:"#fff",fontSize:16,fontWeight:900,letterSpacing:-0.5}}>
        Start circuit
      </button>
    </div>
  );

  // Klaar scherm
  if(phase==="done") return(
    <div style={{padding:"60px 0",textAlign:"center"}}>
      <div style={{fontSize:11,letterSpacing:4,color:"#444",fontWeight:700,textTransform:"uppercase",marginBottom:16}}>Voltooid</div>
      <div style={{fontSize:52,fontWeight:900,letterSpacing:-2,color:LIME,marginBottom:8,lineHeight:1}}>{durMin} min</div>
      <div style={{fontSize:14,color:"#555",marginBottom:40}}>HIIT circuit afgerond</div>
      <button onClick={onDone} style={{padding:"16px 40px",borderRadius:14,border:"none",cursor:"pointer",background:LIME,color:"#000",fontSize:15,fontWeight:900,letterSpacing:-0.5}}>Opslaan</button>
    </div>
  );

  // Workout scherm
  const isWork=phase==="work";
  const curSec=isWork?workSec:restSec;
  const pct=(left/curSec)*100;
  const totalPct=((durMin*60-totalLeft)/(durMin*60))*100;
  const isAlert=left<=3&&running;

  return(
    <div>
      {/* Tijdbalk bovenaan */}
      <div style={{marginBottom:20}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:10,letterSpacing:2,color:"#333",fontWeight:700,textTransform:"uppercase",marginBottom:6}}>
          <span>Circuit</span>
          <span>{Math.floor(totalLeft/60)}:{String(totalLeft%60).padStart(2,'0')}</span>
        </div>
        <div style={{background:"#111",borderRadius:2,height:2}}>
          <div style={{width:`${totalPct}%`,height:2,background:"#333",transition:"width 1s linear"}}/>
        </div>
      </div>

      {/* Hoofd timer blok */}
      <div style={{background:"#0D0D0D",borderRadius:20,padding:"32px 24px",marginBottom:12,textAlign:"center",border:`1px solid ${isWork?"#1C1C1C":"rgba(200,241,56,0.1)"}`}}>
        <div style={{fontSize:10,letterSpacing:4,fontWeight:700,textTransform:"uppercase",color:isWork?ORANGE:LIME,marginBottom:24}}>
          {isWork?"Work":"Rust"}
        </div>

        {isWork&&(
          <div style={{marginBottom:20}}>
            <div style={{fontSize:32,fontWeight:900,letterSpacing:-1,lineHeight:1,marginBottom:6}}>{ex.name}</div>
            <div style={{fontSize:12,color:"#444",lineHeight:1.6,maxWidth:280,margin:"0 auto"}}>{ex.info?.slice(0,80)}</div>
          </div>
        )}
        {!isWork&&(
          <div style={{marginBottom:20}}>
            <div style={{fontSize:13,color:"#444",marginBottom:4}}>Volgende</div>
            <div style={{fontSize:24,fontWeight:900,color:"#888"}}>{nextEx.name}</div>
          </div>
        )}

        {/* Grote teller */}
        <div style={{fontSize:isAlert?96:80,fontWeight:900,letterSpacing:-4,lineHeight:1,color:isAlert?"#ef4444":isWork?ORANGE:LIME,transition:"color .3s",marginBottom:8}}>{left}</div>
        <div style={{fontSize:10,letterSpacing:3,color:"#333",textTransform:"uppercase"}}>seconden</div>

        {/* Progress lijn */}
        <div style={{background:"#111",borderRadius:2,height:2,marginTop:24,overflow:"hidden"}}>
          <div style={{width:`${pct}%`,height:2,background:isWork?ORANGE:LIME,transition:"width .9s linear"}}/>
        </div>
      </div>

      {/* Volgende in lijst */}
      {isWork&&(
        <div style={{background:"#0D0D0D",border:"1px solid #111",borderRadius:12,padding:"10px 16px",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:10,letterSpacing:2,color:"#333",fontWeight:700,textTransform:"uppercase"}}>Daarna</div>
          <div style={{fontSize:13,color:"#555",fontWeight:600}}>{nextEx.name}</div>
        </div>
      )}

      {/* Controls */}
      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>setRunning(r=>!r)} style={{flex:1,padding:"16px",borderRadius:14,border:"none",cursor:"pointer",background:running?"#1C1C1C":ORANGE,color:running?"#555":"#fff",fontSize:13,fontWeight:900,letterSpacing:1,textTransform:"uppercase"}}>
          {running?"Pauze":"Hervat"}
        </button>
        <button onClick={()=>setLeft(0)} style={{padding:"16px 20px",borderRadius:14,border:"1px solid #1C1C1C",background:"none",color:"#444",fontSize:11,fontWeight:700,cursor:"pointer",letterSpacing:1,textTransform:"uppercase"}}>Skip</button>
      </div>
    </div>
  );
}

function buildSession(muscles,log,profile){
  const stype=profile?.sportType||"kracht";
  const epref=profile?.equipmentPref||"mixed";
  const level=profile?.level||"beginner";
  const machineEx=["Leg Press","Leg Extension","Leg Curl","Lat Pulldown","Seated Cable Row","Cable Fly","Triceps Pushdown","Face Pulls"];
  const dumbEx=["Incline Dumbbell Press","Lateral Raises","Hammer Curl","Incline Dumbbell Curl","Concentration Curl","Arnold Press"];
  const exercises=[];
  muscles.forEach(muscle=>{
    const variants=ALL_WV[muscle]||WV[muscle]||WV["full body"];
    if(!variants)return;
    const prevCount=log.filter(e=>(e.targetMuscles||[]).includes(muscle)).length;
    const variant=variants[prevCount%variants.length]||variants[0];
    const last=log.find(e=>(e.targetMuscles||[]).includes(muscle));
    const lastMap={};
    if(last)last.exercises.forEach(e=>{lastMap[e.name]=e;});
    let filtered=[...variant];
    if(stype==="kracht"||stype==="gemixed"){
      if(epref==="machines"){const m=variant.filter(ex=>machineEx.includes(ex.name));if(m.length>=2)filtered=m;}
      else if(epref==="dumbbells"){const d=variant.filter(ex=>dumbEx.includes(ex.name));if(d.length>=2)filtered=d;}
    }
    if(level==="beginner"){filtered=filtered.slice(0,4);}
    filtered.forEach(ex=>{
      if(!exercises.find(e=>e.name===ex.name)){
        const db=EX_DB[ex.name]||{};
        const unit=db.unit||"kg";
        exercises.push({...ex,weights:lastMap[ex.name]?[...lastMap[ex.name].weights]:[...ex.weights],note:"",saved:false,unit,info:db.info||"",yt:db.yt||"",prevWeights:lastMap[ex.name]?.weights||null,prevNote:lastMap[ex.name]?.note||""});
      }
    });
  });
  return exercises;
}

function LineChart({data,height=120}){
  if(!data||data.length<2)return<div style={{height,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"#444"}}>Meer metingen nodig</div>;
  const vals=data.map(d=>d.w),mn=Math.min(...vals)-0.5,mx=Math.max(...vals)+0.5,rng=mx-mn,W=320,H=height-24;

  },[profile]);

  async function addFood(meal,quickItem){
    const txt=quickItem||foodInput[meal].trim();if(!txt)return;
    if(!quickItem)setFoodLoading(p=>({...p,[meal]:true}));
    const raw=await ai(`Voedingswaarden voor: "${txt}". ALLEEN JSON: {"desc":"${txt}","kcal":0,"prot":0,"carbs":0,"fat":0}.`);
    try{const pp=JSON.parse(raw.replace(/```json|```/g,"").trim());const item={desc:pp.desc||txt,kcal:pp.kcal||0,prot:pp.prot||0,carbs:pp.carbs||0,fat:pp.fat||0};const day=food[foodDate]||{Ochtend:[],Middag:[],Avond:[],Snack:[]};const updated={...food,[foodDate]:{...day,[meal]:[...(day[meal]||[]),item]}};setFood(updated);LS.set("fitcoach_food",updated);const ck="fitcoach_custom_foods";const custom=LS.get(ck)||{Ochtend:[],Middag:[],Avond:[],Snack:[]};if(custom[meal]&&!custom[meal].includes(txt)){custom[meal]=[txt,...custom[meal]].slice(0,6);LS.set(ck,custom);}if(!quickItem)setFoodInput(p=>({...p,[meal]:""}));}catch(e){}

            {log.slice(0,8).map((e,i)=><div key={e.id||i} style={{...S.card,padding:16,marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:10,alignItems:"flex-start"}}><div><div style={{fontSize:14,fontWeight:800}}>{e.workout}</div><div style={{fontSize:11,color:"#444",marginTop:2}}>{e.day} · {e.date}</div></div><button onClick={()=>deleteWorkout(e.id)} style={{background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:8,color:"#ef4444",fontSize:11,cursor:"pointer",padding:"4px 10px",fontWeight:600,flexShrink:0}}>Verwijder</button></div>
              {(e.exercises||[]).slice(0,4).map((ex,j)=><div key={j} style={{display:"flex",justifyContent:"space-between",paddingBottom:6,marginBottom:6,borderBottom:j<Math.min(3,(e.exercises||[]).length-1)?"1px solid #1C1C1C":"none"}}><div style={{fontSize:11,color:"#666"}}>{ex.name}</div><div style={{fontSize:11,fontWeight:700,color:LIME}}>{(ex.weights||[]).filter(w=>w>0).map(w=>fmtVal(w,ex.unit||"kg")).join("·")||"–"}</div></div>)}
            </div>)}</>}
        </div>
      )}

      {tab==="Voeding"&&(
        <div style={{padding:"24px 16px"}}>
          <div style={{...S.lbl,color:LIME,marginBottom:4}}>Dagelijks overzicht</div>
          <div style={{fontSize:32,fontWeight:900,letterSpacing:-1,marginBottom:8}}>Voeding</div>

          <div style={{display:"flex",gap:8,marginBottom:16,alignItems:"center"}}>
            <button onClick={()=>setFoodDate(d=>fmtDate(new Date(parseDate(d).getTime()-86400000)))} style={{width:36,height:36,borderRadius:10,border:"1px solid #222",background:"#141414",color:"#fff",fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
            <div style={{flex:1,textAlign:"center"}}>
              <div style={{fontSize:13,fontWeight:700,color:foodDate===TODAY_KEY?LIME:"#888"}}>{foodDate===TODAY_KEY?"Vandaag":foodDate}</div>
              <div style={{fontSize:10,color:"#555"}}>{DAYS[parseDate(foodDate).getDay()]}</div>
            </div>
            <button onClick={()=>{if(foodDate!==TODAY_KEY)setFoodDate(d=>fmtDate(new Date(parseDate(d).getTime()+86400000)));}} disabled={foodDate===TODAY_KEY} style={{width:36,height:36,borderRadius:10,border:"1px solid #222",background:foodDate===TODAY_KEY?"#111":"#141414",color:foodDate===TODAY_KEY?"#333":"#fff",fontSize:18,cursor:foodDate===TODAY_KEY?"default":"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
          </div>

          <div style={{...S.card,padding:"12px 16px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><div style={{...S.lbl,marginBottom:2}}>Fase</div><div style={{fontSize:15,fontWeight:800,color:faseObj.c}}>{fase}</div></div>
            <div style={{textAlign:"right"}}><div style={{fontSize:11,color:"#555",marginBottom:2}}>Dagdoel</div><div style={{fontSize:18,fontWeight:900,color:LIME}}>{kcalT} kcal</div><div style={{fontSize:11,color:"#555"}}>{protT}g eiwit</div></div>
            <button onClick={()=>setShowSettings(true)} style={{padding:"8px 14px",borderRadius:10,border:"1px solid #222",background:"none",color:"#888",fontSize:11,cursor:"pointer",fontWeight:600}}>Wijzig</button>
          </div>
          <div style={{...S.card,padding:24,marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-around",alignItems:"center",marginBottom:16}}>
              <Ring pct={Math.min(100,selTotals.kcal/kcalT*100)} size={92} stroke={8} color={LIME} value={selTotals.kcal} label="Calorieën"/>
              <div style={{display:"flex",flexDirection:"column",gap:14}}>
                <Ring pct={Math.min(100,selTotals.prot/protT*100)} size={66} stroke={6} color="#60a5fa" value={`${selTotals.prot}g`} label="Eiwit"/>
                <Ring pct={Math.min(100,selTotals.carbs/Math.max(1,carbsT)*100)} size={66} stroke={6} color="#f59e0b" value={`${selTotals.carbs}g`} label="Koolh."/>
              </div>
              <Ring pct={Math.min(100,selTotals.fat/Math.max(1,fatT)*100)} size={66} stroke={6} color="#a78bfa" value={`${selTotals.fat}g`} label="Vet"/>
            </div>
          </div>
          <button onClick={()=>{setRecipeTab(!recipeTab);if(!recipeTab&&!recipe)getRecipe();}} style={{width:"100%",padding:14,borderRadius:14,border:`1px solid ${recipeTab?ORANGE:"#222"}`,background:recipeTab?"rgba(255,107,43,0.08)":"none",color:recipeTab?ORANGE:"#888",fontSize:13,fontWeight:700,cursor:"pointer",marginBottom:recipeTab?10:16,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <span>Recept van Finn</span><span>{recipeTab?"↑":"↓"}</span>
          </button>
          {recipeTab&&<div style={{...S.card,padding:16,marginBottom:16}}>{loadingRecipe?<div style={{textAlign:"center",padding:20,color:"#555"}}>Finn maakt een recept...</div>:<div><div style={{fontSize:13,lineHeight:1.8,color:"#bbb",whiteSpace:"pre-wrap"}}>{recipe}</div><button onClick={getRecipe} style={{marginTop:12,padding:"9px 16px",borderRadius:10,border:"1px solid #222",background:"none",color:"#888",fontSize:12,cursor:"pointer"}}>Nieuw recept</button></div>}</div>}
          {MEALS.map(meal=>{
            const items=selFood[meal]||[];
            const mKcal=items.reduce((s,i)=>s+(i.kcal||0),0),mProt=items.reduce((s,i)=>s+(i.prot||0),0);
            const customFoods=LS.get("fitcoach_custom_foods")||{};
            const snelkeuzes=[...(customFoods[meal]||[]),...QUICK_FOODS[meal]].filter((v,i,a)=>a.indexOf(v)===i).slice(0,6);
            return(<div key={meal} style={{...S.card,marginBottom:12,overflow:"hidden"}}>
              <div style={{height:110,position:"relative",overflow:"hidden",background:"#1C1C1C"}}>
                <img src={FOOD_PHOTOS[meal]} alt={meal} style={{width:"100%",height:"100%",objectFit:"cover"}} onError={e=>e.target.style.display="none"}/>
                <div style={{position:"absolute",inset:0,background:"linear-gradient(to bottom,transparent 20%,rgba(13,13,13,0.92))"}}/>
                <div style={{position:"absolute",bottom:10,left:14,right:14,display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
                  <div style={{fontSize:17,fontWeight:900}}>{meal}</div>
                  {items.length>0&&<div style={{display:"flex",gap:8}}><span style={{fontSize:11,color:"rgba(255,255,255,0.55)"}}>{mKcal} kcal</span><span style={{padding:"2px 8px",borderRadius:99,background:"rgba(200,241,56,0.15)",color:LIME,fontSize:10,fontWeight:700}}>{mProt}g eiwit</span></div>}
                </div>
              </div>
              <div style={{padding:14}}>
                <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
                  {snelkeuzes.map(q=><button key={q} onClick={()=>addFood(meal,q)} style={{padding:"5px 10px",borderRadius:20,border:"1px solid #222",background:"#1C1C1C",color:"#888",fontSize:10,cursor:"pointer",fontWeight:600,whiteSpace:"nowrap"}}>{q}</button>)}
                </div>
                {items.map((item,idx)=><div key={idx} style={{display:"flex",alignItems:"center",background:"#1C1C1C",borderRadius:12,padding:"10px 12px",marginBottom:8}}><div style={{flex:1}}><div style={{fontSize:13,fontWeight:700,marginBottom:3}}>{item.desc}</div><div style={{display:"flex",gap:8,fontSize:11,color:"#555"}}><span>{item.kcal}kcal</span><span>{item.prot}g eiwit</span><span>{item.carbs}g koolh</span><span>{item.fat}g vet</span></div></div><button onClick={()=>remFood(meal,idx)} style={{background:"none",border:"none",color:"#555",fontSize:18,cursor:"pointer",padding:"0 4px",marginLeft:8}}>×</button></div>)}
                <div style={{display:"flex",gap:8}}>
                  <input value={foodInput[meal]} onChange={e=>setFoodInput(p=>({...p,[meal]:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&addFood(meal,null)} placeholder="Toevoegen bijv. '150g kip'..." style={{flex:1,padding:"11px 14px",borderRadius:12,border:"1px solid #1C1C1C",background:"#111",color:"#fff",fontSize:13,outline:"none"}}/>
                  <button onClick={()=>addFood(meal,null)} disabled={foodLoading[meal]} style={{width:44,height:44,borderRadius:12,border:"none",cursor:"pointer",background:LIME,color:"#000",fontWeight:900,fontSize:18,opacity:foodLoading[meal]?0.5:1,flexShrink:0}}>{foodLoading[meal]?"·":"+"}</button>
                </div>
              </div>
            </div>);
          })}
          <button onClick={async()=>{setLoadingFA(true);setFoodAdvice("");const ms=MEALS.map(m=>{const its=selFood[m]||[];return its.length?`${m}: ${its.map(i=>i.desc).join(", ")}`:`${m}: leeg`;}).join("\n");const txt=await ai(`Finn, coach voor ${profile?.name} (fase: ${fase}).\n${ms}\nTotaal: ${selTotals.kcal}/${kcalT}kcal. Geef voedingsadvies. NL, max 180w.`);setFoodAdvice(txt);setLoadingFA(false);}} disabled={loadingFA} style={{width:"100%",padding:14,borderRadius:14,border:"none",cursor:"pointer",background:ORANGE,color:"#fff",fontSize:14,fontWeight:800,marginBottom:12,opacity:loadingFA?0.7:1}}>
            {loadingFA?"Finn analyseert...":"Vraag voedingsadvies aan Finn"}
          </button>
          {foodAdvice&&<div style={{...S.card,padding:16,fontSize:13,lineHeight:1.8,color:"#bbb",marginBottom:12}}>{foodAdvice}</div>}
        </div>
      )}
      {tab==="Coach"&&(
        <div style={{padding:"24px 16px",display:"flex",flexDirection:"column",alignItems:"center"}}>
          <div style={{...S.lbl,color:LIME,marginBottom:4,alignSelf:"flex-start"}}>Jouw coach</div>
          <div style={{fontSize:32,fontWeight:900,letterSpacing:-1,marginBottom:24,alignSelf:"flex-start"}}>Meet Finn</div>
          <div style={{marginBottom:24,position:"relative",display:"flex",justifyContent:"center"}}>
            <div style={{width:220,height:280,animation:"finnFloat 3s ease-in-out infinite"}}>
              <img src={FINN_IMG} alt="Finn" style={{width:"100%",height:"100%",objectFit:"contain",objectPosition:"top center",filter:"drop-shadow(0 12px 32px rgba(255,107,43,0.4))"}}/>
            </div>
            <div style={{position:"absolute",top:8,right:40,background:LIME,borderRadius:99,padding:"4px 12px",fontSize:10,fontWeight:800,color:"#000"}}>● Online</div>
          </div>
          <div style={{...S.card,padding:20,marginBottom:16,width:"100%",textAlign:"center"}}>
            <div style={{fontSize:16,fontWeight:800,marginBottom:8}}>Finn, jouw persoonlijke AI coach</div>
            <div style={{fontSize:13,color:"#666",lineHeight:1.8}}>Ik ken jouw trainingen, voeding en doelen. Ik geef je altijd persoonlijk advies.</div>
          </div>
          <div style={{width:"100%",marginBottom:16}}>
            <div style={{...S.lbl,marginBottom:12}}>Vraag Finn iets</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {["Motiveer me!","Wat eten vandaag?","Analyseer mijn week","Maak een schema","Ik ben moe","Hoe val ik af?"].map(q=>(
                <button key={q} onClick={()=>openFinnWith(q)} style={{padding:"12px 14px",borderRadius:14,border:"1px solid #1C1C1C",background:"#141414",color:"#888",fontSize:12,cursor:"pointer",fontWeight:600,textAlign:"left"}}>{q}</button>
              ))}
            </div>
          </div>
          <button onClick={()=>openFinnWith(null)} style={{width:"100%",padding:16,borderRadius:16,border:"none",cursor:"pointer",background:ORANGE,color:"#fff",fontSize:15,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",gap:12}}>
            <FinnImg size={32}/>Chat met Finn
          </button>
        </div>
      )}

      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"rgba(13,13,13,0.97)",borderTop:"1px solid #1C1C1C",display:"flex",zIndex:20,backdropFilter:"blur(24px)"}}>
        {[
          {id:"Home",svg:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>},
          {id:"Training",svg:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M6 4v16M18 4v16M2 8h4M18 8h4M2 16h4M18 16h4"/></svg>},
          {id:"Voortgang",svg:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>},
          {id:"Voeding",svg:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 2C8 2 4 6 4 10c0 5.25 8 12 8 12s8-6.75 8-12c0-4-4-8-8-8z"/></svg>},
          {id:"Coach",svg:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>},
        ].map(t=>(
          <button key={t.id} onClick={()=>{
            if(t.id==="Training"&&tab==="Training"&&!selectingMuscles){
              setSelectingMuscles(true);setSession(null);setTargetMuscles([]);
            } else {
              setTab(t.id);
            }
          }} style={{flex:1,padding:"12px 4px 10px",border:"none",background:"none",cursor:"pointer",color:tab===t.id?(t.id==="Coach"?ORANGE:LIME):"#333",display:"flex",flexDirection:"column",alignItems:"center",gap:4,transition:"color .15s"}}>
            {t.svg}
            <div style={{fontSize:9,fontWeight:700,letterSpacing:0.5}}>{t.id.toUpperCase()}</div>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
