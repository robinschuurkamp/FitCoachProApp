function fmtDate(d){const dd=String(d.getDate()).padStart(2,'0'),mm=String(d.getMonth()+1).padStart(2,'0');return`${dd}/${mm}/${d.getFullYear()}`;}

async function resizeImg(file){return new Promise(res=>{const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>{const max=220,ratio=Math.min(max/img.width,max/img.height),c=document.createElement('canvas');c.width=img.width*ratio;c.height=img.height*ratio;c.getContext('2d').drawImage(img,0,0,c.width,c.height);res(c.toDataURL('image/jpeg',0.75));};img.src=e.target.result;};r.readAsDataURL(file);});}
async function ai(prompt){
  try{
    const controller=new AbortController();
    const timeout=setTimeout(()=>controller.abort(),15000);
    const r=await fetch(WORKER,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-5",max_tokens:800,messages:[{role:"user",content:prompt}]}),
      signal:controller.signal
    });
    clearTimeout(timeout);
    if(!r.ok){console.error("Worker error:",r.status,r.statusText);return"Roan is even niet beschikbaar ("+r.status+"). Probeer het opnieuw.";}
    const d=await r.json();
    console.log("Worker response:",JSON.stringify(d).slice(0,200));
    // Support both Anthropic format {content:[{text}]} and direct text
    if(d.content?.[0]?.text)return d.content[0].text;
    if(d.text)return d.text;
    if(d.response)return d.response;
    if(d.result)return d.result;
    if(typeof d==="string")return d;
    console.error("Unknown response format:",d);
    return"Roan heeft geen antwoord. Probeer het opnieuw.";
  }catch(e){
    if(e.name==="AbortError")return"Roan reageert te langzaam. Probeer het opnieuw.";
    return"Verbindingsfout. Controleer je internet en probeer opnieuw.";
  }
}

function speak(txt){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(txt);
  u.lang="nl-NL";u.rate=1.0;u.pitch=1.0;
  const voices=window.speechSynthesis.getVoices();
  const nl=voices.find(v=>v.lang.startsWith("nl"))||voices[0];
  if(nl)u.voice=nl;
  window.speechSynthesis.speak(u);
}
function startListening(onResult,onEnd){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return null;
  const r=new SR();r.lang="nl-NL";r.continuous=false;r.interimResults=false;
  r.onresult=e=>{const t=e.results[0][0].transcript.toLowerCase().trim();onResult(t);};
  r.onend=()=>{if(onEnd)onEnd();};r.onerror=()=>{if(onEnd)onEnd();};r.start();return r;
}

function adjustForGoal(exercises,goal,sportType){
  if(!goal||sportType==="hiit"||sportType==="cardio")return exercises;
  return exercises.map(ex=>{
    const e={...ex};
    if(goal==="afvallen"){
      e.reps=typeof e.reps==="string"&&e.reps.includes("-")?e.reps.split("-").map((n,i)=>i===0?parseInt(n)+2:parseInt(n)+4).join("-"):e.reps;
      e.weights=e.weights.map(w=>w>0?Math.max(0,Math.round(w*0.8)):0);
      e.restSecs=Math.min(45,e.restSecs||60);
    } else if(goal==="spiermassa"){
      e.reps=typeof e.reps==="string"&&e.reps.includes("-")?e.reps.split("-").map(n=>Math.max(4,parseInt(n)-2)).join("-"):e.reps;
      e.weights=e.weights.map(w=>w>0?Math.round(w*1.05):0);
      e.restSecs=Math.min(90,Math.max(60,e.restSecs||60));
    } else if(goal==="fitter"){
      e.restSecs=Math.min(45,e.restSecs||60);
    }
    return e;
  });
}

function buildSession(muscles,log,profile){
  const stype=profile?.sportType||"kracht",epref=profile?.equipmentPref||"mixed",level=profile?.level||"beginner",goal=profile?.goal||"fitter",age=parseInt(profile?.age)||30;
  const diffs=LS.get("fitcoach_difficulty")||{};
  const machineEx=["Leg Press","Leg Extension","Leg Curl","Lat Pulldown","Seated Cable Row","Cable Fly","Triceps Pushdown","Face Pulls"];
  const dumbEx=["Incline Dumbbell Press","Lateral Raises","Hammer Curl","Incline Dumbbell Curl","Concentration Curl","Arnold Press"];
  const seniorAvoid=["Deadlift","Squat","Skull Crushers","Nordic Curl","Dragon Flag","Clean and Press","Thruster"];
  const exercises=[];
  muscles.forEach(muscle=>{
    const variants=ALL_WV[muscle]||WV[muscle]||WV["full body"];if(!variants)return;
    const prevCount=log.filter(e=>(e.targetMuscles||[]).includes(muscle)).length;
    const variant=variants[prevCount%variants.length]||variants[0];
    const last=log.find(e=>(e.targetMuscles||[]).includes(muscle));
    const lastMap={};if(last)last.exercises.forEach(e=>{lastMap[e.name]=e;});
    let filtered=[...variant];
    if(stype==="kracht"||stype==="gemixed"){if(epref==="machines"){const m=variant.filter(ex=>machineEx.includes(ex.name));if(m.length>=2)filtered=m;}else if(epref==="dumbbells"){const d=variant.filter(ex=>dumbEx.includes(ex.name));if(d.length>=2)filtered=d;}}
    if(age>=60){filtered=filtered.filter(ex=>!seniorAvoid.includes(ex.name));}
    if(level==="beginner"||age>=65){const compounds=filtered.filter(e=>e.compound).slice(0,2);const isolatie=filtered.filter(e=>!e.compound).slice(0,2);filtered=[...compounds,...isolatie];}
    else if(level==="gemiddeld"){const compounds=filtered.filter(e=>e.compound).slice(0,2);const isolatie=filtered.filter(e=>!e.compound).slice(0,3);filtered=[...compounds,...isolatie];}
    else{const compounds=filtered.filter(e=>e.compound).slice(0,2);const isolatie=filtered.filter(e=>!e.compound).slice(0,4);filtered=[...compounds,...isolatie];}
    filtered.forEach(ex=>{
      if(!exercises.find(e=>e.name===ex.name)){
        const db=EX_DB[ex.name]||{},unit=db.unit||"kg",prevEx=lastMap[ex.name];
        let weights=prevEx?[...prevEx.weights]:[...ex.weights];
        if(goal==="spiermassa"&&prevEx&&stype==="kracht"){const maxPrev=Math.max(0,...prevEx.weights.filter(w=>w>0));if(maxPrev>0){const increment=maxPrev<20?1.25:maxPrev<50?2.5:5;weights=weights.map(w=>w>0?Math.round((w+increment)/2.5)*2.5:w);}}
        if(age>=60){weights=weights.map(w=>w>0?Math.round(w*0.7/2.5)*2.5:w);}
        const diff=diffs[muscle];
        if(diff==="makkelijk"){weights=weights.map(w=>w>0?Math.round((w*1.075)/2.5)*2.5:w);}
        if(diff==="zwaar"){weights=weights.map(w=>w>0?Math.round((w*0.9)/2.5)*2.5:w);}
        exercises.push({...ex,weights,note:"",saved:false,unit,info:db.info||"",yt:db.yt||"",prevWeights:prevEx?.weights||null,prevNote:prevEx?.note||""});
      }
    });
  });
  const adjusted=adjustForGoal(exercises,goal,stype);
  if(age>=60){adjusted.forEach(e=>{if(!e.restSecs)e.restSecs=90;});}
  if(goal==="afvallen"&&(stype==="kracht"||stype==="gemixed")){const cf=CARDIO_FINISH[Math.floor(Math.random()*CARDIO_FINISH.length)];const db=EX_DB[cf.name]||{};adjusted.push({...cf,note:"",saved:false,unit:cf.unit||"sec",info:db.info||"",yt:db.yt||"",prevWeights:null,prevNote:"",isCardioFinish:true});}
  return adjusted;
}

function LineChart({data,height=120}){
  if(!data||data.length<2)return<div style={{height,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"#444"}}>Meer metingen nodig</div>;
  const vals=data.map(d=>d.w),mn=Math.min(...vals)-0.5,mx=Math.max(...vals)+0.5,rng=mx-mn,W=320,H=height-24;
  const pts=data.map((d,i)=>({x:20+(i/(data.length-1))*(W-40),y:H-((d.w-mn)/rng*H)+4,w:d.w,date:d.date}));
  const pd="M"+pts.map((p,i)=>{if(i===0)return`${p.x},${p.y}`;const pv=pts[i-1],cx=(pv.x+p.x)/2;return`C${cx},${pv.y} ${cx},${p.y} ${p.x},${p.y}`;}).join(" ");
  return(<svg viewBox={`0 0 ${W} ${height}`} style={{width:"100%",height}}><defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={LIME} stopOpacity="0.25"/><stop offset="100%" stopColor={LIME} stopOpacity="0"/></linearGradient></defs><path d={pd+` L${pts[pts.length-1].x},${H+4} L${pts[0].x},${H+4} Z`} fill="url(#lg)"/><path d={pd} fill="none" stroke={LIME} strokeWidth="2.5" strokeLinecap="round"/>{pts.map((p,i)=>(<g key={i}><circle cx={p.x} cy={p.y} r={i===pts.length-1?5:2.5} fill={i===pts.length-1?LIME:"#333"} stroke={i===pts.length-1?"#0D0D0D":"none"} strokeWidth={2}/>{(i===0||i===pts.length-1||data.length<=6)&&<text x={p.x} y={height-2} textAnchor="middle" fontSize="8" fill="#555">{p.date.slice(0,5)}</text>}{i===pts.length-1&&<text x={p.x} y={p.y-10} textAnchor="middle" fontSize="9" fill={LIME} fontWeight="700">{p.w}kg</text>}</g>))}</svg>);
}

function VolumeBarChart({log}){
  // Bouw data van afgelopen 8 weken
  const weeks=[];
  for(let w=7;w>=0;w--){
    const weekStart=new Date(TODAY);
    weekStart.setDate(TODAY.getDate()-(TODAY.getDay()===0?6:TODAY.getDay()-1)-w*7);
    weekStart.setHours(0,0,0,0);
    const weekEnd=new Date(weekStart);weekEnd.setDate(weekStart.getDate()+7);
    const count=log.filter(e=>{try{const d=parseDate(e.date);return d>=weekStart&&d<weekEnd;}catch{return false;}}).length;
    const label=w===0?"Nu":w===1?"Vorig":`-${w}w`;
    weeks.push({count,label,isCurrentWeek:w===0});
  }
  const max=Math.max(...weeks.map(w=>w.count),1);
  return(
    <div>
      <div style={{display:"flex",gap:5,alignItems:"flex-end",height:70,marginBottom:6}}>
        {weeks.map((w,i)=>(
          <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
            <div style={{width:"100%",minHeight:2,height:w.count>0?Math.max(4,Math.round((w.count/max)*52)):2,background:w.isCurrentWeek?LIME:w.count>0?"rgba(200,241,56,0.3)":"#1C1C1C",borderRadius:"3px 3px 0 0",transition:"height .5s ease"}}/>
            {w.count>0&&<div style={{fontSize:8,color:w.isCurrentWeek?LIME:"#555",fontWeight:700}}>{w.count}x</div>}
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:5}}>
        {weeks.map((w,i)=><div key={i} style={{flex:1,textAlign:"center",fontSize:8,color:w.isCurrentWeek?"#fff":"#333",fontWeight:w.isCurrentWeek?700:400}}>{w.label}</div>)}
      </div>
    </div>
  );
}

function FinnPopup({onClose,pendingMsg,profile,log,food,onNavigate,onGenerateMenu,onGenerateShopping}){
  const [input,setInput]=useState("");
  const [msgs,setMsgs]=useState([{r:"a",t:`Hey ${profile?.name||""}! Roan hier. Ik kan je coachen, een weekmenu maken of je door de app sturen. Wat wil je?`}]);
  const [loading,setLoading]=useState(false);
  const [currentEmotion,setCurrentEmotion]=useState("cool");
  const endRef=useRef(null);
  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"});},[msgs,loading]);
  useEffect(()=>{if(pendingMsg)doSend(pendingMsg);},[]);
  function getCtx(){const lw=log.slice(0,5).map(e=>`${e.day}: ${e.workout}`).join(", ")||"Geen trainingen";const tf=food[TODAY_KEY]||{};const tk=MEALS.reduce((s,m)=>s+(tf[m]||[]).reduce((a,i)=>a+(i.kcal||0),0),0);return`Naam:${profile?.name} Doel:${profile?.goal} Fase:${profile?.fase||"onderhoud"} Sport:${profile?.sportType||"kracht"} Level:${profile?.level||"beginner"} Gewicht:${profile?.weight}kg Trainingen:${lw} Vandaag:${tk}kcal`;}
  function detectAndExecute(txt){
    const t=txt.toLowerCase();
    if((t.includes("weekmenu")||t.includes("maak een menu")||t.includes("menu maken"))&&onGenerateMenu){
      setMsgs(p=>[...p,{r:"a",t:"Ik maak nu een weekmenu voor je op basis van jouw doelen. Even geduld..."}]);
      setTimeout(()=>{onGenerateMenu();onNavigate("Voeding");onClose();},1200);
      return true;
    }
    if((t.includes("boodschappen")||t.includes("boodschappenlijst"))&&onGenerateShopping){
      setMsgs(p=>[...p,{r:"a",t:"Ik open je boodschappenlijst en genereer die voor je. Even geduld..."}]);
      setTimeout(()=>{onGenerateShopping();onNavigate("Voeding");onClose();},1200);
      return true;
    }
    if(t.includes("training")&&!t.includes("laatste")&&!t.includes("vorige")){
      setMsgs(p=>[...p,{r:"a",t:"Ik stuur je naar Training. Let's go!"}]);
      setTimeout(()=>{onNavigate("Training");onClose();},1000);
      return true;
    }
    if(t.includes("voeding")||t.includes("eten")||t.includes("dieet")){
      setMsgs(p=>[...p,{r:"a",t:"Ik stuur je naar Voeding."}]);
      setTimeout(()=>{onNavigate("Voeding");onClose();},1000);
      return true;
    }
    if(t.includes("voortgang")||t.includes("gewicht")||t.includes("progressie")||t.includes("resultaat")){

function AuthScreen({onAuth}){

// ── STREAK HELPER ─────────────────────────────────────────────
function calcStreak(log){
  if(!log||!log.length)return 0;
  let streak=0,check=new Date(TODAY);
  const logDates=new Set(log.map(e=>e.date));
  for(let i=0;i<60;i++){
    const key=fmtDate(check);
    if(logDates.has(key)){streak++;}
    else if(i>0){break;}
    check=new Date(check.getTime()-86400000);
  }
  return streak;
}

// ── PR HELPER ─────────────────────────────────────────────────
function updatePRs(prData,exercises){
  const updated={...prData};
  exercises.forEach(ex=>{
    if(!ex.name||!ex.weights||!ex.unit)return;
    const maxW=Math.max(0,...ex.weights.filter(w=>w>0));
    if(maxW<=0)return;
    const key=ex.name;
    if(!updated[key]||maxW>updated[key].weight){
      updated[key]={weight:maxW,unit:ex.unit,date:TODAY_KEY};
    }
  });
  return updated;
}

    // Timeout fallback: stel authChecked in na 4 seconden als Supabase niet reageert
    const fallback=setTimeout(()=>setAuthChecked(true),4000);
    sb.auth.getSession().then(({data:{session}})=>{
      clearTimeout(fallback);
      if(session?.user){setSbUser(session.user);loadFromSupabase(session.user.id);}

  const [measSubTab,setMeasSubTab]=useState("gewicht"); // gewicht | lichaam

  // Water helpers
  const todayWater=waterLog[TODAY_KEY]||0;
  const WATER_GOAL=8;
  function addWater(n=1){const v=Math.min(WATER_GOAL,todayWater+n);const u={...waterLog,[TODAY_KEY]:v};setWaterLog(u);LS.set("fitcoach_water",u);}
  function removeWater(){const v=Math.max(0,todayWater-1);const u={...waterLog,[TODAY_KEY]:v};setWaterLog(u);LS.set("fitcoach_water",u);}

  // Body measurements helpers
  function saveMeas(){const w=parseFloat(newMeas.waist),ch=parseFloat(newMeas.chest),h=parseFloat(newMeas.hips);if(!w&&!ch&&!h)return;const entry={date:TODAY_KEY,waist:w||null,chest:ch||null,hips:h||null,id:Date.now()};const u=[entry,...bodyMeas].slice(0,50);setBodyMeas(u);LS.set("fitcoach_body_meas",u);setNewMeas({waist:"",chest:"",hips:""});}

  const streak=calcStreak(log);
  const sportType=profile?.sportType||"kracht";
  const fase=profile?.fase||"onderhoud",faseObj=FASE_OPTIES.find(f=>f.v===fase)||FASE_OPTIES[2];
  const curW=wLog.length>0?wLog[wLog.length-1].w:parseFloat(profile?.weight)||80;
  const goalW=parseFloat(profile?.goalWeight)||75,startW=parseFloat(profile?.weight)||80;
  const pct=Math.max(0,Math.min(100,Math.round((1-(curW-goalW)/(startW-goalW))*100)));
  const kcalT=Math.round(curW*faseObj.mul),protT=fase.includes("bulken")?Math.round(curW*2.2):Math.round(curW*2),fatT=Math.round(curW*0.9);
  const todayFood=food[TODAY_KEY]||{Ochtend:[],Middag:[],Avond:[],Snack:[]};
  const totals=MEALS.reduce((a,m)=>{(todayFood[m]||[]).forEach(i=>{a.kcal+=(i.kcal||0);a.prot+=(i.prot||0);a.carbs+=(i.carbs||0);a.fat+=(i.fat||0);});return a;},{kcal:0,prot:0,carbs:0,fat:0});
  const carbsT=Math.max(0,Math.round((kcalT-protT*4-totals.fat*9)/4));
  const selFood=food[foodDate]||{Ochtend:[],Middag:[],Avond:[],Snack:[]};
  const selTotals=MEALS.reduce((a,m)=>{(selFood[m]||[]).forEach(i=>{a.kcal+=(i.kcal||0);a.prot+=(i.prot||0);a.carbs+=(i.carbs||0);a.fat+=(i.fat||0);});return a;},{kcal:0,prot:0,carbs:0,fat:0});

  const splits=sportType==="hiit"?SPLITS_HIIT:sportType==="cardio"?SPLITS_CARDIO:sportType==="gemixed"?[...SPLITS_KRACHT,...SPLITS_HIIT,...SPLITS_CARDIO]:SPLITS_KRACHT;
  const showMuscleGroups=sportType==="kracht"||sportType==="gemixed";
  const weekNum=Math.floor(TODAY.getTime()/(7*24*60*60*1000));
  const dayPool=FINN_MSGS[TODAY.getDay()]||FINN_MSGS[1];
  let finnBericht=dayPool[weekNum%dayPool.length](profile?.name||"");
  if(profile){try{
    const yk=fmtDate(new Date(TODAY.getTime()-86400000)),yLog=log.find(e=>e.date===yk);
    if(log[0]){const d=parseDate(log[0].date),since=Math.floor((TODAY-d)/86400000);
      if(since>=3)finnBericht=`${profile.name}, het is al ${since} dagen geleden. Je lichaam mist de training! Vandaag kom je terug.`;
      else if(yLog)finnBericht=`Super gedaan gisteren ${profile.name}! Die ${yLog.workout} training was geweldig. Vandaag ook?`;
    }
    if(streak>=3)finnBericht=`${streak} dagen op rij ${profile.name}! Je bent on fire. Houd het vol!`;
  }catch(e){}}

  useEffect(()=>{if(profile){LS.set("fitcoach_profile",profile);syncToSupabase(profile,null,null);}},[profile]);
  useEffect(()=>{LS.set("fitcoach_log",log);if(log.length)syncToSupabase(null,log,null);},[log]);
  useEffect(()=>{LS.set("fitcoach_wlog",wLog);},[wLog]);
  useEffect(()=>{LS.set("fitcoach_food",food);syncToSupabase(null,null,food);},[food]);
  useEffect(()=>{if(!localStorage.getItem('fcp_installed')){localStorage.setItem('fcp_installed','true');setTimeout(()=>{const m=document.getElementById('installModal');if(m)m.classList.add('show');},1500);}},[]);

  function openFinnWith(msg){setPendingMsg(msg||null);setShowFinn(true);}
  const swapMemory=LS.get("fitcoach_swaps")||{};
  const coachLevel=profile?.coachLevel||"regelmatig";

  function startSess(muscles,custom){
    if(custom){setSession(custom.exercises.map(e=>({...e,unit:"kg",weights:Array(parseInt(e.sets)||3).fill(parseFloat(e.weights)||0),note:"",saved:false,info:EX_DB[e.name]?.info||"",yt:EX_DB[e.name]?.yt||"",prevWeights:null,prevNote:""})));setTargetMuscles([custom.name]);}
    else{if(!muscles.length)return;setSession(buildSession(muscles,log,profile));setTargetMuscles(muscles);}
    setSelectingMuscles(false);setNoteAdvice({});setSavedFlash(null);
    if(voiceOn&&log.length>0){setTimeout(async()=>{try{const lastSame=log.find(e=>(e.targetMuscles||[]).some(m=>muscles.includes(m)));if(lastSame){const top=lastSame.exercises.slice(0,2).map(e=>{const maxW=e.weights?Math.max(0,...e.weights.filter(w=>w>0)):0;return maxW>0?`${e.name} ${maxW}kg`:e.name;}).join(", ");const txt=await ai(`Roan geeft een korte gesproken briefing voor de training. Vorige keer: ${top}. Geef een motiverende aanwijzing van MAX 2 zinnen. Noem een concreet gewicht of doel voor vandaag. Nederlands.`);speak(txt);}}catch(e){}},500);}
  }
  function setW2(ei,si,v){setSession(p=>p.map((e,i)=>i!==ei?e:{...e,weights:e.weights.map((w,j)=>j===si?v:w)}));}
  function setN(ei,v){setSession(p=>p.map((e,i)=>i!==ei?e:{...e,note:v}));}
  function markSave(ei){setSession(p=>p.map((e,i)=>i!==ei?e:{...e,saved:true}));setSavedFlash(ei);setTimeout(()=>setSavedFlash(null),1500);}
  function removeExercise(ei){setSession(p=>p.filter((_,i)=>i!==ei));}
  async function submitNote(ei){const ex=session[ei];if(!ex.note.trim())return;if(coachLevel==="weinig")return;setNoteLoading(p=>({...p,[ei]:true}));const intensity=coachLevel==="personal"?"Geef uitgebreid technisch advies, specifieke verbeterpunten en motivatie. Max 4 zinnen.":"Motiveer kort en persoonlijk. Max 2 zinnen.";const txt=await ai(`Roan coacht ${profile?.name} (${profile?.level||"beginner"}, ${profile?.age||30} jaar, doel: ${profile?.goal}). Oefening: ${ex.name}. Notitie: "${ex.note}". ${intensity} NL.`);setNoteAdvice(p=>({...p,[ei]:{text:txt}}));setNoteLoading(p=>({...p,[ei]:false}));}
  function wisselOefening(ei,newName){const db=EX_DB[newName]||{};const oldName=session[ei].name;const swaps=LS.get("fitcoach_swaps")||{};swaps[oldName]=newName;LS.set("fitcoach_swaps",swaps);setSession(p=>p.map((e,i)=>i!==ei?e:{...e,name:newName,unit:db.unit||"kg",info:db.info||"",yt:db.yt||"",note:"",saved:false}));setWisselIndex(null);}

  function saveWorkout(){
    if(!session?.length)return;
    const dateObj=parseDate(trainDate),dayName=DAYS[dateObj.getDay()];
    const entry={date:trainDate,day:dayName,workout:targetMuscles.map(m=>muscleLabel(m)).join(" + "),exercises:session.map(e=>({name:e.name,weights:[...e.weights],reps:e.reps,note:e.note,unit:e.unit||"kg"})),targetMuscles,id:Date.now()};
    const updated=[entry,...log].slice(0,100);
    setLog(updated);LS.set("fitcoach_log",updated);
    // Update PRs
    const newPRs=updatePRs(prData,session);setPrData(newPRs);LS.set("fitcoach_prs",newPRs);
    setSelectingMuscles(true);setSession(null);setTargetMuscles([]);
    setFeedbackModal({entry,workout:entry.workout});setFeedbackReply("");
  }
  function deleteWorkout(id){const u=log.filter(e=>e.id!==id);setLog(u);LS.set("fitcoach_log",u);}
  function deleteWeight(id){const u=wLog.filter(e=>e.id!==id);setWLog(u);LS.set("fitcoach_wlog",u);}

  async function addFood(meal,quickItem){
    const txt=quickItem||foodInput[meal].trim();if(!txt)return;
    if(!quickItem)setFoodLoading(p=>({...p,[meal]:true}));
    const raw=await ai(`Voedingswaarden voor: "${txt}". ALLEEN JSON: {"desc":"${txt}","kcal":0,"prot":0,"carbs":0,"fat":0}.`);
    try{const pp=JSON.parse(raw.replace(/```json|```/g,"").trim());const item={desc:pp.desc||txt,kcal:pp.kcal||0,prot:pp.prot||0,carbs:pp.carbs||0,fat:pp.fat||0};const day=food[foodDate]||{Ochtend:[],Middag:[],Avond:[],Snack:[]};const uFood={...food,[foodDate]:{...day,[meal]:[...(day[meal]||[]),item]}};setFood(uFood);LS.set("fitcoach_food",uFood);const ck="fitcoach_custom_foods";const custom=LS.get(ck)||{Ochtend:[],Middag:[],Avond:[],Snack:[]};if(custom[meal]&&!custom[meal].includes(txt)){custom[meal]=[txt,...custom[meal]].slice(0,6);LS.set(ck,custom);}if(!quickItem)setFoodInput(p=>({...p,[meal]:""}))}catch(e){}
    if(!quickItem)setFoodLoading(p=>({...p,[meal]:false}));
  }
  function remFood(meal,idx){const day=food[foodDate]||{Ochtend:[],Middag:[],Avond:[],Snack:[]};const u={...food,[foodDate]:{...day,[meal]:(day[meal]||[]).filter((_,i)=>i!==idx)}};setFood(u);LS.set("fitcoach_food",u);}
  function addWeight(){const w=parseFloat(newW);if(!w||w<40||w>250)return;const u=[...wLog,{date:TODAY_KEY,w,id:Date.now()}];setWLog(u);LS.set("fitcoach_wlog",u);setNewW("");}
  async function getRecipe(){setLoadingRecipe(true);setRecipe("");const txt=await ai(`Gezond recept voor ${profile?.name}, fase: ${fase}, niveau: ${profile?.level||"beginner"}. NL, max 250 woorden.`);setRecipe(txt);setLoadingRecipe(false);}

  if(!authChecked)return<div style={{minHeight:"100vh",background:"#0D0D0D",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12}}><div style={{width:40,height:40,border:`3px solid #1C1C1C`,borderTop:`3px solid ${LIME}`,borderRadius:"50%",animation:"spin 1s linear infinite"}}/><div style={{fontSize:13,color:"#666"}}>Laden...</div><style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style></div>;
  if(!sbUser)return<AuthScreen onAuth={user=>{setSbUser(user);loadFromSupabase(user.id);}}/>;
  if(!profile)return<Onboarding onComplete={p=>setProfile(p)}/>;

  return(
    <div style={{background:"#0D0D0D",minHeight:"100vh",maxWidth:480,margin:"0 auto",paddingBottom:80}}>
      {infoEx&&<ExInfo ex={infoEx} onClose={()=>setInfoEx(null)}/>}
      {showSettings&&<SettingsModal profile={profile} onSave={p=>{setProfile(p);setShowSettings(false);}} onClose={()=>setShowSettings(false)} onLogout={async()=>{await sb.auth.signOut();setSbUser(null);setShowSettings(false);}}/>}
      {showWhatsNew&&<WhatsNewModal onClose={()=>{setShowWhatsNew(false);LS.set("fitcoach_seen_version",APP_VERSION);}}/>}
      {showFinn&&<FinnPopup 
        onClose={()=>{setShowFinn(false);setPendingMsg(null);}} 
        pendingMsg={pendingMsg} 
        profile={profile} 
        log={log} 
        food={food}
        onNavigate={(t)=>{setTab(t);}}
        onGenerateMenu={async()=>{
          setWeekMenuLoading(true);
          const prefs=foodPrefs.likes?`Lekker: ${foodPrefs.likes}.`:"";
          const avoid=foodPrefs.dislikes?`Niet: ${foodPrefs.dislikes}.`:"";
          const txt=await ai(`Weekmenu (ma t/m zo) voor ${profile.name}. Doel: ${profile.goal}. Fase: ${profile.fase||"onderhoud"}. ${prefs} ${avoid} Elke dag ander eiwit. Vis max 1x. NL. ALLEEN JSON: {"ma":{"ontbijt":"...","lunch":"...","diner":"..."},...}`);
          try{const m=JSON.parse(txt.replace(/\`\`\`json|\`\`\`/g,"").trim());setWeekMenu(m);LS.set("fitcoach_weekmenu",m);}catch(e){}
          setWeekMenuLoading(false);
          setFoodSubTab("weekmenu");
        }}
        onGenerateShopping={async()=>{
          setGenShoppingLoading(true);
          const menu=weekMenu?JSON.stringify(weekMenu):`gezonde maaltijden voor ${profile.goal}`;
          const txt=await ai(`Boodschappenlijst voor 1 persoon: ${menu}. Geef hoeveelheden. ALLEEN JSON array: ["500g kipfilet",...]. Max 25 items.`);
          try{const list=JSON.parse(txt.replace(/\`\`\`json|\`\`\`/g,"").trim());setShoppingList(list.map(l=>({name:l,checked:false})));LS.set("fitcoach_shopping",list.map(l=>({name:l,checked:false})));}catch(e){}
          setGenShoppingLoading(false);
          setFoodSubTab("boodschappen");
        }}
      />}
      {savedBanner&&<div style={{position:"fixed",top:0,left:"50%",transform:"translateX(-50%)",zIndex:100,background:LIME,color:"#000",padding:"14px 28px",borderRadius:"0 0 20px 20px",fontWeight:800,fontSize:14,maxWidth:480,width:"100%",textAlign:"center"}}>Training opgeslagen!</div>}

      {/* FEEDBACK MODAL */}
      {feedbackModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",zIndex:110,display:"flex",alignItems:"flex-end"}}>
          <div style={{background:"#141414",borderRadius:"24px 24px 0 0",width:"100%",maxWidth:480,margin:"0 auto",padding:"28px 24px 40px",animation:"slideUp .3s cubic-bezier(.16,1,.3,1)"}}>
            {!feedbackReply?(
              <>
                <div style={{display:"flex",gap:12,alignItems:"center",marginBottom:20}}><FinnImg size={44}/><div><div style={{fontSize:16,fontWeight:900,marginBottom:2}}>Training klaar!</div><div style={{fontSize:12,color:"#555"}}>{feedbackModal.workout}</div></div></div>
                <div style={{fontSize:14,color:"#aaa",marginBottom:20,lineHeight:1.6}}>Hoe ging de training vandaag?</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:20}}>
                  {[{icon:"😅",label:"Zwaar",v:"zwaar"},{icon:"👍",label:"Goed",v:"goed"},{icon:"💪",label:"Te makkelijk",v:"makkelijk"}].map(opt=>(
                    <button key={opt.v} onClick={async()=>{
                      setFeedbackLoading(true);
                      const diffKey="fitcoach_difficulty";const diffs=LS.get(diffKey)||{};
                      (feedbackModal.entry.targetMuscles||[]).forEach(m=>{diffs[m]=opt.v;});LS.set(diffKey,diffs);
                      const ex=feedbackModal.entry.exercises.slice(0,3).map(e=>{const maxW=Math.max(0,...(e.weights||[]).filter(w=>w>0));return maxW>0?`${e.name} ${maxW}${e.unit||"kg"}`:e.name;}).join(", ");
                      const prompt=`Roan geeft KORTE motiverende feedback (2-3 zinnen) na een ${opt.v} training. Gebruiker: ${profile.name}, doel: ${profile.goal}, niveau: ${profile.level}. Training: ${feedbackModal.workout}. Oefeningen: ${ex}. Beoordeling: ${opt.v}. ${opt.v==="zwaar"?"Geef herstel-advies.":opt.v==="makkelijk"?"Stel voor om gewicht/sets te verhogen.":"Moedig aan en geef één specifieke tip."} Sluit af met wat je aanraadt voor de volgende sessie. NL.`;
                      const reply=await ai(prompt);setFeedbackReply(reply);setFeedbackLoading(false);
                    }} style={{padding:"16px 8px",borderRadius:14,border:"1px solid #1C1C1C",background:"#111",cursor:"pointer",textAlign:"center"}}>
                      <div style={{fontSize:28,marginBottom:6}}>{opt.icon}</div>
                      <div style={{fontSize:12,fontWeight:700,color:"#888"}}>{opt.label}</div>
                    </button>
                  ))}
                </div>
                {feedbackLoading&&<div style={{textAlign:"center",padding:"16px 0",color:"#555",fontSize:13}}>Roan denkt na...</div>}
                <button onClick={()=>{setFeedbackModal(null);setTab("Home");}} style={{width:"100%",padding:"13px",borderRadius:12,border:"1px solid #1C1C1C",background:"none",color:"#444",fontSize:13,cursor:"pointer"}}>Overslaan</button>
              </>
            ):(
              <>
                <div style={{display:"flex",gap:12,alignItems:"center",marginBottom:20}}><FinnImg size={44} emotion="victory"/><div><div style={{fontSize:14,fontWeight:900}}>Roan's feedback</div><div style={{fontSize:11,color:"#555"}}>{feedbackModal.workout}</div></div></div>
                <div style={{fontSize:14,lineHeight:1.8,color:"#ccc",marginBottom:24,padding:"16px",background:"#111",borderRadius:14,border:"1px solid #1C1C1C"}}>{feedbackReply}</div>
                <button onClick={()=>{setFeedbackModal(null);setSavedBanner(true);setTimeout(()=>setSavedBanner(false),2500);setTab("Home");}} style={{width:"100%",padding:"16px",borderRadius:14,border:"none",background:LIME,color:"#000",fontSize:15,fontWeight:900,cursor:"pointer"}}>Naar Home</button>
              </>
            )}
          </div>
        </div>
      )}

      {/* HOME TAB */}
      {tab==="Home"&&(
        <div>
          <div style={{position:"relative",height:300,overflow:"hidden"}}>
            <img src={P.hero} alt="" style={{width:"100%",height:"100%",objectFit:"cover",objectPosition:"center top"}}/>
            <div style={{position:"absolute",inset:0,background:"linear-gradient(160deg,rgba(0,0,0,0.2) 0%,rgba(13,13,13,0.98) 85%)"}}/>
            <button onClick={()=>setShowSettings(true)} style={{position:"absolute",top:16,right:16,width:42,height:42,borderRadius:"50%",background:"rgba(0,0,0,0.5)",border:"1px solid rgba(255,255,255,0.1)",backdropFilter:"blur(8px)",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",overflow:"hidden"}}>
              {profile.fotoUrl?<img src={profile.fotoUrl} alt="profiel" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<span style={{fontSize:14,color:"#fff"}}>⚙</span>}
            </button>
            <div style={{position:"absolute",bottom:0,left:0,right:0,padding:"0 20px 24px"}}>
              <div style={{...S.lbl,color:"rgba(200,241,56,0.8)",marginBottom:6}}>{DAY_NL.toUpperCase()} · {sportType.toUpperCase()}</div>
              <div style={{fontSize:26,fontWeight:900,letterSpacing:-0.5,marginBottom:4}}>Goedendag, {profile.name}</div>
              <div style={{fontSize:13,color:"rgba(255,255,255,0.4)"}}>Doel: {startW}→{goalW}kg · {pct}% behaald</div>
            </div>
          </div>
          <div style={{padding:"0 16px"}}>
            {/* Roan bericht */}
            <div style={{display:"flex",gap:12,alignItems:"flex-start",background:"rgba(255,107,43,0.07)",border:"1px solid rgba(255,107,43,0.15)",borderRadius:16,padding:14,margin:"16px 0",transform:"translateY(-8px)"}}><FinnImg size={44}/><div><div style={{fontSize:11,color:ORANGE,fontWeight:700,marginBottom:3}}>Roan zegt</div><div style={{fontSize:13,color:"rgba(255,255,255,0.85)",lineHeight:1.6}}>{finnBericht}</div></div></div>

            {/* ── v1.6: Streak + Water rij ─────────────────────── */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
              {/* Streak */}
              <div style={{...S.card,padding:"14px 16px"}}>

                  {[...Array(7)].map((_,i)=>{
                    const d=new Date(TODAY.getTime()-i*86400000);

                    const hasLog=log.some(e=>e.date===key);
                    return<div key={i} style={{width:14,height:14,borderRadius:3,background:hasLog?"rgba(200,241,56,0.8)":"#1C1C1C",border:`1px solid ${hasLog?LIME:"#222"}`}}/>;
                  }).reverse()}
                </div>

                  ))}

              <div style={{background:"#1C1C1C",borderRadius:99,height:8,overflow:"hidden",marginBottom:10}}><div style={{width:`${pct}%`,height:8,background:`linear-gradient(90deg,${LIME},#A8D020)`,borderRadius:99,transition:"width .8s ease"}}/></div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#444"}}><span>Start: {startW}kg</span><span>Nu: {curW}kg</span><span>Doel: {goalW}kg</span></div>
            </div>

            {/* Stat blokjes */}

              </div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>{["Hoog eiwit ontbijt","Snelle lunch","Post-workout maaltijd","Laag carb diner"].map(s=><button key={s} onClick={async()=>{const txt=await ai(`Recept: ${s}. Voor ${profile.name}, fase: ${fase}. NL, max 120 woorden.`);const newR={id:Date.now(),text:txt,date:TODAY_KEY,tag:s};const u=[newR,...savedRecipes].slice(0,20);setSavedRecipes(u);LS.set("fitcoach_recipes",u);}} style={{padding:"6px 12px",borderRadius:20,border:"1px solid #222",background:"#111",color:"#666",fontSize:11,cursor:"pointer",fontWeight:600}}>{s}</button>)}</div>
              {savedRecipes.length===0?<div style={{...S.card,padding:20,textAlign:"center"}}><div style={{fontSize:12,color:"#444",marginBottom:4}}>Geen recepten opgeslagen</div></div>:savedRecipes.map(r=><div key={r.id} style={{...S.card,padding:16,marginBottom:8}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><div style={{display:"flex",gap:8,alignItems:"center"}}><div style={{fontSize:10,color:"#444"}}>{r.date}</div>{r.tag&&<div style={{fontSize:9,color:ORANGE,fontWeight:700,letterSpacing:1,textTransform:"uppercase"}}>{r.tag}</div>}</div><button onClick={()=>{const u=savedRecipes.filter(x=>x.id!==r.id);setSavedRecipes(u);LS.set("fitcoach_recipes",u);}} style={{background:"none",border:"none",color:"#333",fontSize:14,cursor:"pointer"}}>×</button></div><div style={{fontSize:12,lineHeight:1.7,color:"#bbb",whiteSpace:"pre-wrap"}}>{r.text}</div></div>)}
            </div>
          )}
        </div>
      )}

      {/* COACH TAB */}
      {tab==="Coach"&&(
        <div style={{padding:"24px 16px",display:"flex",flexDirection:"column",alignItems:"center"}}>
          <div style={{...S.lbl,color:LIME,marginBottom:4,alignSelf:"flex-start"}}>Jouw coach</div>
          <div style={{fontSize:32,fontWeight:900,letterSpacing:-1,marginBottom:24,alignSelf:"flex-start"}}>Meet Roan</div>
          <div style={{marginBottom:16,position:"relative",display:"flex",justifyContent:"center",flexDirection:"column",alignItems:"center"}}>
            <div style={{position:"relative"}}>
              <FinnImg size={200} emotion="cool"/>
              <div style={{position:"absolute",top:8,right:-10,background:LIME,borderRadius:99,padding:"4px 12px",fontSize:10,fontWeight:800,color:"#000"}}>Online</div>
            </div>
            <div style={{fontSize:28,fontWeight:900,letterSpacing:-1,color:"#fff",marginTop:8}}>Roan</div>
            <div style={{fontSize:13,color:"#555",marginTop:2}}>Jouw persoonlijke AI coach</div>
          </div>
          <div style={{...S.card,padding:16,marginBottom:16,width:"100%"}}>
            <div style={{display:"flex",gap:10,alignItems:"center"}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:LIME,flexShrink:0}}/>
              <div style={{fontSize:13,color:"#888",lineHeight:1.7}}>Ik ken jouw trainingen, voeding en doelen. Stel me een vraag of geef me een opdracht — ik voer het uit.</div>
            </div>
          </div>
          <div style={{width:"100%",marginBottom:16}}>
            <div style={{...S.lbl,marginBottom:12}}>Vraag Roan iets</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>{["Motiveer me!","Wat eten vandaag?","Analyseer mijn week","Maak een schema","Ik ben moe","Hoe val ik af?"].map(q=><button key={q} onClick={()=>openFinnWith(q)} style={{padding:"12px 14px",borderRadius:14,border:"1px solid #1C1C1C",background:"#141414",color:"#888",fontSize:12,cursor:"pointer",fontWeight:600,textAlign:"left"}}>{q}</button>)}</div>
          </div>
          <button onClick={()=>openFinnWith(null)} style={{width:"100%",padding:16,borderRadius:16,border:"none",cursor:"pointer",background:ORANGE,color:"#fff",fontSize:15,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",gap:12}}><FinnImg size={32}/>Chat met Roan</button>
        </div>
      )}

      {/* BOTTOM NAV */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"rgba(13,13,13,0.97)",borderTop:"1px solid #1C1C1C",display:"flex",zIndex:20,backdropFilter:"blur(24px)"}}>
        {[
          {id:"Home",svg:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>},
          {id:"Training",svg:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M6 4v16M18 4v16M2 8h4M18 8h4M2 16h4M18 16h4"/></svg>},
          {id:"Voortgang",svg:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>},
          {id:"Voeding",svg:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 2C8 2 4 6 4 10c0 5.25 8 12 8 12s8-6.75 8-12c0-4-4-8-8-8z"/></svg>},
          {id:"Coach",svg:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>},
        ].map(t=>(
          <button key={t.id} onClick={()=>{
            if(t.id==="Training"&&tab==="Training"&&!selectingMuscles){setSelectingMuscles(true);setSession(null);setTargetMuscles([]);}
            else{setTab(t.id);}
          }} style={{flex:1,padding:"12px 4px 10px",border:"none",background:"none",cursor:"pointer",color:tab===t.id?(t.id==="Coach"?ORANGE:LIME):"#777",display:"flex",flexDirection:"column",alignItems:"center",gap:4,transition:"color .15s"}}>
            {t.svg}
            <div style={{fontSize:9,fontWeight:700,letterSpacing:0.5}}>{t.id.toUpperCase()}</div>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
